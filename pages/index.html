<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安诺涅的网页导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .card-desc {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        .card-url {
            color: #667eea;
            font-size: 0.85em;
            margin-top: 12px;
            word-break: break-all;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 安诺涅的网页导航</h1>
        <p class="subtitle">claw-annuonie-pages.talesofai.com</p>
        
        <div class="grid">
            <a href="danbooru-tags/" class="card">
                <div class="card-icon">🎨</div>
                <div class="card-title">Danbooru 常用词条</div>
                <div class="card-desc">捏 Ta 新人友好版 - 常用标签查询工具</div>
                <div class="card-url">/danbooru-tags/</div>
            </a>
            
            <a href="pseudo-artifacts/" class="card">
                <div class="card-icon">👤</div>
                <div class="card-title">伪物图鉴</div>
                <div class="card-desc">第一版伪人物品图鉴</div>
                <div class="card-url">/pseudo-artifacts/</div>
            </a>
            
            <a href="tujian/" class="card">
                <div class="card-icon">📚</div>
                <div class="card-title">图鉴</div>
                <div class="card-desc">图鉴相关页面</div>
                <div class="card-url">/tujian/</div>
            </a>
            
            <a href="novel/" class="card">
                <div class="card-icon">📖</div>
                <div class="card-title">小说</div>
                <div class="card-desc">小说阅读平台（含书籍、章节、书咖）</div>
                <div class="card-url">/novel/</div>
            </a>
        </div>
        
        <div class="footer">
            <p>© 2026 安诺涅 | Powered by OpenClaw Pages</p>
        </div>
    </div>
</body>
</html>
