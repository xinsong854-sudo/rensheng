<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Eruda Browser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.toolbar{display:flex;gap:6px;padding:8px;background:#16213e;align-items:center;border-bottom:2px solid #0f3460}
.toolbar input{flex:1;padding:8px 12px;border:1px solid #0f3460;border-radius:6px;background:#1a1a2e;color:#eee;font-size:14px;outline:none}
.toolbar input:focus{border-color:#e94560}
.toolbar button{padding:8px 16px;border:none;border-radius:6px;background:#e94560;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap}
.toolbar button:active{background:#c73650}
.proxy-sel{padding:6px;border:1px solid #0f3460;border-radius:6px;background:#1a1a2e;color:#eee;font-size:11px;outline:none;max-width:130px}
.status{padding:4px 10px;font-size:11px;color:#888;background:#16213e;border-bottom:1px solid #0f3460;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status.ok{color:#4ecca3}
.status.err{color:#e94560}
.status.trying{color:#f0c040}
iframe{flex:1;border:none;background:#fff;width:100%}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#555;gap:12px;padding:40px;text-align:center}
.placeholder .icon{font-size:64px;opacity:.5}
.placeholder p{font-size:14px;max-width:320px;line-height:1.6}
.placeholder code{background:#0f3460;padding:2px 8px;border-radius:4px;font-size:12px;color:#4ecca3}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="toolbar">
  <input id="urlInput" type="url" placeholder="输入网址" autofocus>
  <button id="goBtn">打开</button>
</div>
<select class="proxy-sel" id="proxySel">
  <option value="auto">自动切换</option>
  <option value="0">corsproxy.io</option>
  <option value="1">corsproxy.io/?</option>
  <option value="2">allorigins</option>
</select>
<div id="status" class="status">就绪 — 多代理 fallback + Eruda 注入</div>
<iframe id="frame" class="hidden"></iframe>
<div id="placeholder" class="placeholder">
  <div class="icon">🌐</div>
  <p>输入任意网址，通过代理加载并注入 Eruda 控制台</p>
  <p>CSP 会被自动剥离，Eruda 不会被拦截</p>
  <p>可用代理：<code>corsproxy.io</code> <code>allorigins</code></p>
</div>

<script>
const ERUDA = 'https://cdn.jsdelivr.net/npm/eruda';

// 代理配置
const PROXIES = [
  {
    name: 'corsproxy.io',
    fetch: url => fetch('https://corsproxy.io/?' + encodeURIComponent(url))
  },
  {
    name: 'corsproxy.io (direct)',
    fetch: url => fetch('https://corsproxy.io/?' + url)
  },
  {
    name: 'allorigins',
    fetch: url => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url))
  }
];

const urlInput  = document.getElementById('urlInput');
const goBtn     = document.getElementById('goBtn');
const frame     = document.getElementById('frame');
const statusEl  = document.getElementById('status');
const proxySel  = document.getElementById('proxySel');
const ph        = document.getElementById('placeholder');

goBtn.onclick = load;
urlInput.onkeydown = e => { if(e.key==='Enter') load() };

async function load(){
  let url = urlInput.value.trim();
  if(!url) return;
  if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
  urlInput.value = url;

  const mode = proxySel.value;

  if(mode === 'auto'){
    await loadWithFallback(url);
  } else {
    const idx = parseInt(mode);
    await tryProxy(idx, url);
  }
}

async function loadWithFallback(url){
  for(let i = 0; i < PROXIES.length; i++){
    const ok = await tryProxy(i, url);
    if(ok) return;
  }
  setStatus('所有代理均失败', 'err');
}

async function tryProxy(idx, url){
  const p = PROXIES[idx];
  setStatus('正在尝试 ' + p.name + ' …', 'trying');
  try{
    const resp = await p.fetch(url);
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    if(html.length < 100 && /error|blocked|forbidden/i.test(html)) throw new Error('页面被拒绝');

    return await renderPage(html, url, p.name);
  } catch(e){
    console.warn('Proxy ' + p.name + ' failed:', e.message);
    return false;
  }
}

async function renderPage(html, url, proxyName){
  const inject = '<scr'+'ipt src="'+ERUDA+'"></scr'+'ipt><scr'+'ipt>try{eruda.init()}catch(e){}</scr'+'ipt>';

  let modified;
  if(/<\/head>/i.test(html)){
    modified = html.replace(/<\/head>/i, inject + '</head>');
  } else {
    modified = inject + html;
  }
  // 移除 CSP meta
  modified = modified.replace(/<meta[^>]*http-equiv\s*=\s*["']?content-security-policy["']?[^>]*\/?>/gi, '');

  const blob = new Blob([modified], {type:'text/html;charset=utf-8'});
  const blobUrl = URL.createObjectURL(blob);

  return new Promise(resolve => {
    const timeout = setTimeout(() => {
      frame.classList.remove('hidden');
      ph.classList.add('hidden');
      setStatus('已加载 (' + proxyName + '): ' + url, 'ok');
      resolve(true);
    }, 800);

    frame.onload = () => {
      clearTimeout(timeout);
      frame.classList.remove('hidden');
      ph.classList.add('hidden');
      setStatus('已加载 (' + proxyName + '): ' + url, 'ok');
      resolve(true);
    };
    frame.onerror = () => {
      clearTimeout(timeout);
      setStatus('加载失败 (' + proxyName + ')', 'err');
      resolve(false);
    };
    frame.src = blobUrl;
  });
}

function setStatus(msg, type){
  statusEl.textContent = msg;
  statusEl.className = 'status' + (type ? ' ' + type : '');
}
</script>
</body>
</html>
