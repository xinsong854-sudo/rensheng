<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>里界人生模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0e14;--card:rgba(14,14,20,.7);--accent:#d4a0e0;--accent2:#8a7fc7;--text:#c8c8d8;--dim:#7a7a8a;--safe:#7ab87a;--caution:#d4a84a;--danger:#c47a7a;--gold:#d4b87a}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;overflow-x:hidden}
#noise{position:fixed;top:-50%;left:-50%;width:200%;height:200%;pointer-events:none;z-index:100;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:noiseMove .1s steps(4) infinite}
@keyframes noiseMove{0%{transform:translate(0,0)}25%{transform:translate(-2%,1%)}50%{transform:translate(1%,-1%)}75%{transform:translate(-1%,2%)}100%{transform:translate(2%,-2%)}}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#fog{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:98;background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,.5) 100%)}

.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:20px;animation:dreamIn 1s ease;position:relative;z-index:1}
.screen.active{display:flex}
@keyframes dreamIn{from{opacity:0;filter:blur(8px)}to{opacity:1;filter:blur(0)}}

h1{font-size:clamp(1.6rem,5vw,2.5rem);color:rgba(212,160,224,.9);text-align:center;margin-bottom:8px;letter-spacing:.1em;position:relative;animation:dreamFloat 6s ease-in-out infinite;text-shadow:0 0 20px rgba(212,160,224,.3),0 0 40px rgba(212,160,224,.1)}
@keyframes dreamFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
h1::before,h1::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;color:rgba(196,122,122,.6);mix-blend-mode:screen}
h1::before{animation:glitch1 3s infinite;clip-path:polygon(0 0,100% 0,100% 33%,0 33%)}
h1::after{color:rgba(122,184,184,.6);animation:glitch2 3.5s infinite;clip-path:polygon(0 66%,100% 66%,100% 100%,0 100%)}
@keyframes glitch1{0%,90%,100%{transform:translate(0)}91%{transform:translate(-3px,1px)}93%{transform:translate(2px,-1px)}95%{transform:translate(-1px,0)}}
@keyframes glitch2{0%,88%,100%{transform:translate(0)}89%{transform:translate(2px,-1px)}92%{transform:translate(-2px,1px)}94%{transform:translate(1px,0)}}

.card{background:var(--card);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.04);border-radius:4px;padding:20px;max-width:500px;width:100%;box-shadow:0 0 40px rgba(0,0,0,.2)}
input,select{width:100%;padding:12px;margin:6px 0;border:1px solid rgba(255,255,255,.06);border-radius:3px;background:rgba(10,10,16,.8);color:var(--text);font-size:.95rem;outline:none;font-family:inherit}
input:focus,select:focus{border-color:rgba(138,127,199,.4)}
button{width:100%;padding:12px;margin:6px 0;background:rgba(138,127,199,.15);border:1px solid rgba(138,127,199,.2);border-radius:3px;color:var(--text);font-size:.95rem;cursor:pointer;transition:all .3s;font-family:inherit;letter-spacing:.05em}
button:hover{background:rgba(138,127,199,.25);border-color:rgba(138,127,199,.4);box-shadow:0 0 20px rgba(138,127,199,.1)}

.stats{display:grid;grid-template-columns:2fr 3fr;gap:6px;max-width:620px;width:100%;margin-bottom:8px}
.stats-left,.stats-right{display:flex;flex-direction:column;gap:6px}
.stat{background:var(--card);border:1px solid rgba(255,255,255,.03);border-radius:3px;padding:6px 10px;text-align:center;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.02),transparent);transform:translateX(-100%);transition:transform .6s}
.stat:hover::after{transform:translateX(100%)}
.stat-label{font-size:.65rem;color:var(--dim);letter-spacing:.05em}
.stat-bar{height:4px;background:rgba(26,26,36,.6);border-radius:2px;margin-top:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .8s;filter:blur(1px)}
.stat-val{font-size:.7rem;color:var(--dim);margin-top:2px}
.hp-f{background:linear-gradient(90deg,rgba(196,122,122,.7),rgba(210,140,140,.9));position:relative}.sp-f{background:linear-gradient(90deg,rgba(138,127,199,.7),rgba(156,145,215,.9));position:relative}.lk-f{background:linear-gradient(90deg,rgba(212,168,74,.7),rgba(224,186,96,.9));position:relative}.cb-f{background:linear-gradient(90deg,rgba(212,160,224,.7),rgba(226,178,236,.9));position:relative}.wl-f{background:linear-gradient(90deg,rgba(180,180,100,.7),rgba(200,200,120,.9));position:relative}
.hp-f::after,.sp-f::after,.lk-f::after,.cb-f::after,.wl-f::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(255,255,255,.02) 1px,rgba(255,255,255,.02) 2px);pointer-events:none}

.year{text-align:center;font-size:.9rem;color:var(--accent2);margin:10px 0;opacity:.7;letter-spacing:.15em;font-weight:300}
.year::before,.year::after{content:'—';opacity:.3;margin:0 10px}
.stage-label{font-size:.75rem;color:var(--dim);margin-left:6px;opacity:.5}

.progress{display:flex;align-items:center;gap:0;max-width:620px;width:100%;margin-bottom:10px;justify-content:center}
.pseg{flex:1;height:3px;background:rgba(255,255,255,.04);position:relative;transition:all 1s}
.pseg.done{background:rgba(138,127,199,.5);box-shadow:0 0 8px rgba(138,127,199,.2)}
.pseg.now{background:rgba(212,160,224,.6);box-shadow:0 0 12px rgba(212,160,224,.3);animation:segPulse 3s infinite}
@keyframes segPulse{0%,100%{box-shadow:0 0 6px rgba(212,160,224,.2)}50%{box-shadow:0 0 16px rgba(212,160,224,.4)}}

.story{background:var(--card);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);border:1px solid rgba(255,255,255,.03);border-radius:3px;padding:20px;max-width:620px;width:100%;min-height:80px;margin-bottom:12px;line-height:1.8;font-size:.9rem;white-space:pre-wrap;color:var(--text);filter:brightness(.95);transition:all .5s}
.story.safe{border-left:2px solid rgba(122,184,122,.3)}.story.caution{border-left:2px solid rgba(212,168,74,.3)}.story.danger{border-left:2px solid rgba(196,122,122,.3)}

.choices{display:flex;flex-direction:column;gap:8px;max-width:620px;width:100%}
.cbtn{background:rgba(14,14,20,.6);border:1px solid rgba(255,255,255,.04);border-radius:3px;padding:14px;cursor:pointer;text-align:left;color:var(--text);font-size:.9rem;transition:all .3s;font-family:inherit}
.cbtn:hover{border-color:rgba(138,127,199,.3);background:rgba(20,20,30,.8);box-shadow:0 0 15px rgba(138,127,199,.08)}
.cbtn .hint{font-size:.7rem;color:var(--dim);margin-top:4px;opacity:.6}
.cbtn .type-tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:.6rem;margin-left:6px}
.cbtn-blocked{opacity:.35;cursor:not-allowed !important;pointer-events:none !important}
.cbtn-blocked .blocked-reason{font-size:.7rem;color:var(--danger);margin-top:4px}

.loading{text-align:center;padding:40px 20px;color:var(--dim)}
/* 加载动画 v2 — 更醒目 */
.fog-loader-v2{width:100px;height:100px;margin:0 auto 20px;position:relative}
.fog-ring{position:absolute;top:50%;left:50%;width:80px;height:80px;border-radius:50%;border:2px solid rgba(138,127,199,.2);transform:translate(-50%,-50%);animation:fogRingSpin 2s linear infinite}
.fog-ring.r2{width:60px;height:60px;border-color:rgba(212,160,224,.15);animation-duration:3s;animation-direction:reverse;border-style:dashed}
.fog-core{position:absolute;top:50%;left:50%;width:16px;height:16px;border-radius:50%;background:rgba(138,127,199,.5);transform:translate(-50%,-50%);animation:fogCorePulse 1.5s ease-in-out infinite;box-shadow:0 0 20px rgba(138,127,199,.3),0 0 40px rgba(138,127,199,.1)}
@keyframes fogRingSpin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes fogCorePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.9}}

.load-text-v2{font-size:.9rem;letter-spacing:.15em;color:var(--accent);animation:loadTextPulse 2s ease-in-out infinite}
@keyframes loadTextPulse{0%,100%{opacity:.6}50%{opacity:1}}

.load-timer{font-size:.7rem;color:var(--dim);margin-top:8px;letter-spacing:.1em;font-variant-numeric:tabular-nums}

.load-progress-v2{width:220px;height:4px;background:rgba(255,255,255,.04);border-radius:2px;margin:14px auto 0;overflow:hidden;position:relative}
.load-progress-v2::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(138,127,199,.15),transparent);animation:progressShimmer 2s linear infinite}
@keyframes progressShimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
#loadProgressBar{height:100%;width:0%;background:linear-gradient(90deg,rgba(138,127,199,.6),rgba(212,160,224,.6));border-radius:2px;transition:width .5s ease}

.load-news-v2{max-width:380px;margin:16px auto 0;padding:12px 14px;background:rgba(138,127,199,.04);border:1px solid rgba(138,127,199,.08);border-radius:3px;animation:newsFadeIn 1s ease}
@keyframes newsFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:.6rem;margin-right:6px;letter-spacing:.05em}
.tag.safe{background:rgba(122,184,122,.1);color:var(--safe)}.tag.caution{background:rgba(212,168,74,.1);color:var(--caution)}.tag.danger{background:rgba(196,122,122,.1);color:var(--danger)}.tag.choice{background:rgba(138,127,199,.1);color:var(--accent2)}
.ai-badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:.65rem;background:rgba(138,127,199,.08);color:var(--accent2);border:1px solid rgba(138,127,199,.15);letter-spacing:.1em}

.traits{display:flex;flex-wrap:wrap;gap:4px;max-width:620px;width:100%;margin-top:8px}
.trait{background:rgba(20,20,30,.6);border:1px solid rgba(138,127,199,.1);border-radius:2px;padding:2px 6px;font-size:.65rem;color:var(--accent);letter-spacing:.05em;animation:traitIn .6s ease}
@keyframes traitIn{from{opacity:0;filter:blur(3px)}to{opacity:1;filter:blur(0)}}

/* 羁绊系统 */
.bonds{display:flex;flex-wrap:wrap;gap:4px;max-width:620px;width:100%;margin-top:6px}
.bond{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:2px;font-size:.65rem;cursor:pointer;transition:all .3s;animation:bondIn .8s ease}
.bond.friend{background:rgba(122,184,184,.08);border:1px solid rgba(122,184,184,.15);color:#7ab8b8}
.bond.love{background:rgba(196,122,122,.08);border:1px solid rgba(196,122,122,.15);color:#c47a7a}
.bond.married{background:rgba(212,184,122,.08);border:1px solid rgba(212,184,122,.2);color:#d4b87a}
.bond .bond-icon{font-size:.7rem}
.bond:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(138,127,199,.15)}
@keyframes bondIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* 物品系统 */
.items{display:flex;flex-wrap:wrap;gap:4px;max-width:620px;width:100%;margin-top:6px}
.item{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:2px;font-size:.65rem;cursor:pointer;transition:all .3s;animation:itemIn .8s ease;background:rgba(138,127,199,.06);border:1px solid rgba(138,127,199,.1);color:var(--accent)}
.item:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(138,127,199,.15)}
.item-desc{display:none;position:absolute;background:rgba(14,14,20,.95);border:1px solid rgba(138,127,199,.2);border-radius:3px;padding:8px 12px;max-width:300px;font-size:.75rem;color:var(--text);z-index:200;line-height:1.6}
.item:hover .item-desc{display:block}
@keyframes itemIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* 档案角色高亮 */
.char-hl{color:#d4b87a;font-weight:500;text-shadow:0 0 6px rgba(212,184,122,.15);transition:all .3s}
.char-hl:hover{text-shadow:0 0 12px rgba(212,184,122,.3)}

.death{text-align:center}
.death h1{-webkit-text-fill-color:var(--danger);animation:none}
body.insane .screen{animation:insaneShift 5s infinite}
@keyframes insaneShift{0%,90%,100%{filter:none}92%{filter:hue-rotate(5deg) brightness(.95)}94%{filter:hue-rotate(-3deg)}96%{filter:brightness(1.05)}98%{filter:hue-rotate(8deg)}}
body.lucky::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:97;background:radial-gradient(circle at 50% 40%,rgba(212,184,122,.04) 0%,transparent 60%);animation:luckyDream 4s infinite}
@keyframes luckyDream{0%,100%{opacity:.4}50%{opacity:.8}}

.name-hint{font-size:.75rem;color:var(--dim);margin-top:4px;line-height:1.5}
.name-hint .hl{color:var(--accent)}
.role-card{background:rgba(138,127,199,.06);border:1px solid rgba(138,127,199,.12);border-radius:3px;padding:12px;margin-top:8px}
.role-card .title{color:var(--accent);font-weight:normal;font-size:.9rem;letter-spacing:.05em}
.role-card .desc{color:var(--dim);font-size:.8rem;margin-top:4px;line-height:1.5}

/* 扫描动画 */
@keyframes scanPulse{0%,100%{opacity:.3;transform:scaleX(.95)}50%{opacity:.8;transform:scaleX(1.02)}}
.scan-line{display:inline-flex;align-items:center;gap:4px;opacity:.5;font-size:.75rem;letter-spacing:.15em;animation:scanPulse 1.2s ease-in-out infinite}
.scan-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:scanDotPulse 1.2s ease-in-out infinite}
.scan-dot:nth-child(2){animation-delay:.2s}
.scan-dot:nth-child(3){animation-delay:.4s}
@keyframes scanDotPulse{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}

/* 角色卡片梦核化 */
.role-card{position:relative;overflow:hidden;animation:cardBreathe 4s ease-in-out infinite}
.role-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(138,127,199,.03),transparent,rgba(212,160,224,.02),transparent);animation:cardRotate 12s linear infinite;pointer-events:none}
@keyframes cardBreathe{0%,100%{box-shadow:0 0 15px rgba(138,127,199,.05)}50%{box-shadow:0 0 25px rgba(138,127,199,.12)}}
@keyframes cardRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* 身份选择开关 */
.identity-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;background:rgba(138,127,199,.04);border:1px solid rgba(138,127,199,.1);border-radius:3px;cursor:pointer;transition:all .3s;user-select:none}
.identity-toggle:hover{background:rgba(138,127,199,.08);border-color:rgba(138,127,199,.2)}
.identity-toggle .toggle-track{width:32px;height:16px;background:rgba(255,255,255,.08);border-radius:8px;position:relative;transition:background .3s;flex-shrink:0}
.identity-toggle .toggle-track.on{background:rgba(212,160,224,.3)}
.identity-toggle .toggle-thumb{width:12px;height:12px;background:var(--accent);border-radius:50%;position:absolute;top:2px;left:2px;transition:left .3s}
.identity-toggle .toggle-track.on .toggle-thumb{left:18px}
.identity-toggle .toggle-label{font-size:.75rem;color:var(--dim);line-height:1.4}
.identity-toggle .toggle-label strong{color:var(--accent)}

/* 识别状态颜色 */
.name-status{display:inline-block;padding:1px 6px;border-radius:2px;font-size:.65rem;letter-spacing:.05em;vertical-align:middle;margin-left:4px}
.name-status.llm{background:rgba(212,168,74,.08);color:#d4a84a;border:1px solid rgba(212,168,74,.15)}
.name-status.exact{background:rgba(122,184,122,.08);color:#7ab87a;border:1px solid rgba(122,184,122,.15)}
.name-status.alias{background:rgba(122,184,122,.08);color:#7ab87a;border:1px solid rgba(122,184,122,.15)}
.name-status.fuzzy{background:rgba(122,184,122,.08);color:#7ab87a;border:1px solid rgba(122,184,122,.12)}

.region-badge{display:inline-block;padding:2px 6px;border-radius:2px;font-size:.6rem;background:rgba(122,184,184,.1);color:#7ab8b8;border:1px solid rgba(122,184,184,.15);margin-left:6px}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(138,127,199,.2);border-radius:2px}
.year-transition{animation:dreamSwitch .6s ease}
@keyframes dreamSwitch{from{opacity:0;filter:blur(6px);transform:translateY(5px)}to{opacity:1;filter:blur(0);transform:translateY(0)}}
.subtitle{color:var(--dim);font-size:.8rem;margin-bottom:24px;text-align:center;letter-spacing:.1em;opacity:.6}

.family-intro{background:rgba(138,127,199,.04);border-left:2px solid rgba(138,127,199,.2);padding:10px 14px;margin:10px 0;border-radius:0 3px 3px 0;font-size:.8rem;color:var(--dim);line-height:1.6}
.lifecycle-badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:.6rem;margin-right:4px}
.lifecycle-badge.human{background:rgba(184,184,200,.1);color:#b8b8c8}
.lifecycle-badge.pseudo{background:rgba(196,122,122,.1);color:var(--danger)}
.lifecycle-badge.special{background:rgba(212,160,224,.1);color:var(--accent)}

/* 成就卡片 */
.ach-card{display:flex;align-items:center;gap:8px;padding:6px 8px;margin:4px 0;background:rgba(138,127,199,.04);border-radius:3px;border:1px solid rgba(138,127,199,.06);transition:all .3s}
.ach-card:hover{background:rgba(138,127,199,.08);box-shadow:0 0 12px rgba(138,127,199,.1)}
.ach-card .ach-icon{font-size:1.1rem;animation:achPulse 2s ease-in-out infinite}
@keyframes achPulse{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.ach-card .ach-name{font-size:.8rem;color:var(--accent)}
.ach-card .ach-desc{font-size:.65rem;color:var(--dim)}
.ach-section{margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.04)}
.ach-title{font-size:.75rem;color:var(--dim);margin-bottom:8px;letter-spacing:.15em;opacity:.5;text-align:center}

/* ===== 梦核大气层特效 ===== */

/* 人生阶段色调滤镜 */
#sGame{transition:filter 2s ease}
.stage-baby{filter:sepia(.15) saturate(1.1)}
.stage-child{filter:saturate(.9) brightness(1.02)}
.stage-youth{filter:saturate(.85) hue-rotate(-10deg)}
.stage-young{filter:brightness(.97)}
.stage-middle{filter:saturate(.7) sepia(.08)}
.stage-old{filter:saturate(.5) brightness(.92) contrast(1.05)}

/* VHS水平撕裂线 */
.vhs-glitch::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:101;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(255,255,255,.03) 2px,rgba(255,255,255,.03) 4px);animation:vhsScan .3s steps(3) forwards;mix-blend-mode:screen}
.vhs-glitch::after{content:'';position:fixed;left:0;width:100%;height:1px;pointer-events:none;z-index:102;background:rgba(255,255,255,.12);animation:vhsTear .3s ease forwards;opacity:0}
@keyframes vhsScan{0%{transform:translateY(0)}100%{transform:translateY(100vh);opacity:0}}
@keyframes vhsTear{0%{top:45%;opacity:0}15%{opacity:1}50%{top:52%;opacity:.8}85%{opacity:.3}100%{top:60%;opacity:0}}

/* 故事文字色差/色散 */
.story.dispersion{text-shadow:-2px 0 rgba(255,0,0,.2),2px 0 rgba(0,0,255,.2);animation:textDispersion .5s ease forwards}
@keyframes textDispersion{0%{text-shadow:-3px 0 rgba(255,0,0,.35),3px 0 rgba(0,0,255,.35),0 0 4px rgba(138,127,199,.2)}40%{text-shadow:-2px 0 rgba(255,0,0,.2),2px 0 rgba(0,0,255,.2)}100%{text-shadow:none}}

/* 冷色光漏 */
.light-leak{position:fixed;pointer-events:none;z-index:96;mix-blend-mode:screen}
.ll-blue{width:50%;height:60%;background:radial-gradient(ellipse at 0% 50%,rgba(74,111,165,.04) 0%,transparent 70%);top:-10%;left:-15%;animation:llBlue 18s ease-in-out infinite}
.ll-purple{width:40%;height:50%;background:radial-gradient(ellipse at 100% 80%,rgba(106,61,125,.04) 0%,transparent 65%);bottom:-10%;right:-10%;animation:llPurple 22s ease-in-out infinite}
.ll-gray{width:35%;height:45%;background:radial-gradient(ellipse at 50% 0%,rgba(192,192,208,.03) 0%,transparent 60%);top:-5%;left:40%;animation:llGray 25s ease-in-out infinite}

// ===== 游戏核心 =====

const WLD=`里界:异空间,入口称【门】,出现在空间交界处(门窗、抽屉、屏幕、瓶口等)。入口越小内容物越危险。
等级:⬜REALITY 🟦NORMAL 🟩SAFE 🟨CAUTION 🟧DANGER 🟥HAZARD
伪人:伪装人类的非人存在,各有"禁忌"不触犯不会被伤害。伪物能对抗伪人但侵蚀使用者。

function getLoadContentForStage(){
  if(!G||!G.age)return LOAD_CONTENT.generic;
  const a=G.age;
  if(a<=2)return LOAD_CONTENT.baby;
  if(a<=6)return LOAD_CONTENT.child;
  if(a<=12)return LOAD_CONTENT.school;
  if(a<=17)return LOAD_CONTENT.teen;
  if(a<=30)return LOAD_CONTENT.young;
  if(a<=50)return LOAD_CONTENT.adult;
  return LOAD_CONTENT.old;
}

let _newsTimer=null;
let _lastNewsIndex=-1;
function showLoadingNews(){
  const el=document.getElementById('loadNews');
  if(!el)return;
  const pool=getLoadContentForStage();
  let idx;
  do{idx=Math.floor(Math.random()*pool.length)}while(idx===_lastNewsIndex&&pool.length>1);
  _lastNewsIndex=idx;
  const news=pool[idx];
  el.style.animation='none';
  el.offsetHeight;
  el.style.animation='newsFadeIn .8s ease';
  el.innerHTML='<span style="font-size:.7rem;color:var(--dim);line-height:1.6">'+news+'</span>';
  if(_newsTimer)clearTimeout(_newsTimer);
  _newsTimer=setTimeout(showLoadingNews,5000+Math.random()*4000);
}

function updUI(){
  // 保存旧值用于变化检测
  const oldHp=Math.max(0,G._prevHp||G.hp),oldSp=Math.max(0,G._prevSp||G.sp);
  const oldLk=clamp(G._prevLk!==undefined?G._prevLk:G.lk,0,100),oldCb=clamp(G._prevCb!==undefined?G._prevCb:G.cb,0,100);
  const oldWl=clamp(G._prevWl!==undefined?G._prevWl:G.wl,0,100);
  G._prevHp=G.hp;G._prevSp=G.sp;G._prevLk=G.lk;G._prevCb=G.cb;G._prevWl=G.wl;

  processBuffs();
  const be=getBuffEffects();
  G.hp=clamp(G.hp+be.hp,0,100);G.sp=clamp(G.sp+be.sp,0,100);
  G.lk=clamp(G.lk+be.lk,-20,100);G.cb=clamp(G.cb+be.cb,0,200);G.wl=clamp(G.wl+be.wl,0,100);
  const hp=Math.max(0,G.hp),sp=Math.max(0,G.sp),lk=clamp(G.lk,0,100),cb=clamp(G.cb,0,100),wl=clamp(G.wl,0,100);
  document.getElementById('hpB').style.width=hp+'%';document.getElementById('hpV').textContent=Math.round(G.hp);
  document.getElementById('spB').style.width=sp+'%';document.getElementById('spV').textContent=Math.round(G.sp);
  document.getElementById('lkB').style.width=lk+'%';document.getElementById('lkV').textContent=Math.round(G.lk);
  document.getElementById('cbB').style.width=cb+'%';document.getElementById('cbV').textContent=Math.round(G.cb);
  document.getElementById('wlB').style.width=wl+'%';document.getElementById('wlV').textContent=Math.round(G.wl);

  // 属性变化动效
  const isMobile=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stats=[
    {bar:'hpB',val:'hpV',old:oldHp,nw:hp,clr:'196,122,122'},
    {bar:'spB',val:'spV',old:oldSp,nw:sp,clr:'138,127,199'},
    {bar:'lkB',val:'lkV',old:oldLk,nw:lk,clr:'212,168,74'},
    {bar:'cbB',val:'cbV',old:oldCb,nw:cb,clr:'212,160,224'},
    {bar:'wlB',val:'wlV',old:oldWl,nw:wl,clr:'180,180,100'}
  ];
  for(const s of stats){
    const diff=s.nw-s.old;
    if(Math.abs(diff)<0.5)continue;
    const pct=s.old>0?Math.abs(diff)/s.old:(diff!==0?1:0);
    if(pct>=0.10){
      const dir=diff>0?'up':'down';
      const bEl=document.getElementById(s.bar),vEl=document.getElementById(s.val);
      if(!isMobile){
        bEl.style.boxShadow=`0 0 8px rgba(${s.clr},.4)`;
        bEl.style.transition='box-shadow 1s';
        bEl.classList.remove('pulse-up','pulse-down');
        vEl.classList.remove('flash-up','flash-down');
        void bEl.offsetWidth;
        bEl.classList.add('pulse-'+dir);
        vEl.classList.add('flash-'+dir);
        vEl.style.color=diff>0?'#7ab87a':'#c47a7a';
        setTimeout(()=>{bEl.style.boxShadow='';bEl.classList.remove('pulse-up','pulse-down');vEl.classList.remove('flash-up','flash-down');vEl.style.color=''},600);
      }else{
        bEl.style.boxShadow=`0 0 6px rgba(${s.clr},.3)`;
        setTimeout(()=>{bEl.style.boxShadow=''},800);
      }
    }
  }

  const stage=G.lifecycle?getStageAtAge(G.lifecycle,G.age):getHumanStage(G.age);
  const stageName=stage?stage.stage:'';
  document.getElementById('yrDisp').innerHTML=G.age+'岁'+(stageName?'<span class="stage-label">· '+stageName+'</span>':'');
  document.getElementById('trBox').innerHTML=G.traits.map(t=>'<span class="trait">'+t+'</span>').join('');
  const bb=document.getElementById('bondBox'),bs=document.getElementById('bondsSection');
  if(bb&&bs){bb.innerHTML=G.bonds.map(b=>'<span class="bond '+b.type+'" title="'+(b.desc||'')+'">'+(b.type==='married'?'💍':b.type==='love'?'💗':'👤')+' '+b.name+'</span>').join('');bs.style.display=G.bonds.length>0?'block':'none'}
  const ib=document.getElementById('itemBox'),its=document.getElementById('itemsSection');
  if(ib&&its){ib.innerHTML=G.items.map((it,i)=>'<span class="item" onclick="showItemDetail('+i+')" title="'+(it.desc||'')+'">'+it.icon+' '+it.name+'</span>').join('');its.style.display=G.items.length>0?'block':'none'}
  document.body.classList.toggle('insane',G.sp<30);
  document.body.classList.toggle('lucky',G.lk>70);
}

let _nameLLMPending=false;
let _nameLLMInput='';

async function checkName(){
  const v=document.getElementById('pName').value.trim();
  const hint=document.getElementById('nameHint');
  const card=document.getElementById('roleCard');
  const placeSel=document.getElementById('pPlace');
  const bpOv=document.getElementById('birthplaceOverride');
  card.style.display='none';bpOv.style.display='none';placeSel.disabled=false;
  if(!v){hint.innerHTML='';_resetPlaceOptions(placeSel);return}
  // 检查缓存
  if(NAME_CACHE[v]!==undefined){
    const cached=NAME_CACHE[v];
    if(!cached){hint.innerHTML='<span style="opacity:.5">将以自定义角色开始你的人生</span>';return}
    _showResolved(cached,hint,card,bpOv,placeSel,v);
    return;
  }
  // 本地匹配
  const resolved=resolveName(v);
  if(resolved){
    NAME_CACHE[v]=resolved;
    _showResolved(resolved,hint,card,bpOv,placeSel,v);
    return;
  }
  // LLM fallback（防抖：300ms 内无新输入才发起）
  _nameLLMInput=v;
  if(_nameLLMPending)return;
  hint.innerHTML='<span class="scan-line"><span class="scan-dot"></span><span class="scan-dot"></span><span class="scan-dot"></span> 扫描角色库...</span>';
  _nameLLMPending=true;
  await new Promise(r=>setTimeout(r,400));
  if(_nameLLMInput!==v){_nameLLMPending=false;return} // 用户又改了
  const llmRes=await resolveNameLLM(v);
  _nameLLMPending=false;
  if(_nameLLMInput!==v)return;
  if(llmRes){
    NAME_CACHE[v]=llmRes;
    _showResolved(llmRes,hint,card,bpOv,placeSel,v);
    return;
  }
  NAME_CACHE[v]=false;
  hint.innerHTML='<span style="opacity:.5">将以自定义角色开始你的人生</span>';
}

let G_useIdentity=true; // 用户是否选择以角色身份体验

function _showResolved(resolved,hint,card,bpOv,placeSel,v){
  const badgeMap={llm:'<span class="name-status llm">AI识别</span>',exact:'<span class="name-status exact">精确匹配</span>',alias:'<span class="name-status alias">别名匹配</span>',fuzzy:'<span class="name-status fuzzy">模糊匹配</span>'};
  const badge=badgeMap[resolved.match]||'';
  hint.innerHTML='✅ <span class="hl">'+resolved.canonicalName+'</span>'+badge;
  if(resolved.type==='人类')hint.innerHTML+=' <span class="lifecycle-badge human">人类</span>';
  else if(resolved.type==='伪人')hint.innerHTML+=' <span class="lifecycle-badge pseudo">伪人</span>';
  else hint.innerHTML+=' <span class="lifecycle-badge special">特殊</span>';
  if(resolved.region)hint.innerHTML+=' <span class="region-badge">'+resolved.region+'</span>';
  // 只有精确/别名匹配才允许档案专属出生地
  const isExactOrAlias=resolved.match==='exact'||resolved.match==='alias';
  if(isExactOrAlias && G_useIdentity){
    const bp=resolveBirthplace(v,placeSel.value);
    if(bp.origin && bp.origin !== '未知'){
      _setBirthplaceOverride(placeSel,bp);
    }
  }else{
    // 模糊匹配或未启用身份：不修改出生地下拉，保持默认选项
    placeSel.disabled=false;
    bpOv.style.display='none';
  }
  card.style.display='block';
  card.innerHTML='<div class="role-card"><div class="title">'+resolved.canonicalName+'</div><div class="desc">'+resolved.info+'</div></div>'+
    '<div class="identity-toggle" onclick="toggleIdentity()" id="idToggle">'+
    '<div class="toggle-track" id="toggleTrack"><div class="toggle-thumb"></div></div>'+
    '<div class="toggle-label">'+
    (resolved.type==='人类'?
      '<strong>以该角色身份开始</strong><br>保留角色背景设定':
      '<strong>以「'+resolved.canonicalName+'」身份开始</strong><br>将应用角色专属生命周期与设定')+
    '</div></div>';
  G_useIdentity=true;
  document.getElementById('toggleTrack').classList.add('on');
  // 身份启用后再次检查出生地锁定（仅精确/别名匹配）
  if(isExactOrAlias){
    const bp=resolveBirthplace(v,placeSel.value);
    if(bp.origin && bp.origin !== '未知'){
      _setBirthplaceOverride(placeSel,bp);
    }
  }
}

function _setBirthplaceOverride(placeSel,bp){
  placeSel.disabled=true;
  let opt=placeSel.querySelector('option[value="'+bp.origin+'"]');
  if(!opt){
    opt=document.createElement('option');
    opt.value=bp.origin;
    opt.textContent=bp.origin;
    placeSel.appendChild(opt);
  }
  placeSel.value=bp.origin;
}

function toggleIdentity(){
  G_useIdentity=!G_useIdentity;
  const track=document.getElementById('toggleTrack');
  if(track)track.classList.toggle('on',G_useIdentity);
  const placeSel=document.getElementById('pPlace');
  const bpOv=document.getElementById('birthplaceOverride');
  const card=document.getElementById('roleCard');
  if(!G_useIdentity){
    // 取消角色身份：重置出生地为默认，隐藏角色卡片
    _resetPlaceOptions(placeSel);
    placeSel.value='渊';
    placeSel.disabled=false;
    bpOv.style.display='none';
    card.style.display='none';
  }else{
    // 启用角色身份：锁定档案出生地
    const nameVal=document.getElementById('pName').value.trim();
    const resolved=resolveName(nameVal);
    if(resolved){
      const bp=resolveBirthplace(nameVal,placeSel.value);
      if(bp.origin&&bp.origin!=='未知'){
        _setBirthplaceOverride(placeSel,bp);
        bpOv.style.display='none';
      }
    }
  }
}

async function aiCall(prompt,maxTokens,temperature,timeoutMs){
  const URL='https://litellm.talesofai.cn/v1/chat/completions';
  const KEY='sk-fZrLXE0IEs6EDYJCOsLLaQ';
  const maxT=maxTokens||2048;
  const temp=temperature!==undefined?temperature:0.85;
  const tms=timeoutMs||90000;
  const MAX_RETRIES=2;
  const hints=['推演中...','门正在打开...','命运正在展开...','低语在回响...','里界在低语...','命运之线在编织...'];
  const loadEl=document.getElementById('loadText');
  if(loadEl)loadEl.textContent=hints[Math.floor(Math.random()*hints.length)];

  // 启动计时器
  const timerEl=document.getElementById('loadTimer');
  let elapsed=0;
  const timerInterval=setInterval(()=>{
    elapsed++;
    if(timerEl)timerEl.textContent='已等待 '+elapsed+'s';
  },1000);

  // 模拟进度条
  const progressBar=document.getElementById('loadProgressBar');
  let progress=0;
  const progressInterval=setInterval(()=>{
    if(progress<40&&elapsed<30)progress+=0.5;
    else if(progress<70&&elapsed<60)progress+=0.3;
    else if(progress<95)progress+=0.1;
    if(progressBar)progressBar.style.width=progress+'%';
  },500);

  for(let attempt=0;attempt<=MAX_RETRIES;attempt++){
    if(attempt>0){
      const delay=1500*attempt;
      if(loadEl)loadEl.textContent='连接不稳定，重试中 ('+attempt+'/'+MAX_RETRIES+')...';
      await new Promise(r=>setTimeout(r,delay));
    }
    try{
      const ctrl=new AbortController();
      const tmo=setTimeout(()=>ctrl.abort(),tms);
      const r=await fetch(URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({model:'qwen3.5-plus-no-think',messages:[{role:'system',content:'严格只返回JSON对象。不要返回任何其他内容。'},{role:'user',content:prompt}],max_tokens:maxT,temperature:temp}),signal:ctrl.signal});
      clearTimeout(tmo);
      if(!r.ok){
        if(r.status===429&&attempt<MAX_RETRIES)continue;
        throw new Error('API '+r.status);
      }
      const d=await r.json();
      // 成功 → 进度到 100%
      if(progressBar)progressBar.style.width='100%';
      clearInterval(timerInterval);
      clearInterval(progressInterval);
      return d.choices?.[0]?.message?.content||'';
    }catch(e){
      if(attempt>=MAX_RETRIES){
        clearInterval(timerInterval);
        clearInterval(progressInterval);
        throw e;
      }
    }
  }
  clearInterval(timerInterval);
  clearInterval(progressInterval);
  throw new Error('请求失败');
}

function parseJSON(t){
  t=t.replace(/```(?:json)?/g,'').replace(/```/g,'').trim();
  for(const open of ['[','{']){const start=t.indexOf(open);if(start<0)continue;const close=open==='['?']':'}';let depth=0,inStr=false,esc=false;for(let i=start;i<t.length;i++){const c=t[i];if(esc){esc=false;continue}if(c==='\\'){esc=true;continue}if(c==='"')inStr=!inStr;if(inStr)continue;if(c==='['||c==='{')depth++;if(c===']'||c==='}'){depth--;if(depth===0&&c===close){const sub=t.substring(start,i+1);try{return JSON.parse(sub)}catch(e){break}}}}}
  try{return JSON.parse(t)}catch(e){}
  return null;
}

  G.place=bp.current; G.originPlace=bp.origin;

  // 生命周期（G_useIdentity=false 时跳过角色匹配，视为同名同姓的普通人）
  if(skipChar){
    G.lifecycle = generateLifecycle(rawName, G.place, true);
  }else{
    G.lifecycle=generateLifecycle(G.name,G.place);
  }

  // 初始化属性
  G.age=0;G.hp=100;G.sp=100;G.lk=50;G.cb=10;G.hist=[];G.traits=[];G.batch=[];G.batchIdx=0;

  // 初始财富
  G.wl=getInitialWealth(G.lifecycle,0,G.place);
  G.wl=clamp(G.wl,0,100);

  go('sGame');updUI();

  // 显示角色身份摘要（不含预生成家庭信息，一切等AI生成）
  const fb=document.getElementById('familyBox');
  if(G.isChar){
    const lc=G.lifecycle;
    const typeLabel=lc?
      (lc.lifecycleType==='human'?'人类':
       lc.lifecycleType==='character'?'已知角色':
       lc.isHuman?'人类':'特殊存在'):
      '未知';
    fb.innerHTML='<div class="family-intro">👤 <b>'+G.name+'</b><br><span style="font-size:.7rem;color:var(--dim)">身份：'+G.charInfo.substring(0,60)+'...</span><br><span style="font-size:.7rem;color:var(--dim)">类型：'+typeLabel+' · 所在地：'+G.place+'</span></div>';
  }else{
    fb.innerHTML='<div class="family-intro"><span style="font-size:.75rem;color:var(--dim)">出生于 '+G.place+'，踏入表界...</span></div>';
  }

  const maxAge=G.lifecycle&&G.lifecycle.maxAge?G.lifecycle.maxAge:100;
  if(maxAge>200||maxAge===Infinity){showFastForwardConfirm(maxAge);return}

  generateLoadingContent();
  generateAndStart().catch(e=>{console.error("[generateAndStart]",e)})
}

async function generateAndStart(){
  document.getElementById('loadBox').style.display='block';
  document.getElementById('storyBox').style.display='none';
  document.getElementById('chBox').innerHTML='';
  const timerEl=document.getElementById('loadTimer');
  if(timerEl)timerEl.textContent='';
  showLoadingNews();
  generateLoadingContent();
  const lpb=document.getElementById('loadProgressBar');
  if(lpb)lpb.style.width='15%';
  try{
    if(lpb)lpb.style.width='40%';
    G.batch=await generateBatch();
    generateSecondBatchContent();
    if(lpb)lpb.style.width='90%';
    G.batchIdx=0;
    if(lpb)lpb.style.width='100%';
    setTimeout(()=>{
      document.getElementById('loadBox').style.display='none';
      if(lpb)lpb.style.width='0%';
    },500);
    showSegment();
  }catch(e){
    document.getElementById('loadBox').style.display='none';
    if(lpb)lpb.style.width='0%';
    document.getElementById('storyBox').style.display='block';
    document.getElementById('storyBox').className='story';
    document.getElementById('storyBox').textContent='推演中断: '+e.message.substring(0,100);
    const btn=document.createElement('button');
    btn.textContent='🔄 重试';btn.onclick=()=>generateAndStart().catch(e=>{console.error("[generateAndStart]",e)})
    document.getElementById('chBox').appendChild(btn);
  }
}

function showSegment(){
  if(G.batchIdx>=G.batch.length){generateAndStart().catch(e=>{console.error("[generateAndStart]",e)});return}
  const seg=G.batch[G.batchIdx];
  if(!seg){console.error('[showSegment] seg is null/undefined, batchIdx='+G.batchIdx+', batch.length='+G.batch.length);return;}
  document.getElementById('loadBox').style.display='none';
  document.getElementById('storyBox').style.display='block';
  if(seg.effects){
    G.hp=clamp(G.hp+(seg.effects.hp||0),0,100);G.sp=clamp(G.sp+(seg.effects.sanity||0),0,100);
    G.lk=clamp(G.lk+(seg.effects.luck||0),-20,100);G.cb=clamp(G.cb+(seg.effects.combat||0),0,200);
    G.wl=clamp(G.wl+(seg.effects.wealth||0),0,100);
  }
  // 年衰减
  if(G.lifecycle&&G.age>0){
    try{
      const decay=calculateAnnualDecay(G.lifecycle,G.age,{hp:G.hp,sp:G.sp,wl:G.wl});
      G.hp=clamp(G.hp+decay.hp,0,100);G.sp=clamp(G.sp+decay.sp,0,100);G.wl=clamp(G.wl+decay.wl,0,100);
    }catch(e){console.warn('[年衰减] calculateAnnualDecay error:',e)}
  }
  if(G.age>60){G.hp-=Math.floor(Math.random()*2);G.sp-=Math.floor(Math.random())}
  if(G.age>75)G.hp-=Math.floor(Math.random()*3)+1;
  // 检测年龄阶段变化
  const prevStage=G.lifecycle?getStageAtAge(G.lifecycle,G.age):getHumanStage(G.age);
  G.age=seg.age;updUI();
  if(G.children.length>0)processChildren();
  processWealthDebuff();
  renderBuffs();
  const newStage=G.lifecycle?getStageAtAge(G.lifecycle,G.age):getHumanStage(G.age);
  if(prevStage&&newStage&&prevStage.stage!==newStage.stage){
    const sGame=document.getElementById('sGame');
    sGame.classList.add('stage-transition');
    setTimeout(()=>sGame.classList.remove('stage-transition'),350);
  }

  // 处理羁绊
  if(seg.bonds&&Array.isArray(seg.bonds)){
    seg.bonds.forEach(nb=>{
      if(!CHARDB[nb.name])return; // 只认档案角色
      const existing=G.bonds.find(b=>b.name===nb.name);
      if(existing){
        existing.affinity=clamp(existing.affinity+(nb.affinityChange||0),-100,100);
      }else{
        G.bonds.push({name:nb.name,affinity:nb.affinityChange||5,type:'friend',desc:CHARDB[nb.name]?CHARDB[nb.name].desc:''});
      }
      // 更新类型
      const b=G.bonds.find(b=>b.name===nb.name);
      if(b&&G.marriage&&G.marriage.name===nb.name){b.type='married'}
      else if(b&&b.affinity>=60){b.type='love'}
      else if(b&&b.affinity>=0){b.type='friend'}
      else if(b){b.type='friend'}
      updUI();
    });
  }

  // 处理物品
  if(seg.items&&Array.isArray(seg.items)){
    seg.items.forEach(ni=>{
      if(!G.items.find(x=>x.name===ni.name)){
        G.items.push({name:ni.name,desc:ni.desc||'',icon:ni.icon||'📦',used:false});
      }
    });
  }

  const tagLabels={safe:'平静',caution:'异常',danger:'危险'};
  const sb=document.getElementById('storyBox');
  sb.className='story '+(seg.type||'safe')+' year-transition';
  sb.innerHTML='<span class="tag '+(seg.type||'safe')+'">'+(tagLabels[seg.type]||'')+'</span> '+seg.age+'岁\n\n'+highlightChars(seg.text);
  typewriterEffect(sb, seg.text);
  renderProg();

  const cb=document.getElementById('chBox');cb.innerHTML='';
  if(G_fastForward>0&&G_deathAnchors.length>0&&G.age>=30){for(const anchor of G_deathAnchors){if(G.age<anchor.minAge)continue;if(Math.random()*100<anchor.weight*2&&Math.random()<0.3){die(anchor.cause);return}}}
  if(G.hp<=0){die('生命归零。');return}
  if(G.sp<=0){die('理智归零。');return}

  // 伪化判定
  if(G.lifecycle&&G.lifecycle.canPseudoTransform){
    try{
      if(shouldCheckPseudoTransform&&shouldCheckPseudoTransform(G.sp,G.age,G.hist)){
        if(Math.random()<0.1){
          G.lifecycle=applyPseudoTransform(G.lifecycle);
          G.traits.push('伪化者');
          G.traits.push('异变体质');
          sb.innerHTML+='<br><br><span style="color:var(--danger);font-size:.8rem">⚠️ 你的身体开始异变...你正在被伪化。寿命大幅延长，但人性逐渐消退。</span>';
        }
      }
    }catch(e){console.warn('[伪化判定] error:',e)}
  }

  if(seg.hasChoice&&seg.choices&&seg.choices.length>0){
    seg.choices.forEach((c,i)=>{
      const stats={hp:G.hp,sp:G.sp,lk:G.lk,cb:G.cb,wl:G.wl,age:G.age,traits:G.traits};
      const check=checkChoiceRequirements?checkChoiceRequirements(c,stats):{allowed:true,reason:''};
      const btn=document.createElement('button');
      btn.className='cbtn'+(check.allowed?'':' cbtn-blocked');
      btn.style.animationDelay=(i*100)+'ms';
      let html='<div>'+c.text+'</div>';
      if(c.hint)html+='<div class="hint">'+c.hint+'</div>';
      if(c.type)html+='<div class="hint"><span class="type-tag" style="background:rgba(138,127,199,.1);color:var(--accent2)">'+typeLabel(c.type)+'</span></div>';
      if(!check.allowed)html+='<div class="blocked-reason">🔒 '+check.reason+'</div>';
      btn.innerHTML=html;
      if(check.allowed)btn.onclick=()=>doChoice(c,seg.text);
      cb.appendChild(btn);
    });
  }

  // 羁绊按钮（求婚已移至羁绊页面，此处不再显示）

  if(!seg.hasChoice&&!G.bonds.length){
    const btn=document.createElement('button');
    btn.className='btn-continue';btn.textContent='继续 —';
    btn.onclick=()=>{G.hist.push({age:seg.age,ageG:seg.ageG||ageG(G.age),text:seg.text.substring(0,80)});updTraits(seg.type);G.batchIdx++;showSegment()};
    cb.appendChild(btn);
  }else if(!seg.hasChoice){
    const btn=document.createElement('button');
    btn.className='btn-continue';btn.textContent='继续 —';
    btn.onclick=()=>{G.hist.push({age:seg.age,ageG:seg.ageG||ageG(G.age),text:seg.text.substring(0,80)});updTraits(seg.type);G.batchIdx++;showSegment()};
    cb.appendChild(btn);
  }
}

function typeLabel(t){return{combat:'⚔️战斗',bribe:'💰贿赂',social:'🤝社交',luck:'🍀运气',explore:'🔍探索',normal:''}[t]||t}

async function doChoice(choice,eventText){
  document.getElementById('loadBox').style.display='block';
  document.getElementById('chBox').innerHTML='';
  const stats={hp:G.hp,sp:G.sp,lk:G.lk,cb:G.cb,wl:G.wl,age:G.age,traits:G.traits};
  let outcomeText='';let outcomeSuccess=true;

  // 属性判定
  if(choice.type&&typeof calcChoiceOutcome==='function'){
    const outcome=calcChoiceOutcome(choice.type,stats);
    outcomeSuccess=outcome.success;
    outcomeText=`判定：${outcome.success?'成功':'失败'}（成功率${outcome.score}%）`;
  }

  // 贿赂消耗
  let wealthCost=0;
  if(choice.type==='bribe'){
    wealthCost=Math.max(5,Math.floor(G.wl*0.2));
    G.wl=clamp(G.wl-wealthCost,0,100);
  }

  const charCtx=G.isChar?`\n\n${G.name}是世界观角色。${G.charInfo}`:'';
  const traitsCtx2=G.traits.length>0?`\n已拥有特性：${G.traits.join('、')}。请在推演结果中体现这些特性的影响。`:'';
  const speechCtx2=G.isChar&&SPEECH_STYLES&&SPEECH_STYLES[G.name]?SPEECH_STYLES[G.name]:'';
  const prompt=`AI推演。${WLD}${charCtx}${speechCtx2} 角色:${G.name},${G.age}岁,${G.place}。HP${Math.round(G.hp)} SP${Math.round(G.sp)} LK${Math.round(G.lk)} CB${Math.round(G.cb)} WL${Math.round(G.wl)}${traitsCtx2} 事件:${eventText.substring(0,200)} 选择:"${choice.text}" ${outcomeText?"判定:"+outcomeText:""} ${wealthCost>0?"贿赂"+wealthCost:""} 推演100-200字。JSON:{"text":"结果","effects":{"hp":数字,"sanity":数字,"luck":数字,"combat":数字,"wealth":数字}}`;
  try{
    const txt=await aiCall(prompt,1024,0.85,45000);const data=parseJSON(txt);
    document.getElementById('loadBox').style.display='none';
    const sb=document.getElementById('storyBox');
    sb.className='story year-transition';
    sb.innerHTML='<span class="tag choice">选择</span> '+choice.text+'\n\n'+(data?.text||'命运已定。')+(outcomeText?'<br><br><span style="font-size:.75rem;color:var(--dim)">'+outcomeText+'</span>':'');
    triggerTextDispersion();
    if(data?.effects){G.hp=clamp(G.hp+(data.effects.hp||0),0,100);G.sp=clamp(G.sp+(data.effects.sanity||0),0,100);G.lk=clamp(G.lk+(data.effects.luck||0),-20,100);G.cb=clamp(G.cb+(data.effects.combat||0),0,200);G.wl=clamp(G.wl+(data.effects.wealth||0),0,100)}
    updUI();G.hist.push({age:G.age,ageG:ageG(G.age),text:eventText.substring(0,60)+' → '+choice.text});updTraits('choice');
    if(G.hp<=0){die('生命归零。');return}if(G.sp<=0){die('理智归零。');return}
    const cb=document.getElementById('chBox');cb.innerHTML='';
    const btn=document.createElement('button');btn.className='btn-continue';btn.textContent='下一年 —';
    btn.onclick=()=>{G.age++;G.batch=[];G.batchIdx=0;generateAndStart().catch(e=>{console.error("[generateAndStart]",e)})};cb.appendChild(btn);
  }catch(e){
    document.getElementById('loadBox').style.display='none';
    const sb=document.getElementById('storyBox');sb.className='story';sb.textContent='推演中断: '+e.message.substring(0,80);
    const cb=document.getElementById('chBox');cb.innerHTML='';
    const btn=document.createElement('button');btn.textContent='🔄 重试';btn.onclick=()=>doChoice(choice,eventText);cb.appendChild(btn);
  }
}

function updTraits(type){
  if(type==='danger'&&!G.traits.includes('里界见证者'))G.traits.push('里界见证者');
  if(type==='caution'&&!G.traits.includes('异常感知者'))G.traits.push('异常感知者');
  if(G.sp<30&&!G.traits.includes('理智脆弱'))G.traits.push('理智脆弱');
  if(G.cb>30&&!G.traits.includes('战斗能手'))G.traits.push('战斗能手');
  if(G.lk>60&&!G.traits.includes('天选之人'))G.traits.push('天选之人');
  if(G.cb>50&&!G.traits.includes('清劣者'))G.traits.push('清劣者');
}

      if(data.effects.wealth>15)addBuff('财运亨通','💰','positive',{wl:5},3+Math.floor(Math.random()*5));
      else if(data.effects.wealth<-15)addBuff('破财','💸','negative',{wl:-5},2+Math.floor(Math.random()*3));
      G.sp=clamp(G.sp+(data.effects.sanity||0),0,100);G.lk=clamp(G.lk+(data.effects.luck||0),-20,100);G.cb=clamp(G.cb+(data.effects.combat||0),0,200);G.wl=clamp(G.wl+(data.effects.wealth||0),0,100)}
    updUI();

function showProposalChoice(){
  const cb=document.getElementById('chBox');
  cb.innerHTML='';
  const title=document.createElement('div');
  title.style.cssText='color:var(--dim);font-size:.8rem;margin-bottom:12px;text-align:center';
  title.textContent='—— 选择求婚对象 ——';
  cb.appendChild(title);

  G.bonds.forEach((b,i)=>{
    if(b.type==='married')return; // 已结婚
    const btn=document.createElement('button');
    btn.className='cbtn';
    const isCampLeader=(b.name==='营长'||b.name==='安诺涅');
    const isAnnuonie=(b.name==='安诺涅'||b.name==='营长'||b.name==='楼长');
    let hint='好感度 '+b.affinity+'/100';
    if(isAnnuonie){
      hint+=' · <span style="color:var(--danger)">⚠️ 不可结缘</span>';
      btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='not-allowed';
    }else if(b.affinity>=60){
      hint+=' · 很可能成功';
    }else if(b.affinity>=30){
      hint+=' · 不确定...';
    }else{
      hint+=' · 大概率被拒绝';
    }
    btn.innerHTML='<div>💍 向「'+b.name+'」求婚</div><div class="hint">'+hint+'</div>';
    if(!isAnnuonie)btn.onclick=()=>doProposal(b);
    cb.appendChild(btn);
  });

  const backBtn=document.createElement('button');
  backBtn.textContent='返回';
  backBtn.onclick=()=>showSegment();
  cb.appendChild(backBtn);
}

async function doProposal(bond){
  const sb=document.getElementById('storyBox');
  const cb=document.getElementById('chBox');
  cb.innerHTML='';
  sb.style.display='block';
  document.getElementById('loadBox').style.display='block';

  // 未成年人不能结婚
  if(G.age<16){
    document.getElementById('loadBox').style.display='none';
    sb.className='story';sb.style.display='block';
    sb.innerHTML='<span style="color:var(--dim)">你还太小了（'+G.age+'岁），等成年再说吧。</span>';
    const btn=document.createElement('button');btn.className='btn-continue';btn.textContent='返回';btn.onclick=()=>showSegment();cb.appendChild(btn);
    return;
  }
  // 安诺涅/营长/楼长不可结缘
  if(bond.name==='安诺涅'||bond.name==='营长'||bond.name==='楼长'){
    document.getElementById('loadBox').style.display='none';
    sb.className='story';sb.style.display='block';
    sb.innerHTML='<span style="color:var(--danger)">⚠️ '+bond.name+' 不可结缘。有些存在超越了世俗的姻缘。</span>';
    const btn=document.createElement('button');btn.className='btn-continue';btn.textContent='返回';btn.onclick=()=>showSegment();cb.appendChild(btn);
    return;
  }

  // 营长特殊处理
  if(G.name==='营长'||G.name==='安诺涅'){
    document.getElementById('loadBox').style.display='none';
    sb.className='story safe year-transition';
    sb.innerHTML='💍 求婚？<br><br>想了想，实际上哪有那么多又爱夜鹭又喜欢喝柠檬茶的呢，还是自己好。<br><br><span style="font-size:.7rem;color:var(--dim)">（一只小眼睛留）</span>';
    const backBtn=document.createElement('button');
    backBtn.className='btn-continue';backBtn.textContent='继续 —';
    backBtn.onclick=()=>{G.batchIdx++;showSegment()};
    cb.appendChild(backBtn);
    return;
  }

  document.getElementById('loadText').textContent='命运之线在编织...';

  const isCampLeader=(bond.name==='营长'||bond.name==='安诺涅');
  let accepted;
  if(isCampLeader){
    accepted=false;
  }else{
    // 好感度+运气判定
    const baseChance=bond.affinity*0.5;
    const luckBonus=G.lk*0.2;
    const chance=Math.min(95,baseChance+luckBonus);
    accepted=Math.random()*100<chance;
  }

  // 让AI生成求婚剧情
  const prompt=`AI推演。${WLD} 角色:${G.name},${G.age}岁,${G.place}。HP${Math.round(G.hp)} SP${Math.round(G.sp)} LK${Math.round(G.lk)} CB${Math.round(G.cb)} WL${Math.round(G.wl)} ${G.isChar?"角色:"+G.name+"是"+G.charInfo:""} ${G.name}(${G.age}岁)向「${bond.name}」求婚。${accepted?"对方答应了":"对方拒绝,符合性格"}。150-250字求婚场景含对话。JSON:{"text":"剧情","effects":{"sanity":数字,"luck":数字,"wealth":数字}}`;

  try{
    const txt=await aiCall(prompt,1024,0.8,30000);
    const data=parseJSON(txt);
    document.getElementById('loadBox').style.display='none';
    sb.className='story '+(accepted?'safe':'danger')+' year-transition';
    sb.innerHTML=(accepted?'💍 <span style="color:var(--gold)">求婚成功！</span>':'💔 <span style="color:var(--danger)">求婚被拒</span>')+'\n\n'+(data?.text||'命运已定。');
    triggerTextDispersion();

    if(accepted){
      G.marriage={name:bond.name,desc:CHARDB[bond.name]?CHARDB[bond.name].desc:''};
      bond.type='married';
      G.traits.push('有情人');
    }else{
      G.sp=clamp(G.sp-(isCampLeader?15:10),0,100);
    }
    if(data?.effects){G.sp=clamp(G.sp+(data.effects.sanity||0),0,100);G.lk=clamp(G.lk+(data.effects.luck||0),-10,100);G.wl=clamp(G.wl+(data.effects.wealth||0),0,100)}

    updUI();
    G.hist.push({age:G.age,ageG:ageG(G.age),text:accepted?'向'+bond.name+'求婚成功':'向'+bond.name+'求婚被拒'});

    const backBtn=document.createElement('button');
    backBtn.className='btn-continue';backBtn.textContent='继续 —';
    backBtn.onclick=()=>{G.batchIdx++;showSegment()};
    cb.appendChild(backBtn);
  }catch(e){
    document.getElementById('loadBox').style.display='none';
    sb.className='story';
    sb.textContent='推演中断: '+e.message.substring(0,80);
    const backBtn=document.createElement('button');
    backBtn.className='btn-continue';backBtn.textContent='继续 —';
    backBtn.onclick=()=>{G.batchIdx++;showSegment()};
    cb.appendChild(backBtn);
  }
}

  if(G.traits.includes('伪化者'))a.push({name:'半人半影',desc:'经历伪化',icon:'🌑'});
  if(G.traits.includes('理智脆弱'))a.push({name:'边缘行者',desc:'理智曾濒临崩溃',icon:'💔'});
  if(G.traits.includes('异变体质'))a.push({name:'异变者',desc:'身体发生异变',icon:'🧬'});

function getHighlights(){
  const hls=[];
  G.batch.forEach(seg=>{if(seg.type==='danger'&&seg.text)hls.push({age:seg.age,text:seg.text.substring(0,150),type:'danger'})});
  G.hist.forEach(h=>{if(h.text.length>20)hls.push({age:h.age,text:h.text,type:''})});
  G.bonds.forEach(b=>{if(b.affinity>=60)hls.push({age:G.age,text:'与「'+b.name+'」建立了深厚的羁绊（好感度'+b.affinity+'）',type:'safe'})});
  if(G.marriage)hls.push({age:G.age,text:'与「'+G.marriage.name+'」结为伴侣 💍',type:'safe'});
  const seen=new Set();
  return hls.filter(h=>{if(seen.has(h.text))return false;seen.add(h.text);return true}).slice(0,8);
}

function processChildren(){
  for(let i=G.children.length-1;i>=0;i--){
    const c=G.children[i];
    c.age++;
    const cost=10;
    G.wl=clamp(G.wl-cost,0,100);
    if(G.wl<=0)c.affinity=clamp(c.affinity-5,0,100);
    if(c.age===18){
      const jobs=['普通职员','猎人','ABSC研究员','灯塔教师','自由调查员','伪人大本营版主','无业','里界探险者','杏运商人','独立艺术家'];
      c.occupation=jobs[Math.floor(Math.random()*jobs.length)];
      c.caresForUser=c.affinity>=60&&Math.random()<0.7;
      if(c.caresForUser)G.wl=clamp(G.wl+5,0,100);
    }
  }
}

// ===== 负财富 Debuff =====
function processWealthDebuff(){
  if(G.wl<0){
    const drain=Math.ceil(Math.abs(G.wl)/10);
    G.hp=clamp(G.hp-drain,0,100);
    const existing=G.buffs?G.buffs.find(b=>b.name==='债务缠身'):null;
    if(!existing&&G.buffs)G.buffs.push({name:'债务缠身',icon:'💸',type:'negative',effects:{hp:-drain},duration:999,remaining:999});
  }else if(G.buffs){
    const idx=G.buffs.findIndex(b=>b.name==='债务缠身');
    if(idx>=0)G.buffs.splice(idx,1);
  }
}

function bondInteract(idx){
  const b=G.bonds[idx];if(!b)return;
  const roll=Math.random();
  if(roll<0.6)b.affinity=clamp(b.affinity+Math.floor(Math.random()*5)+1,-100,100);
  else if(roll<0.85)b.affinity=clamp(b.affinity-Math.floor(Math.random()*3),-100,100);
  else b.affinity=clamp(b.affinity+Math.floor(Math.random()*10)+5,-100,100);
  renderBondsPage();
}

function bondApologize(idx){
  const b=G.bonds[idx];if(!b)return;
  b.affinity=clamp(b.affinity+Math.floor(Math.random()*8)+3,-100,100);
  renderBondsPage();
}

function spouseHaveChild(idx){
  const b=G.bonds[idx];if(!b)return;

function spouseDivorce(idx){
  const b=G.bonds[idx];if(!b)return;
  if(!confirm('确定要与「'+b.name+'」离婚吗？'))return;
  b.type='friend';b.affinity=Math.max(-50,b.affinity-50);
  G.children.forEach(c=>{if(c.parentBond===idx)c.affinity=Math.max(0,c.affinity-Math.floor(Math.random()*20))});
  if(Math.random()<0.3){b.affinity=Math.max(-100,b.affinity-30);G.sp=clamp(G.sp-10,0,100)}
  if(G.marriage&&G.marriage.name===b.name)G.marriage=null;
  renderMarriagePage();updUI();
}

}
