<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>里界物语 - 小说阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff6b35;
            --primary-hover: #ff8c5a;
            --background: #faf8f5;
            --text-primary: #333333;
            --text-secondary: #555555;
            --text-light: #888888;
            --border-color: #e8e4e0;
            --card-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 70px;
        }

        /* 顶部搜索栏 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--background);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f0ede9;
            border-radius: 24px;
            padding: 10px 16px;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            margin-left: 8px;
        }

        .search-bar input::placeholder {
            color: var(--text-light);
        }

        /* 分类导航 */
        .categories {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            flex-shrink: 0;
            padding: 8px 18px;
            background: #f0ede9;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .category-chip.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .category-chip:hover {
            background: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
        }

        /* 推荐轮播 */
        .carousel {
            margin: 16px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            height: 180px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            height: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 16px;
            background-size: cover;
            background-position: center;
        }

        .carousel-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.8));
        }

        .carousel-content {
            position: relative;
            z-index: 1;
            color: white;
        }

        .carousel-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .carousel-desc {
            font-size: 13px;
            opacity: 0.9;
        }

        .carousel-dots {
            position: absolute;
            bottom: 12px;
            right: 16px;
            display: flex;
            gap: 6px;
            z-index: 1;
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .carousel-dot.active {
            background: white;
        }

        /* 书架标题 */
        .section-title {
            padding: 0 16px;
            margin: 24px 0 12px;
            font-size: 18px;
            font-weight: 600;
        }

        /* 书架网格 */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 16px;
        }

        @media (min-width: 600px) {
            .bookshelf {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 900px) {
            .bookshelf {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .book-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
        }

        .book-cover {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #ff9a76 0%, #ff6b35 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            overflow: hidden;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-info {
            padding: 12px;
        }

        .book-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-author {
            font-size: 12px;
            color: var(--text-light);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.04);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-item.active {
            color: var(--primary-color);
            background: rgba(255, 107, 53, 0.08);
        }

        .nav-item:hover {
            background: rgba(255, 107, 53, 0.05);
        }

        .nav-icon {
            font-size: 20px;
        }

        /* 分类筛选 */
        .filter-section {
            display: none;
            padding: 0 16px;
            margin-top: 12px;
        }

        .filter-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 顶部搜索栏 -->
    <header class="header">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="搜索小说、角色、里界..." id="searchInput">
        </div>
    </header>

    <!-- 分类导航 -->
    <nav class="categories">
        <a href="#" class="category-chip active" data-filter="all">全部</a>
        <a href="#" class="category-chip" data-filter="characters">人物志</a>
        <a href="#" class="category-chip" data-filter="pseudohumans">伪人录</a>
        <a href="#" class="category-chip" data-filter="realms">里界探秘</a>
        <a href="#" class="category-chip" data-filter="organizations">组织档案</a>
    </nav>

    <!-- 推荐轮播 -->
    <div class="carousel">
        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide" style="background-image: linear-gradient(135deg, #ff9a76 0%, #ff6b35 100%);">
                <div class="carousel-content">
                    <div class="carousel-title">🔥 热门推荐</div>
                    <div class="carousel-desc">探索里界与伪人的神秘世界</div>
                </div>
            </div>
            <div class="carousel-slide" style="background-image: linear-gradient(135deg, #f8b4b0 0%, #e85a71 100%);">
                <div class="carousel-content">
                    <div class="carousel-title">📚 新书上架</div>
                    <div class="carousel-desc">烛灯：揭秘人的最后遗产</div>
                </div>
            </div>
            <div class="carousel-slide" style="background-image: linear-gradient(135deg, #a5dee5 0%, #b5e8f0 100%);">
                <div class="carousel-content">
                    <div class="carousel-title">⚔️ 精彩连载</div>
                    <div class="carousel-desc">绫份：白夜叉的战斗日常</div>
                </div>
            </div>
        </div>
        <div class="carousel-dots">
            <div class="carousel-dot active" data-index="0"></div>
            <div class="carousel-dot" data-index="1"></div>
            <div class="carousel-dot" data-index="2"></div>
        </div>
    </div>

    <!-- 书架 -->
    <h2 class="section-title">📖 我的书架</h2>
    <div class="bookshelf" id="bookshelf">
        <!-- 书籍卡片将由 JS 动态生成 -->
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="./index.html" class="nav-item active">
            <span class="nav-icon">📚</span>
            <span>书架</span>
        </a>
        <a href="./chapters/index.html" class="nav-item">
            <span class="nav-icon">📖</span>
            <span>阅读</span>
        </a>
        <a href="../" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </a>
    </nav>

    <script>
        // 书籍数据
        const books = [
            // 人物志
            { title: "烛灯", author: "折纸月", category: "characters", emoji: "🕯️", color: "linear-gradient(135deg, #ff9a76 0%, #ff6b35 100%)", path: "books/characters/烛灯.html" },
            { title: "绫份", author: "绫份", category: "characters", emoji: "⚔️", color: "linear-gradient(135deg, #f8b4b0 0%, #e85a71 100%)", path: "books/characters/绫份.html" },
            { title: "灼玥", author: "化而为", category: "characters", emoji: "🔥", color: "linear-gradient(135deg, #ff8c61 0%, #ffb347 100%)", path: "books/characters/灼玥.html" },
            { title: "白桦", author: "", category: "characters", emoji: "🌲", color: "linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%)", path: "books/characters/白桦.html" },
            { title: "斯汀先生", author: "海姆姆", category: "characters", emoji: "🎩", color: "linear-gradient(135deg, #e0c3fc 0%, #f8e9d8 100%)", path: "books/characters/斯汀先生.html" },
            { title: "艾尔伯特", author: "海姆姆", category: "characters", emoji: "✨", color: "linear-gradient(135deg, #a5dee5 0%, #d4b5e8 100%)", path: "books/characters/艾尔伯特·帕拉索.html" },
            
            // 伪人录
            { title: "营长", author: "", category: "pseudohumans", emoji: "👁️", color: "linear-gradient(135deg, #d4b5e8 0%, #e8d5f2 100%)", path: "books/pseudohumans/营长.html" },
            { title: "非常玦蝶", author: "", category: "pseudohumans", emoji: "🦋", color: "linear-gradient(135deg, #c3f0db 0%, #f5f5a8 100%)", path: "books/pseudohumans/非常玦蝶.html" },
            { title: "化而为", author: "化而为", category: "pseudohumans", emoji: "💧", color: "linear-gradient(135deg, #a8e6cf 0%, #b5d8e8 100%)", path: "books/pseudohumans/化而为.html" },
            { title: "温塔莎", author: "17.3 赫兹", category: "pseudohumans", emoji: "🐉", color: "linear-gradient(135deg, #d4a5e8 0%, #e87ba0 100%)", path: "books/pseudohumans/温塔莎.html" },
            { title: "独允", author: "化而为", category: "pseudohumans", emoji: "🤖", color: "linear-gradient(135deg, #b5d8e8 0%, #a5c4e8 100%)", path: "books/pseudohumans/独允.html" },
            { title: "西瓜人", author: "", category: "pseudohumans", emoji: "🍉", color: "linear-gradient(135deg, #88d8b0 0%, #a8e6cf 100%)", path: "books/pseudohumans/西瓜人.html" },
            { title: "X", author: "Moriah/太阳", category: "pseudohumans", emoji: "❌", color: "linear-gradient(135deg, #e85a71 0%, #ff8c61 100%)", path: "books/pseudohumans/X.html" },
            
            // 里界探秘
            { title: "人监", author: "调查局", category: "realms", emoji: "🏛️", color: "linear-gradient(135deg, #6b7280 0%, #4b5563 100%)", path: "books/realms/人监.html" },
            { title: "错位花园", author: "调查局", category: "realms", emoji: "🌺", color: "linear-gradient(135deg, #88d8b0 0%, #a8e6cf 100%)", path: "books/realms/错位花园.html" },
            { title: "疫病区", author: "公寓", category: "realms", emoji: "☣️", color: "linear-gradient(135deg, #7a8b99 0%, #5a6b7c 100%)", path: "books/realms/疫病区.html" },
            { title: "风暴海", author: "调查局", category: "realms", emoji: "🌊", color: "linear-gradient(135deg, #a5dee5 0%, #b5e8f0 100%)", path: "books/realms/风暴海.html" },
            { title: "童话国", author: "西陆联盟", category: "realms", emoji: "🏰", color: "linear-gradient(135deg, #e8a5c8 0%, #f5b8d4 100%)", path: "books/realms/童话国.html" },
            { title: "心湖", author: "", category: "realms", emoji: "💫", color: "linear-gradient(135deg, #c8b5e8 0%, #e0d5f0 100%)", path: "books/realms/心湖.html" },
            { title: "天风阁", author: "调查局", category: "realms", emoji: "🏮", color: "linear-gradient(135deg, #ffb347 0%, #ff8c61 100%)", path: "books/realms/天风阁.html" },
            { title: "永远的家", author: "ABSC", category: "realms", emoji: "🏠", color: "linear-gradient(135deg, #ffd8a8 0%, #ffb385 100%)", path: "books/realms/永远的家.html" },
            
            // 组织档案
            { title: "渊", author: "安诺涅", category: "organizations", emoji: "🏙️", color: "linear-gradient(135deg, #a5c4e8 0%, #b5d8e8 100%)", path: "books/organizations/渊.html" },
            { title: "槐安公寓", author: "", category: "organizations", emoji: "🏢", color: "linear-gradient(135deg, #dcedc1 0%, #e8f5d8 100%)", path: "books/organizations/槐安公寓.html" },
            { title: "绿洲", author: "", category: "organizations", emoji: "🌵", color: "linear-gradient(135deg, #a8e6cf 0%, #b5e8a5 100%)", path: "books/organizations/绿洲.html" },
            { title: "西陆联盟", author: "千夜", category: "organizations", emoji: "⛪", color: "linear-gradient(135deg, #e8a5c8 0%, #f5b8d4 100%)", path: "books/organizations/西陆联盟.html" },
            { title: "ABSC", author: "海姆姆", category: "organizations", emoji: "🔬", color: "linear-gradient(135deg, #a5dee5 0%, #b5e8f0 100%)", path: "books/organizations/ABSC.html" }
        ];

        // 渲染书架
        function renderBookshelf(filter = 'all') {
            const bookshelf = document.getElementById('bookshelf');
            bookshelf.innerHTML = '';
            
            const filteredBooks = filter === 'all' 
                ? books 
                : books.filter(book => book.category === filter);
            
            filteredBooks.forEach(book => {
                const card = document.createElement('a');
                card.className = 'book-card';
                card.href = book.path;
                card.innerHTML = `
                    <div class="book-cover" style="background: ${book.color}">
                        ${book.emoji}
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author || '未知'}</div>
                    </div>
                `;
                bookshelf.appendChild(card);
            });
        }

        // 分类筛选
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                renderBookshelf(chip.dataset.filter);
            });
        });

        // 轮播图
        let currentSlide = 0;
        const track = document.getElementById('carouselTrack');
        const dots = document.querySelectorAll('.carousel-dot');
        
        function updateCarousel() {
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                currentSlide = i;
                updateCarousel();
            });
        });

        // 自动轮播
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            updateCarousel();
        }, 4000);

        // 搜索功能
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.toLowerCase();
                const matched = books.find(book => book.title.toLowerCase().includes(query));
                if (matched) {
                    window.location.href = matched.path;
                }
            }
        });

        // 初始化
        renderBookshelf();
    </script>
</body>
</html>
