<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错位花园 - 里界探秘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; min-height: 100vh; }
        .header { padding: 16px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #333; text-decoration: none; }
        .cover-section { display: flex; padding: 24px 16px; gap: 16px; }
        .cover-image { width: 140px; height: 200px; background-image: url('./covers/错位花园.jpg'); background-size: cover; background-position: center; border-radius: 8px; flex-shrink: 0; }
        .book-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .book-title { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .book-author { font-size: 14px; color: #666; margin-bottom: 4px; }
        .book-status { font-size: 12px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .description-section { padding: 16px; border-bottom: 1px solid #eee; }
        .section-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 12px; }
        .description-text { font-size: 14px; color: #555; line-height: 1.8; }
        .tags-section { padding: 16px; border-bottom: 1px solid #eee; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-size: 12px; color: #00b894; background: #f0fffa; padding: 4px 12px; border-radius: 16px; }
        .chapters-section { padding: 16px; border-bottom: 1px solid #eee; }
        .chapter-list { list-style: none; }
        .chapter-item { padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .chapter-item:last-child { border-bottom: none; }
        .chapter-link { display: block; font-size: 14px; color: #333; text-decoration: none; }
        .chapter-link:hover { color: #00b894; }
        .actions-section { padding: 16px; display: flex; gap: 12px; position: sticky; bottom: 0; background: #fff; border-top: 1px solid #eee; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-secondary { background: #f5f5f5; color: #333; }
        .btn-primary { background: linear-gradient(135deg, #00b894 0%, #55efc4 100%); color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../index.html" class="back-btn">←</a>
        </div>
        <div class="cover-section">
            <div class="cover-image"></div>
            <div class="book-info">
                <div class="book-title">错位花园</div>
                <div class="book-author">归属：调查局</div>
                <div class="book-status">里界探秘</div>
            </div>
        </div>
        <div class="description-section">
            <div class="section-title">里界简介</div>
            <div class="description-text">
                <p>一个植物实验室风格的里界，亚契·谜思，赫卡忒，荆千棘的来源</p>
            </div>
        </div>
        <div class="tags-section">
            <div class="section-title">标签</div>
            <div class="tags">
                <span class="tag">调查局</span>
                <span class="tag">里界探秘</span>
                <span class="tag">植物实验室</span>
            </div>
        </div>
        <div class="chapters-section">
            <div class="section-title">相关信息</div>
            <ul class="chapter-list">
                <li class="chapter-item"><a href="../index.html" class="chapter-link">→ 返回角色列表</a></li>
            </ul>
        </div>
        <div class="actions-section">
            <a href="../index.html" class="action-btn btn-secondary">返回列表</a>
            <a href="../index.html" class="action-btn btn-primary">查看更多</a>
        </div>
    </div>
</body>
</html>
