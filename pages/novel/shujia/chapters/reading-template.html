<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - 里界物语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', '宋体', serif;
            background: #faf8f5;
            min-height: 100vh;
            color: #4a4a4a;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(74, 74, 74, 0.1);
            z-index: 1000;
        }
        
        .nav-left, .nav-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .nav-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        
        .nav-btn.secondary {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
        }
        
        /* 字体大小调节 */
        .font-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(231, 76, 60, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        .font-btn {
            background: rgba(231, 76, 60, 0.2);
            border: none;
            color: #4a4a4a;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .font-btn:hover {
            background: rgba(231, 76, 60, 0.3);
            transform: scale(1.1);
        }
        
        /* 正文区域 */
        .content-wrapper {
            max-width: 800px;
            margin: 100px auto 120px;
            padding: 40px;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .chapter-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        
        .chapter-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }
        
        .chapter-subtitle {
            font-size: 1.2em;
            color: #a0a0a0;
            font-style: italic;
        }
        
        .chapter-content {
            font-size: 18px;
            line-height: 2;
            text-align: justify;
        }
        
        .chapter-content p {
            margin-bottom: 25px;
            text-indent: 2em;
        }
        
        .chapter-content p:first-child {
            text-indent: 0;
        }
        
        /* 底部翻页 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        
        .page-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .page-btn.disabled {
            background: rgba(255,255,255,0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 目录面板 */
        .toc-panel {
            position: fixed;
            top: 80px;
            right: -350px;
            width: 320px;
            background: rgba(26, 26, 46, 0.98);
            border-radius: 20px 0 0 20px;
            padding: 30px;
            transition: right 0.3s ease;
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.1);
            border-right: none;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        
        .toc-panel.open {
            right: 0;
        }
        
        .toc-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .toc-list {
            list-style: none;
        }
        
        .toc-list li {
            margin-bottom: 12px;
        }
        
        .toc-list a {
            color: #e8e8e8;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .toc-list a:hover,
        .toc-list a.active {
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }
        
        .toc-toggle {
            position: fixed;
            top: 100px;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 12px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            z-index: 998;
            transition: all 0.3s ease;
        }
        
        .toc-toggle:hover {
            padding-right: 20px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .content-wrapper {
                margin: 80px auto 100px;
                padding: 25px;
            }
            
            .chapter-title {
                font-size: 1.8em;
            }
            
            .chapter-content {
                font-size: 16px;
            }
            
            .top-nav {
                padding: 12px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .bottom-nav {
                padding: 15px 20px;
                flex-wrap: wrap;
            }
            
            .toc-panel {
                width: 280px;
                right: -300px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="../../index.html" class="nav-btn">← 返回</a>
            <a href="#" class="nav-btn secondary" onclick="toggleTOC()">📑 目录</a>
        </div>
        <div class="font-control">
            <span>字体:</span>
            <button class="font-btn" onclick="adjustFont(-1)">A-</button>
            <span id="fontSize">18</span>
            <button class="font-btn" onclick="adjustFont(1)">A+</button>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-btn" onclick="toggleSettings()">⚙️ 设置</a>
        </div>
    </nav>
    
    <!-- 目录面板 -->
    <button class="toc-toggle" onclick="toggleTOC()">☰</button>
    <div class="toc-panel" id="tocPanel">
        <h3 class="toc-title">📖 章节目录</h3>
        <ul class="toc-list" id="tocList">
            <!-- 动态生成 -->
        </ul>
    </div>
    
    <!-- 正文区域 -->
    <div class="content-wrapper">
        <div class="chapter-header">
            <h1 class="chapter-title">{{TITLE}}</h1>
            <p class="chapter-subtitle">{{SUBTITLE}}</p>
        </div>
        <div class="chapter-content" id="content">
            {{CONTENT}}
        </div>
    </div>
    
    <!-- 底部翻页 -->
    <div class="bottom-nav">
        <a href="{{PREV}}" class="page-btn {{PREV_CLASS}}">← 上一章</a>
        <a href="{{TOC_LINK}}" class="page-btn">📋 目录</a>
        <a href="{{NEXT}}" class="page-btn {{NEXT_CLASS}}">下一章 →</a>
    </div>
    
    <script>
        // 字体大小调节
        let currentFontSize = 18;
        
        function adjustFont(delta) {
            currentFontSize = Math.max(14, Math.min(24, currentFontSize + delta));
            document.getElementById('fontSize').textContent = currentFontSize;
            document.getElementById('content').style.fontSize = currentFontSize + 'px';
            localStorage.setItem('readerFontSize', currentFontSize);
        }
        
        // 加载保存的字体大小
        const savedFontSize = localStorage.getItem('readerFontSize');
        if (savedFontSize) {
            currentFontSize = parseInt(savedFontSize);
            document.getElementById('fontSize').textContent = currentFontSize;
            document.getElementById('content').style.fontSize = currentFontSize + 'px';
        }
        
        // 目录切换
        function toggleTOC() {
            document.getElementById('tocPanel').classList.toggle('open');
        }
        
        // 设置面板（可扩展）
        function toggleSettings() {
            alert('设置功能开发中...\n\n可调节：\n- 主题颜色\n- 阅读模式\n- 书签管理');
        }
        
        // 高亮当前章节
        const currentChapter = window.location.pathname.split('/').pop();
        document.querySelectorAll('.toc-list a').forEach(link => {
            if (link.getAttribute('href').includes(currentChapter)) {
                link.classList.add('active');
            }
        });
        
        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                const prevLink = document.querySelector('.page-btn:not(.disabled):first-of-type');
                if (prevLink && prevLink.getAttribute('href') !== '#') {
                    window.location.href = prevLink.getAttribute('href');
                }
            } else if (e.key === 'ArrowRight') {
                const nextLink = document.querySelector('.page-btn:not(.disabled):last-of-type');
                if (nextLink && nextLink.getAttribute('href') !== '#') {
                    window.location.href = nextLink.getAttribute('href');
                }
            } else if (e.key === 'Escape') {
                document.getElementById('tocPanel').classList.remove('open');
            }
        });
    </script>
</body>
</html>
        }
        });
    </script>
</body>
</html>
