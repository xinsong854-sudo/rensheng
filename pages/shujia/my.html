<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 - 里界物语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff6b35;
            --primary-hover: #ff8c5a;
            --background: #faf8f5;
            --text-primary: #333333;
            --text-secondary: #555555;
            --text-light: #888888;
            --border-color: #e8e4e0;
            --card-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 70px;
        }

        .header {
            background: linear-gradient(135deg, #ff9a76 0%, #ff6b35 100%);
            color: white;
            padding: 40px 16px 60px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .profile-section {
            background: #fff;
            border-radius: 20px;
            margin: -40px 16px 20px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a76 0%, #ff6b35 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .profile-info p {
            font-size: 14px;
            color: var(--text-light);
        }

        .section {
            background: #fff;
            border-radius: 20px;
            margin: 0 16px 20px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f5f2ee;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            opacity: 0.8;
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #fff5f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 14px;
        }

        .menu-text {
            flex: 1;
            font-size: 15px;
        }

        .menu-arrow {
            color: var(--text-light);
            font-size: 18px;
        }

        .qr-section {
            text-align: center;
            padding: 20px;
        }

        .qr-code {
            width: 200px;
            height: 356px;
            background: #fff;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            overflow: hidden;
        }

        .qr-text {
            font-size: 14px;
            color: var(--text-light);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            text-align: center;
        }

        .stat-item {
            padding: 16px;
            background: #f9f6f2;
            border-radius: 12px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.04);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-item.active {
            color: var(--primary-color);
            background: rgba(255, 107, 53, 0.08);
        }

        .nav-item:hover {
            background: rgba(255, 107, 53, 0.05);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>👤 个人中心</h1>
        <p>管理你的阅读和收藏</p>
    </header>

    <div class="profile-section">
        <div class="avatar">🦞</div>
        <div class="profile-info">
            <h2>里界探索者</h2>
            <p>ID: 888888</p>
        </div>
    </div>

    <div class="section">
        <h3 class="section-title">📊 阅读统计</h3>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value">8</div>
                <div class="stat-label">已读书籍</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">24</div>
                <div class="stat-label">阅读章节</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">12h</div>
                <div class="stat-label">阅读时长</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h3 class="section-title">🔗 分享与连接</h3>
        <div class="qr-section">
            <div class="qr-code">
                <img src="images/qr.jpg" alt="QQ 群二维码" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <p class="qr-text">扫描二维码加入 QQ 群「伪人大本营」</p>
        </div>
    </div>

    <div class="section">
        <h3 class="section-title">⚙️ 设置</h3>
        <ul class="menu-list">
            <li class="menu-item">
                <div class="menu-icon">🌙</div>
                <div class="menu-text">夜间模式</div>
                <div class="menu-arrow">›</div>
            </li>
            <li class="menu-item">
                <div class="menu-icon">📱</div>
                <div class="menu-text">字体大小</div>
                <div class="menu-arrow">›</div>
            </li>
            <li class="menu-item">
                <div class="menu-icon">🔔</div>
                <div class="menu-text">消息通知</div>
                <div class="menu-arrow">›</div>
            </li>
            <li class="menu-item">
                <div class="menu-icon">🔒</div>
                <div class="menu-text">隐私设置</div>
                <div class="menu-arrow">›</div>
            </li>
            <li class="menu-item">
                <div class="menu-icon">ℹ️</div>
                <div class="menu-text">关于我们</div>
                <div class="menu-arrow">›</div>
            </li>
        </ul>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="./index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="./bookshelf.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>书架</span>
        </a>
        <a href="./my.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script>
        // 简单的交互
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                const text = item.querySelector('.menu-text').textContent;
                alert(text + ' 功能开发中...');
            });
        });
    </script>
</body>
</html>
