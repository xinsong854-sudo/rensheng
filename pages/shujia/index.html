<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页 - 里界物语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-color: #ff4d4f;
            --primary-hover: #ff6b6d;
            --primary-light: rgba(255, 77, 79, 0.08);
            --background: #faf8f5;
            --background-card: #ffffff;
            --text-primary: #333333;
            --text-secondary: #555555;
            --text-light: #888888;
            --border-color: #e8e4e0;
            --card-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== 顶部搜索栏 ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 28px;
            padding: 12px 18px;
            transition: all 0.2s ease;
        }

        .search-bar:focus-within {
            background: #ebebeb;
            box-shadow: 0 0 0 2px rgba(255, 77, 79, 0.15);
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            margin-left: 8px;
            color: var(--text-primary);
        }

        .search-bar input::placeholder {
            color: var(--text-light);
        }

        /* ========== 分类导航芯片 ========== */
        .categories {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            flex-shrink: 0;
            padding: 8px 20px;
            background: #f5f5f5;
            border: 1px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
        }

        .category-chip.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(255, 77, 79, 0.3);
        }

        .category-chip:hover {
            background: rgba(255, 77, 79, 0.08);
            color: var(--primary-color);
            border-color: rgba(255, 77, 79, 0.3);
        }

        /* ========== 推荐轮播 - 加大高度 ========== */
        .carousel {
            margin: 16px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            height: 220px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        @media (min-width: 500px) {
            .carousel {
                height: 260px;
            }
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            height: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 16px;
            background: none;
            overflow: hidden;
        }

        .carousel-slide img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.85));
        }

        .carousel-content {
            position: relative;
            z-index: 1;
            color: white;
            width: 100%;
        }

        .carousel-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .carousel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .carousel-desc {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.4;
        }

        .carousel-dots {
            position: absolute;
            bottom: 12px;
            right: 16px;
            display: flex;
            gap: 6px;
            z-index: 1;
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .carousel-dot.active {
            background: white;
            width: 18px;
            border-radius: 3px;
        }

        /* ========== 分区标题 ========== */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            margin: 28px 0 14px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #ff6b6d 0%, #ff4d4f 100%);
            border-radius: 2px;
        }

        .section-more {
            font-size: 13px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-more:hover {
            color: var(--primary-hover);
        }

        /* ========== 分类卡片网格 ========== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        @media (min-width: 500px) {
            .categories-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
        }

        @media (min-width: 768px) {
            .categories-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 14px;
            }
        }

        .category-card {
            background: var(--background-card);
            border-radius: var(--radius-lg);
            padding: 18px 12px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
            border-color: rgba(255, 107, 53, 0.2);
        }

        .category-card.active {
            background: linear-gradient(135deg, #fff5f5 0%, #ffecec 100%);
            border-color: var(--primary-color);
        }

        .category-icon-wrapper {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e4e0 100%);
            transition: all 0.3s ease;
        }

        .category-card.active .category-icon-wrapper {
            background: linear-gradient(135deg, #ff6b6d 0%, #ff4d4f 100%);
        }

        .category-card:hover .category-icon-wrapper {
            transform: scale(1.1);
        }

        .category-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .category-count {
            font-size: 11px;
            color: var(--text-light);
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .category-card.active .category-count {
            background: rgba(255, 77, 79, 0.15);
            color: var(--primary-color);
        }

        /* ========== 推荐横向滚动 ========== */
        .recommendations {
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .recommendation-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 8px 0;
            margin: 0 -16px;
            padding: 8px 16px;
        }

        .recommendation-row::-webkit-scrollbar {
            display: none;
        }

        .recommendation-card {
            flex-shrink: 0;
            width: 110px;
            background: var(--background-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .recommendation-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--card-shadow-hover);
            border-color: rgba(255, 107, 53, 0.2);
        }

        .recommendation-cover {
            aspect-ratio: 3/4;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e4e0 100%);
            position: relative;
            overflow: hidden;
        }

        .recommendation-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recommendation-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 60%, rgba(0,0,0,0.1));
        }

        .recommendation-info {
            padding: 8px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .recommendation-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .recommendation-author {
            font-size: 10px;
            color: var(--text-light);
        }

        /* ========== 书架网格 ========== */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 16px;
        }

        @media (min-width: 500px) {
            .bookshelf {
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
            }
        }

        @media (min-width: 768px) {
            .bookshelf {
                grid-template-columns: repeat(6, 1fr);
                gap: 16px;
            }
        }

        .book-card {
            background: var(--background-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow-hover);
            border-color: rgba(255, 107, 53, 0.2);
        }

        .favorite-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .favorite-btn:hover {
            background: #fff;
            color: var(--primary-color);
            transform: scale(1.12);
            box-shadow: 0 4px 12px rgba(255, 77, 79, 0.25);
        }

        .favorite-btn.active {
            color: var(--primary-color);
            background: #fff5f0;
        }

        .book-cover {
            aspect-ratio: 3/4;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e4e0 100%);
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 70%, rgba(0,0,0,0.05));
        }

        /* 在读标签 */
        .reading-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 3px 8px;
            background: rgba(255, 77, 79, 0.95);
            color: white;
            font-size: 10px;
            font-weight: 600;
            border-radius: 8px;
            z-index: 5;
        }

        /* 评分显示 */
        .book-rating {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            color: #ff9500;
            margin-top: 3px;
            font-weight: 600;
        }

        .book-info {
            padding: 10px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .book-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 36px;
            color: var(--text-primary);
        }

        .book-author {
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== 装饰元素 ========== */
        .decorative-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 20px 0;
        }

        /* ========== 底部导航 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.04);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 11px;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--primary-color);
            background: var(--primary-light);
        }

        .nav-item:hover {
            background: var(--primary-light);
        }

        .nav-icon {
            font-size: 22px;
            transition: transform 0.2s ease;
        }

        .nav-item:hover .nav-icon {
            transform: scale(1.1);
        }

        /* ========== 横屏优化 ========== */
        @media (orientation: landscape) and (max-height: 500px) {
            .carousel {
                height: 140px;
                margin: 10px;
            }
            
            .categories-grid {
                grid-template-columns: repeat(6, 1fr);
            }
            
            .bookshelf {
                grid-template-columns: repeat(6, 1fr);
            }
            
            .section-header {
                margin: 16px 0 10px;
            }
        }

        /* ========== 平板适配 ========== */
        @media (min-width: 768px) {
            body {
                max-width: 1200px;
                margin: 0 auto;
                border-left: 1px solid var(--border-color);
                border-right: 1px solid var(--border-color);
            }
            
            .header,
            .categories,
            .section-header,
            .recommendations,
            .bookshelf {
                padding-left: 24px;
                padding-right: 24px;
            }
            
            .carousel {
                margin-left: 24px;
                margin-right: 24px;
                border-radius: var(--radius-xl);
            }
        }
    </style>
</head>

            // 伪人录
            { title: "非常玦蝶", author: "", category: "pseudohumans", emoji: "🦋", color: "linear-gradient(135deg, #c3f0db 0%, #f5f5a8 100%)", cover: "./covers/非常玦蝶.jpg", path: "books/pseudohumans/非常玦蝶.html" },
            { title: "化而为", author: "化而为", category: "pseudohumans", emoji: "💧", color: "linear-gradient(135deg, #a8e6cf 0%, #b5d8e8 100%)", cover: "./covers/化而为.jpg", path: "books/pseudohumans/化而为.html" },
            { title: "温塔莎", author: "17.3 赫兹", category: "pseudohumans", emoji: "🐉", color: "linear-gradient(135deg, #d4a5e8 0%, #e87ba0 100%)", cover: "./covers/温塔莎.jpg", path: "books/pseudohumans/温塔莎.html" },
            { title: "独允", author: "化而为", category: "pseudohumans", emoji: "🤖", color: "linear-gradient(135deg, #b5d8e8 0%, #a5c4e8 100%)", cover: "./covers/独允.jpg", path: "books/pseudohumans/独允.html" },
            { title: "西瓜人", author: "", category: "pseudohumans", emoji: "🍉", color: "linear-gradient(135deg, #88d8b0 0%, #a8e6cf 100%)", cover: "./covers/西瓜人.jpg", path: "books/pseudohumans/西瓜人.html" },
            { title: "X", author: "Moriah/太阳", category: "pseudohumans", emoji: "❌", color: "linear-gradient(135deg, #e85a71 0%, #ff8c61 100%)", cover: "./covers/X.jpg", path: "books/pseudohumans/X.html" },
            
            // 里界探秘
            { title: "人监", author: "调查局", category: "realms", emoji: "🏛️", color: "linear-gradient(135deg, #6b7280 0%, #4b5563 100%)", cover: "./covers/人监.jpg", path: "books/realms/人监.html" },
            { title: "错位花园", author: "调查局", category: "realms", emoji: "🌺", color: "linear-gradient(135deg, #88d8b0 0%, #a8e6cf 100%)", cover: "./covers/错位花园.jpg", path: "books/realms/错位花园.html" },
            { title: "疫病区", author: "公寓", category: "realms", emoji: "☣️", color: "linear-gradient(135deg, #7a8b99 0%, #5a6b7c 100%)", cover: "./covers/疫病区.jpg", path: "books/realms/疫病区.html" },
            { title: "风暴海", author: "调查局", category: "realms", emoji: "🌊", color: "linear-gradient(135deg, #a5dee5 0%, #b5e8f0 100%)", cover: "./covers/风暴海.jpg", path: "books/realms/风暴海.html" },
            { title: "童话国", author: "西陆联盟", category: "realms", emoji: "🏰", color: "linear-gradient(135deg, #e8a5c8 0%, #f5b8d4 100%)", cover: "./covers/童话国.jpg", path: "books/realms/童话国.html" },
            { title: "心湖", author: "", category: "realms", emoji: "💫", color: "linear-gradient(135deg, #c8b5e8 0%, #e0d5f0 100%)", cover: "./covers/心湖.jpg", path: "books/realms/心湖.html" },
            { title: "天风阁", author: "调查局", category: "realms", emoji: "🏮", color: "linear-gradient(135deg, #ffb347 0%, #ff8c61 100%)", cover: "./covers/天风阁.jpg", path: "books/realms/天风阁.html" },
            { title: "永远的家", author: "ABSC", category: "realms", emoji: "🏠", color: "linear-gradient(135deg, #ffd8a8 0%, #ffb385 100%)", cover: "./covers/永远的家.jpg", path: "books/realms/永远的家.html" },
            
            // 组织档案
            { title: "渊", author: "安诺涅", category: "organizations", emoji: "🏙️", color: "linear-gradient(135deg, #a5c4e8 0%, #b5d8e8 100%)", cover: "./covers/渊.jpg", path: "books/organizations/渊.html" },
            { title: "槐安公寓", author: "", category: "organizations", emoji: "🏢", color: "linear-gradient(135deg, #dcedc1 0%, #e8f5d8 100%)", cover: "./covers/槐安公寓.jpg", path: "books/organizations/槐安公寓.html" },
            { title: "绿洲", author: "", category: "organizations", emoji: "🌵", color: "linear-gradient(135deg, #a8e6cf 0%, #b5e8a5 100%)", cover: "./covers/绿洲.jpg", path: "books/organizations/绿洲.html" },
            { title: "西陆联盟", author: "千夜", category: "organizations", emoji: "⛪", color: "linear-gradient(135deg, #e8a5c8 0%, #f5b8d4 100%)", cover: "./covers/西陆联盟.jpg", path: "books/organizations/西陆联盟.html" },
            { title: "ABSC", author: "海姆姆", category: "organizations", emoji: "🔬", color: "linear-gradient(135deg, #a5dee5 0%, #b5e8f0 100%)", cover: "./covers/ABSC.jpg", path: "books/organizations/ABSC.html" }
        ];

        // 分类数据
        const categoryData = {
            all: { name: '全部', icon: '📚' },
            characters: { name: '人物志', icon: '👤' },
            pseudohumans: { name: '伪人录', icon: '👁️' },
            realms: { name: '里界探秘', icon: '🌍' },
            organizations: { name: '组织档案', icon: '🏛️' }
        };

        // 渲染分类网格
        function renderCategories(activeFilter = 'all') {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = '';
            
            Object.entries(categoryData).forEach(([key, data]) => {
                const count = key === 'all' 
                    ? books.length 
                    : books.filter(book => book.category === key).length;
                
                const card = document.createElement('a');
                card.className = `category-card ${activeFilter === key ? 'active' : ''}`;
                card.href = '#';
                card.innerHTML = `
                    <div class="category-icon-wrapper">${data.icon}</div>
                    <div class="category-name">${data.name}</div>
                    <div class="category-count">${count} 部</div>
                `;
                card.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    renderBookshelf(key);
                    document.querySelector(`.category-chip[data-filter="${key}"]`)?.classList.add('active');
                });
                grid.appendChild(card);
            });
        }

        // 渲染推荐
        function renderRecommendations() {
            const container = document.getElementById('recommendations');
            container.innerHTML = '';
            
            // 精选推荐：每个分类选 1-2 本
            const recommended = [
                books.find(b => b.title === '烛灯'),
                books.find(b => b.title === '绫份'),
                books.find(b => b.title === '营长'),
                books.find(b => b.title === '人监'),
                books.find(b => b.title === '渊'),
                books.find(b => b.title === '灼玥'),
                books.find(b => b.title === '化而为')
            ].filter(Boolean);
            
            const row = document.createElement('div');
            row.className = 'recommendation-row';
            
            recommended.forEach(book => {
                const card = document.createElement('a');
                card.className = 'recommendation-card';
                card.href = book.path;
                card.innerHTML = `
                    <div class="recommendation-cover">
                        <img src="${book.cover}" alt="${book.title}" onerror="this.style.display='none';this.parentElement.innerHTML='${book.emoji}'">
                    </div>
                    <div class="recommendation-info">
                        <div class="recommendation-title">${book.title}</div>
                        <div class="recommendation-author">${book.author || '未知'}</div>
                    </div>
                `;
                row.appendChild(card);
            });
            
            container.appendChild(row);
        }

        // 渲染书架
        function renderBookshelf(filter = 'all') {
            const bookshelf = document.getElementById('bookshelf');
            const bookCount = document.getElementById('bookCount');
            bookshelf.innerHTML = '';
            
            const filteredBooks = filter === 'all' 
                ? books 
                : books.filter(book => book.category === filter);
            
            bookCount.textContent = `共 ${filteredBooks.length} 部`;
            
            filteredBooks.forEach(book => {
                const card = document.createElement('a');
                card.className = 'book-card';
                card.href = book.path;
                card.dataset.bookId = book.title;
                card.innerHTML = `
                    <button class="favorite-btn" onclick="event.preventDefault(); toggleFavoriteFromIndex(this, '${book.title}'); return false;" title="加入书架">♡</button>
                    <div class="book-cover">
                        <img src="${book.cover}" alt="${book.title}" onerror="this.style.display='none';this.parentElement.innerHTML='${book.emoji}'">
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author || '未知'}</div>
                    </div>
                `;
                bookshelf.appendChild(card);
            });
        }

        // 分类筛选（顶部导航）
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                renderBookshelf(chip.dataset.filter);
                document.querySelector(`.category-card[data-filter="${chip.dataset.filter}"]`)?.classList.add('active');
            });
        });

        // 轮播图
        let currentSlide = 0;
        const track = document.getElementById('carouselTrack');
        const dots = document.querySelectorAll('.carousel-dot');
        
        function updateCarousel() {
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                currentSlide = i;
                updateCarousel();
            });
        });

        // 自动轮播
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            updateCarousel();
        }, 4000);

        // 搜索功能
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.toLowerCase();
                const matched = books.find(book => book.title.toLowerCase().includes(query));
                if (matched) {
                    window.location.href = matched.path;
                }
            }
        });

        // 书架功能：切换收藏状态
        function toggleFavoriteFromIndex(btn, bookTitle) {
            const book = books.find(b => b.title === bookTitle);
            if (!book) return;
            
            const bookId = book.title;
            const bookData = {
                id: bookId,
                title: book.title,
                subtitle: book.author || '',
                cover: book.cover,
                url: book.path
            };
            
            const favorites = getBookshelf();
            const index = favorites.findIndex(b => b.id === bookId);
            
            if (index === -1) {
                favorites.push(bookData);
                saveBookshelf(favorites);
                btn.textContent = '♥';
                btn.classList.add('active');
                btn.title = '已收藏';
            } else {
                favorites.splice(index, 1);
                saveBookshelf(favorites);
                btn.textContent = '♡';
                btn.classList.remove('active');
                btn.title = '加入书架';
            }
        }
        
        function getBookshelf() {
            const data = localStorage.getItem('annuonie_bookshelf');
            return data ? JSON.parse(data) : [];
        }
        
        function saveBookshelf(favorites) {
            localStorage.setItem('annuonie_bookshelf', JSON.stringify(favorites));
        }
        
        // 页面加载时更新收藏按钮状态
        document.addEventListener('DOMContentLoaded', function() {
            const favorites = getBookshelf();
            document.querySelectorAll('.favorite-btn').forEach(btn => {
                const card = btn.closest('.book-card');
                const bookTitle = card.dataset.bookId;
                const isFavorite = favorites.some(b => b.id === bookTitle);
                if (isFavorite) {
                    btn.textContent = '♥';
                    btn.classList.add('active');
                    btn.title = '已收藏';
                }
            });
        });
        
        // 初始化
        renderCategories();
        renderRecommendations();
        renderBookshelf();
    </script>
</body>
</html>
