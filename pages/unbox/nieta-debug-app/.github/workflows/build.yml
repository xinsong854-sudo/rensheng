name: Build Android APK

on:
  push:
    paths:
      - 'pages/unbox/nieta-debug-app/**'
  pull_request:
    paths:
      - 'pages/unbox/nieta-debug-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x pages/unbox/nieta-debug-app/gradlew
      working-directory: pages/unbox/nieta-debug-app
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: pages/unbox/nieta-debug-app
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nieta-debug-app
        path: pages/unbox/nieta-debug-app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: pages/unbox/nieta-debug-app/app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
