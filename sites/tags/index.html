<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生图标签库 - Danbooru 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #4a4a6a;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .search-box {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 0;
            backdrop-filter: blur(10px);
        }
        
        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #4a4a6a;
            border-radius: 25px;
            background: #2a2a4a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #6a6aaa;
        }
        
        .search-input::placeholder {
            color: #888;
        }
        
        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .category-nav::-webkit-scrollbar {
            height: 6px;
        }
        
        .category-nav::-webkit-scrollbar-track {
            background: #2a2a4a;
            border-radius: 3px;
        }
        
        .category-nav::-webkit-scrollbar-thumb {
            background: #4a4a6a;
            border-radius: 3px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background: #2a2a4a;
            border: 1px solid #4a4a6a;
            border-radius: 20px;
            color: #ccc;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .nav-btn:hover,
        .nav-btn.active {
            background: #4a4a6a;
            color: #fff;
            border-color: #6a6aaa;
        }
        
        .categories {
            display: grid;
            gap: 30px;
        }
        
        .category {
            background: rgba(42, 42, 74, 0.8);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #4a4a6a;
        }
        
        .category-header {
            padding: 15px 20px;
            background: rgba(74, 74, 106, 0.5);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .category-title {
            font-size: 1.2rem;
            color: #fff;
        }
        
        .category-count {
            color: #888;
            font-size: 0.85rem;
        }
        
        .category-toggle {
            font-size: 1.2rem;
            color: #888;
            transition: transform 0.3s;
        }
        
        .category.open .category-toggle {
            transform: rotate(180deg);
        }
        
        .subcategory {
            padding: 15px 20px;
            border-bottom: 1px solid #3a3a5a;
        }
        
        .subcategory:last-child {
            border-bottom: none;
        }
        
        .subcategory-title {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #4a4a6a;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            padding: 6px 12px;
            background: #1a1a2e;
            border: 1px solid #4a4a6a;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        .tag:hover {
            background: #4a4a6a;
            color: #fff;
            border-color: #6a6aaa;
        }
        
        .tag:active {
            transform: scale(0.95);
        }
        
        .tag.copied {
            background: #2d5a2d;
            border-color: #4a8a4a;
            color: #fff;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(45, 90, 45, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .stats {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.85rem;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }
            
            .container {
                padding: 15px;
            }
            
            .category-header {
                padding: 12px 15px;
            }
            
            .category-title {
                font-size: 1rem;
            }
            
            .subcategory {
                padding: 12px 15px;
            }
            
            .tag {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

        <div class="stats" id="stats"></div>

        let totalTags = 0;
        for (const cat in tagData) {
            for (const sub in tagData[cat]) {
                totalTags += tagData[cat][sub].length;
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories');
            const nav = document.getElementById('categoryNav');
            
            let navHtml = '<button class="nav-btn active" data-category="all">全部</button>';
            let html = '';
            let catIndex = 0;
            
            for (const [catName, subcats] of Object.entries(tagData)) {
                navHtml += `<button class="nav-btn" data-category="${catIndex}">${catName}</button>`;
                
                let subcatHtml = '';
                let tagCount = 0;
                
                for (const [subName, tags] of Object.entries(subcats)) {
                    tagCount += tags.length;
                    subcatHtml += `
                        <div class="subcategory" data-subcategory="${subName.toLowerCase()}">
                            <div class="subcategory-title">${subName} (${tags.length})</div>
                            <div class="tags">
                                ${tags.map(tag => `<span class="tag" data-tag="${tag}">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                
                html += `
                    <div class="category open" data-category="${catIndex}" data-catname="${catName}">
                        <div class="category-header">
                            <div>
                                <span class="category-title">${catName}</span>
                                <span class="category-count">(${tagCount} 标签)</span>
                            </div>
                            <span class="category-toggle">▼</span>
                        </div>
                        <div class="category-content">
                            ${subcatHtml}
                        </div>
                    </div>
                `;
                catIndex++;
            }
            
            nav.innerHTML = navHtml;
            container.innerHTML = html;
            document.getElementById('stats').textContent = `总计 ${Object.keys(tagData).length} 个分类 · ${totalTags} 个标签`;
            
            attachEventListeners();
        }

        function attachEventListeners() {
            // 分类导航
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const cat = btn.dataset.category;
                    document.querySelectorAll('.category').forEach((el, idx) => {
                        if (cat === 'all' || idx == cat) {
                            el.classList.remove('hidden');
                        } else {
                            el.classList.add('hidden');
                        }
                    });
                });
            });
            
            // 分类展开/折叠
            document.querySelectorAll('.category-header').forEach(header => {
                header.addEventListener('click', () => {
                    const cat = header.parentElement;
                    cat.classList.toggle('open');
                    const content = header.nextElementSibling;
                    content.style.display = cat.classList.contains('open') ? 'block' : 'none';
                });
            });
            
            // 标签复制
            document.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const text = tag.dataset.tag;
                    try {
                        await navigator.clipboard.writeText(text);
                        tag.classList.add('copied');
                        showToast(`✅ 已复制：${text}`);
                        setTimeout(() => tag.classList.remove('copied'), 1000);
                    } catch (err) {
                        showToast('❌ 复制失败');
                    }
                });
            });
            
            // 搜索
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                document.querySelectorAll('.subcategory').forEach(sub => {
                    const tags = sub.querySelectorAll('.tag');
                    let hasMatch = false;
                    
                    tags.forEach(tag => {
                        const tagName = tag.dataset.tag.toLowerCase();
                        if (query === '' || tagName.includes(query)) {
                            tag.style.display = 'block';
                            hasMatch = true;
                        } else {
                            tag.style.display = 'none';
                        }
                    });
                    
                    sub.style.display = hasMatch ? 'block' : 'none';
                });
                
                document.querySelectorAll('.category').forEach(cat => {
                    const visibleSubs = cat.querySelectorAll('.subcategory[style="display: block;"], .subcategory:not([style*="display: none"])');
                    cat.style.display = visibleSubs.length > 0 ? 'block' : 'none';
                });
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 初始化
        renderCategories();
    </script>
