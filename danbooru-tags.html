        .disclaimer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .disclaimer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .disclaimer-content {
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            max-width: 90%;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

        .disclaimer-content h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        .disclaimer-content p {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .category {
            margin-bottom: 12px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #eee;
        }

        .category-header:active {
            background: #e9ecef;
            transform: scale(0.98);
        }

        .category-header.active {
            background: #4a9eff;
            color: #fff;
            border-color: #4a9eff;
        }

        .category-title {
            font-size: 16px;
            font-weight: 500;
            flex: 1;
        }

        .category-icon {
            font-size: 18px;
            transition: transform 0.3s ease;
            margin-left: 10px;
        }

        .category-header.active .category-icon {
            transform: rotate(180deg);
        }

        .subcategory {
            display: none;
            margin-left: 15px;
            padding-left: 15px;
            border-left: 2px solid #e9ecef;
        }

        .subcategory.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tag-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 8px 0;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag-item:active {
            background: #f0f7ff;
            border-color: #4a9eff;
            transform: scale(0.98);
        }

        .tag-item.copied {
            background: #d4edda;
            border-color: #28a745;
        }

        .tag-en {
            font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Mono", monospace;
            font-size: 14px;
            color: #2c5282;
            background: #ebf8ff;
            padding: 6px 12px;
            border-radius: 6px;
            -webkit-user-select: text;
            user-select: text;
            margin-right: 12px;
            flex-shrink: 0;
            max-width: 55%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tag-cn {
            font-size: 14px;
            color: #666;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .toast.copied {
            background: rgba(40, 167, 69, 0.9);
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #f0f0f0;

            background: #c1c1c1;
            border-radius: 3px;
        }

            background: #a1a1a1;
        }

            let html = '';

            tagData.forEach((category, catIndex) => {
                html += `
                    <div class="category">
                        <div class="category-header" onclick="toggleCategory(${catIndex})">

                    html += `
                        <div class="category">

                            </div>
                            <div class="subcategory" id="subcat-${catIndex}-${subIndex}">
                    `;

                    subcat.tags.forEach(tag => {
                        html += `
                            <div class="tag-item" onclick="copyTag('${tag.en}', this)">
                                <span class="tag-en">${tag.en}</span>
                                <span class="tag-cn">${tag.cn}</span>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        // 切换大分类
        function toggleCategory(index) {
            const subcategory = document.getElementById(`cat-${index}`);
            const header = subcategory.previousElementSibling;

            // 关闭其他大分类
            document.querySelectorAll('.category > .category-header').forEach((h, i) => {
                if (i !== index && h.classList.contains('active')) {
                    h.classList.remove('active');
                    h.nextElementSibling.classList.remove('show');
                }
            });

            // 关闭大分类下的所有小分类
            document.querySelectorAll(`#cat-${index} .category-header`).forEach(h => {
                h.classList.remove('active');
                h.nextElementSibling.classList.remove('show');
            });

            // 切换当前大分类
            header.classList.toggle('active');
            subcategory.classList.toggle('show');
        }

        // 切换小分类
        function toggleSubcategory(catIndex, subIndex) {
            const subcategory = document.getElementById(`subcat-${catIndex}-${subIndex}`);
            const header = subcategory.previousElementSibling;

            // 关闭同级其他小分类
            const parent = header.parentElement.parentElement;
            parent.querySelectorAll('.category > .category-header').forEach(h => {
                if (h !== header && h.classList.contains('active')) {
                    h.classList.remove('active');
                    h.nextElementSibling.classList.remove('show');
                }
            });

            // 切换当前小分类
            header.classList.toggle('active');
            subcategory.classList.toggle('show');
        }

        // 复制标签
        function copyTag(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                // 显示复制成功状态
                element.classList.add('copied');

                // 显示提示
                const toast = document.getElementById('toast');
                toast.textContent = `已复制：${text}`;
                toast.classList.add('show', 'copied');

                setTimeout(() => {
                    toast.classList.remove('show', 'copied');
                    element.classList.remove('copied');
                }, 1500);
            }).catch(err => {
                // 复制失败，使用备用方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);

                element.classList.add('copied');
                const toast = document.getElementById('toast');
                toast.textContent = `已复制：${text}`;
                toast.classList.add('show', 'copied');

                setTimeout(() => {
                    toast.classList.remove('show', 'copied');
                    element.classList.remove('copied');
                }, 1500);
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderContent();

            // 3 秒后隐藏免责声明
            setTimeout(() => {
                const disclaimer = document.getElementById('disclaimer');
                disclaimer.classList.add('hidden');
                setTimeout(() => {
                    disclaimer.style.display = 'none';
                }, 500);
            }, 3000);
        });
    </script>
</body>
</html>
