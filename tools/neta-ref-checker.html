<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捏 Ta 垫图检查器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        input[type="text"]::placeholder { color: #aaa; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-badge.has-ref { background: #d4edda; color: #155724; }
        .status-badge.no-ref { background: #f8d7da; color: #721c24; }
        .story-title { font-weight: 600; color: #333; flex: 1; min-width: 200px; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .info-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .info-value { font-size: 14px; color: #333; font-weight: 500; word-break: break-all; }
        .ref-images { margin-top: 20px; }
        .ref-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 15px; }
        .ref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .ref-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .ref-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .ref-item img { width: 100%; height: 160px; object-fit: cover; }
        .ref-item .ref-caption {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .error-box {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #ffeeba;
        }
        .error-box strong { color: #664d03; }
        .story-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .story-link:hover { opacity: 0.9; }
        .example-links {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 8px;
            border: 1px dashed #667eea;
        }
        .example-links h4 {
            font-size: 13px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .example-links a {
            display: block;
            color: #555;
            font-size: 13px;
            text-decoration: none;
            margin: 5px 0;
            word-break: break-all;
        }
        .example-links a:hover { color: #667eea; text-decoration: underline; }
        .loading { text-align: center; padding: 30px; color: #666; font-size: 15px; }
        .loading::after {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .modal.show { display: flex; }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .tip-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 12px 15px;
            margin-top: 15px;
            font-size: 13px;
            color: #004085;
        }
        .tip-box::before {
            content: '💡 ';
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 捏 Ta 垫图检查器</h1>
        <p class="subtitle">输入捏宝/作品链接，快速检查是否使用了垫图</p>
        
        <div class="input-group">
            <label for="linkInput">捏宝/作品链接</label>
            <input 
                type="text" 
                id="linkInput" 
                placeholder="https://t.nieta.art/9VZHzF6U"
            >
            <div class="tip-box">
                仅支持捏 Ta 官方短链接格式，无需 Token，公开作品可直接查看
            </div>
        </div>
        
        <button id="checkBtn" onclick="checkStory()">检查垫图</button>
        
        <div class="example-links">
            <h4>📋 支持的链接格式</h4>
            <a href="https://t.nieta.art/9VZHzF6U" target="_blank">https://t.nieta.art/9VZHzF6U</a>
            <a href="https://neta.app/xxx" target="_blank">https://neta.app/xxx</a>
            <a href="https://neta.ai/xxx" target="_blank">https://neta.ai/xxx</a>
            <a href="https://neta.mobi/xxx" target="_blank">https://neta.mobi/xxx</a>
        </div>
        
        <div id="result" class="result">
            <div class="result-header">
                <span id="statusBadge" class="status-badge"></span>
                <span id="storyTitle" class="story-title"></span>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">作者</div>
                    <div class="info-value" id="author"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">垫图数量</div>
                    <div class="info-value" id="refCount"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">创建时间</div>
                    <div class="info-value" id="createdAt"></div>
                </div>
            </div>
            
            <div id="refImages" class="ref-images">
                <div class="ref-title">📸 垫图预览（点击放大）</div>
                <div id="refGrid" class="ref-grid"></div>
            </div>
            
            <a id="storyLink" class="story-link" target="_blank">在捏 Ta 中查看 →</a>
        </div>
        
        <div id="errorBox" class="error-box" style="display: none;"></div>
    </div>
    
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="放大预览">
    </div>
    
    <script>
        // 从短链接解析 UUID - 使用 CORS 代理
        async function resolveUuidFromShortLink(shortId) {
            // 如果 shortId 本身就是 UUID 格式，直接返回
            if (/^[a-f0-9-]{36}$/i.test(shortId)) {
                return shortId;
            }
            
            // 使用 CORS 代理获取重定向 URL
            const corsProxies = [
                'https://corsproxy.io/?',
                'https://api.allorigins.win/raw?url='
            ];
            
            for (const proxy of corsProxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(`https://t.nieta.art/${shortId}`), {
                        method: 'GET',
                        redirect: 'follow'
                    });
                    const finalUrl = response.url || '';
                    const uuidMatch = finalUrl.match(/uuid=([a-f0-9-]{36})/i);
                    if (uuidMatch) {
                        console.log('通过代理解析成功:', uuidMatch[1]);
                        return uuidMatch[1];
                    }
                } catch (e) {
                    console.log(`代理 ${proxy} 失败:`, e.message);
                }
            }
            
            // 最后尝试：假设 shortId 可能是 UUID 或其他格式
            // 直接返回，让后续 API 调用去验证
            return shortId;
        }
        
        async function checkStory() {
            const input = document.getElementById('linkInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorBox = document.getElementById('errorBox');
            const checkBtn = document.getElementById('checkBtn');
            
            resultDiv.classList.remove('show');
            errorBox.style.display = 'none';
            
            if (!input) {
                showError('请输入捏宝/作品链接');
                return;
            }
            
            const patterns = [
                /https?:\/\/t\.nieta\.art\/([a-zA-Z0-9]+)/i,
                /https?:\/\/neta\.app\/([a-zA-Z0-9]+)/i,
                /https?:\/\/neta\.ai\/([a-zA-Z0-9]+)/i,
                /https?:\/\/neta\.mobi\/([a-zA-Z0-9]+)/i
            ];
            
            let shortId = null;
            for (const pattern of patterns) {
                const match = input.match(pattern);
                if (match) {
                    shortId = match[1];
                    break;
                }
            }
            
            if (!shortId) {
                showError('请输入有效的捏 Ta 链接！\n支持的格式：\n- https://t.nieta.art/xxxxx\n- https://neta.app/xxxxx\n- https://neta.ai/xxxxx\n- https://neta.mobi/xxxxx');
                return;
            }
            
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<span class="loading">解析链接中</span>';
            
            try {
                // 第一步：解析 UUID
                let uuid = await resolveUuidFromShortLink(shortId);
                
                checkBtn.innerHTML = '<span class="loading">获取作品信息中</span>';
                
                // 第二步：获取作品详情（使用正确的 API 端点）
                const response = await fetch(`https://api.talesofai.cn/v2/travel/parent/${uuid}/profile`, {
                    method: 'GET',
                    headers: {
                        'x-platform': 'nieta-app/web',
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('作品不存在或已被删除，请检查链接是否正确');
                    } else if (response.status === 401 || response.status === 403) {
                        throw new Error('该作品是私密作品，无法查看');
                    } else {
                        throw new Error(`API 请求失败：${response.status}`);
                    }
                }
                
                const data = await response.json();
                displayResult(data, uuid, input);
                
            } catch (error) {
                showError(error.message);
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = '检查垫图';
            }
        }
        
        function displayResult(data, uuid, originalLink) {
            const resultDiv = document.getElementById('result');
            const statusBadge = document.getElementById('statusBadge');
            const storyTitle = document.getElementById('storyTitle');
            const author = document.getElementById('author');
            const refCount = document.getElementById('refCount');
            const createdAt = document.getElementById('createdAt');
            const refImagesDiv = document.getElementById('refImages');
            const refGrid = document.getElementById('refGrid');
            const storyLink = document.getElementById('storyLink');
            
            const name = data.name || data.short_name || '无标题';
            const authorName = data.creator?.nick_name || data.creator?.name || '未知作者';
            const createTime = data.ctime ? new Date(data.ctime).toLocaleString('zh-CN') : '未知';
            
            let refImages = [];
            
            // 检查 mix_meta（如果有）
            if (data.mix_meta && Array.isArray(data.mix_meta)) {
                data.mix_meta.forEach((mix, index) => {
                    if (mix.image_url) {
                        refImages.push({ url: mix.image_url, caption: mix.image_caption || `垫图 ${index + 1}` });
                    }
                    if (mix.original_image_url && mix.original_image_url !== mix.image_url) {
                        refImages.push({ url: mix.original_image_url, caption: `原始垫图 ${index + 1}` });
                    }
                });
            }
            
            // 检查 ref_images（如果有）
            if (data.ref_images && Array.isArray(data.ref_images)) {
                data.ref_images.forEach((ref, index) => {
                    const url = ref.url || ref.image_url || (typeof ref === 'string' ? ref : null);
                    if (url && !refImages.find(img => img.url === url)) {
                        refImages.push({ url: url, caption: ref.caption || `参考图 ${index + 1}` });
                    }
                });
            }
            
            // 检查 appearance_vtokens（如果有）
            if (data.appearance_vtokens && Array.isArray(data.appearance_vtokens)) {
                data.appearance_vtokens.forEach((vtoken, index) => {
                    if (vtoken.ref_img_uuid) {
                        const url = vtoken.ref_img_uuid.startsWith('http') 
                            ? vtoken.ref_img_uuid 
                            : `https://oss.talesofai.cn/picture/${vtoken.ref_img_uuid}`;
                        if (!refImages.find(img => img.url === url)) {
                            refImages.push({ url: url, caption: vtoken.name || `参考图 ${index + 1}` });
                        }
                    }
                });
            }
            
            // 去重
            const uniqueUrls = new Set();
            refImages = refImages.filter(img => {
                if (uniqueUrls.has(img.url)) return false;
                uniqueUrls.add(img.url);
                return true;
            });
            
            storyTitle.textContent = name.length > 60 ? name.substring(0, 60) + '...' : name;
            author.textContent = authorName;
            refCount.textContent = refImages.length;
            createdAt.textContent = createTime;
            
            if (refImages.length > 0) {
                statusBadge.textContent = '✅ 有垫图';
                statusBadge.className = 'status-badge has-ref';
                refImagesDiv.style.display = 'block';
                refGrid.innerHTML = refImages.map((img, index) => `
                    <div class="ref-item" onclick="openModal('${img.url}')">
                        <img src="${img.url}" alt="${img.caption}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 160%22><rect fill=%22%23f0f0f0%22 width=%22160%22 height=%22160%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22>加载失败</text></svg>'">
                        <div class="ref-caption">${img.caption}</div>
                    </div>
                `).join('');
            } else {
                statusBadge.textContent = '❌ 无垫图';
                statusBadge.className = 'status-badge no-ref';
                refImagesDiv.style.display = 'none';
            }
            
            storyLink.href = `https://neta.ai/oc?uuid=${uuid}`;
            resultDiv.classList.add('show');
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = '<strong>⚠️ 检查失败</strong><br>' + message.replace(/\n/g, '<br>');
            errorBox.style.display = 'block';
        }
        
        function openModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = imageUrl;
            modal.classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('show');
        }
        
        document.getElementById('linkInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkStory();
        });
    </script>
</body>
</html>
