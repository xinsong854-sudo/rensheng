<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捏 Ta 垫图检查器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        input[type="text"]::placeholder { color: #aaa; }
        input[type="text"]:invalid { border-color: #f56565; }
        .token-group { margin-bottom: 25px; }
        .token-help { font-size: 12px; color: #888; margin-top: 6px; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-badge.has-ref { background: #d4edda; color: #155724; }
        .status-badge.no-ref { background: #f8d7da; color: #721c24; }
        .story-title { font-weight: 600; color: #333; flex: 1; min-width: 200px; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .info-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .info-value { font-size: 14px; color: #333; font-weight: 500; word-break: break-all; }
        .ref-images { margin-top: 20px; }
        .ref-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 15px; }
        .ref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .ref-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .ref-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .ref-item img { width: 100%; height: 160px; object-fit: cover; }
        .ref-item .ref-caption {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #f5c6cb;
        }
        .story-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .story-link:hover { opacity: 0.9; }
        .example-links {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 8px;
            border: 1px dashed #667eea;
        }
        .example-links h4 {
            font-size: 13px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .example-links a {
            display: block;
            color: #555;
            font-size: 13px;
            text-decoration: none;
            margin: 5px 0;
            word-break: break-all;
        }
        .example-links a:hover { color: #667eea; text-decoration: underline; }
        .loading { text-align: center; padding: 30px; color: #666; font-size: 15px; }
        .loading::after {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .modal.show { display: flex; }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 捏 Ta 垫图检查器</h1>
        <p class="subtitle">输入捏宝/作品链接，快速检查是否使用了垫图</p>
        
        <div class="input-group">
            <label for="linkInput">捏宝/作品链接</label>
            <input 
                type="url" 
                id="linkInput" 
                placeholder="例如：https://t.nieta.art/9VZHzF6U 或 https://neta.app/xxx"
                required
                pattern="https?://(t\.nieta\.art|neta\.app|neta\.ai|neta\.mobi)/.+"
            >
        </div>
        
        <div class="token-group">
            <label for="tokenInput">捏 Ta Token（可选，私密作品需要）</label>
            <input type="text" id="tokenInput" placeholder="从捏 Ta App 获取的 x-token">
            <p class="token-help">💡 获取方式：捏 Ta App → 设置 → 关于 → 点击版本号 → 复制 Token</p>
        </div>
        
        <button id="checkBtn" onclick="checkStory()">检查垫图</button>
        
        <div class="example-links">
            <h4>📋 支持的链接格式</h4>
            <a href="https://t.nieta.art/9VZHzF6U" target="_blank">https://t.nieta.art/9VZHzF6U</a>
            <a href="https://neta.app/xxx" target="_blank">https://neta.app/xxx</a>
            <a href="https://neta.ai/xxx" target="_blank">https://neta.ai/xxx</a>
            <a href="https://neta.mobi/xxx" target="_blank">https://neta.mobi/xxx</a>
        </div>
        
        <div id="result" class="result">
            <div class="result-header">
                <span id="statusBadge" class="status-badge"></span>
                <span id="storyTitle" class="story-title"></span>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">作者</div>
                    <div class="info-value" id="author"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">垫图数量</div>
                    <div class="info-value" id="refCount"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">创建时间</div>
                    <div class="info-value" id="createdAt"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">分享链接</div>
                    <div class="info-value" id="shareLink"></div>
                </div>
            </div>
            
            <div id="refImages" class="ref-images">
                <div class="ref-title">📸 垫图预览（点击放大）</div>
                <div id="refGrid" class="ref-grid"></div>
            </div>
            
            <a id="storyLink" class="story-link" target="_blank">在捏 Ta 中查看 →</a>
        </div>
        
        <div id="errorBox" class="error-box" style="display: none;"></div>
    </div>
    
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="放大预览">
    </div>
    
    <script>
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('neta_token');
            if (savedToken) document.getElementById('tokenInput').value = savedToken;
        });
        
        function extractStoryId(input) {
            // 支持多种捏 Ta 短链接格式
            const patterns = [
                /https?:\/\/t\.nieta\.art\/([a-zA-Z0-9]+)/i,
                /https?:\/\/neta\.app\/([a-zA-Z0-9]+)/i,
                /https?:\/\/neta\.ai\/([a-zA-Z0-9]+)/i,
                /https?:\/\/neta\.mobi\/([a-zA-Z0-9]+)/i
            ];
            
            for (const pattern of patterns) {
                const match = input.match(pattern);
                if (match) return match[1];
            }
            return null;
        }
        
        async function resolveStoryId(shortId) {
            // 尝试通过 API 解析短链接获取真实 UUID
            // 先尝试常见的 API 端点
            const endpoints = [
                `https://api.talesofai.cn/v3/story/story-detail?share_id=${shortId}`,
                `https://api.talesofai.cn/v1/story/share/${shortId}`,
                `https://api.talesofai.cn/v3/story/resolve/${shortId}`
            ];
            
            for (const url of endpoints) {
                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: { 'x-platform': 'nieta-app/web' }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data.story?.uuid || data.uuid || null;
                    }
                } catch (e) {
                    continue;
                }
            }
            
            // 如果 API 解析失败，尝试通过页面重定向获取
            try {
                const response = await fetch(`https://t.nieta.art/${shortId}`, {
                    method: 'GET',
                    redirect: 'manual'
                });
                const location = response.headers.get('location') || '';
                const uuidMatch = location.match(/\/([a-f0-9-]{36})/i);
                if (uuidMatch) return uuidMatch[1];
            } catch (e) {
                // 忽略 CORS 错误
            }
            
            // 最后尝试：假设 shortId 就是 UUID
            if (/^[a-f0-9-]{36}$/i.test(shortId)) {
                return shortId;
            }
            
            return null;
        }
        
        async function checkStory() {
            const input = document.getElementById('linkInput').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorBox = document.getElementById('errorBox');
            const checkBtn = document.getElementById('checkBtn');
            
            resultDiv.classList.remove('show');
            errorBox.style.display = 'none';
            
            const shortId = extractStoryId(input);
            if (!shortId) {
                showError('请输入有效的捏 Ta 链接！\n支持的格式：\n- https://t.nieta.art/xxxxx\n- https://neta.app/xxxxx\n- https://neta.ai/xxxxx\n- https://neta.mobi/xxxxx');
                return;
            }
            
            if (token) localStorage.setItem('neta_token', token);
            
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<span class="loading">解析链接中</span>';
            
            try {
                // 第一步：解析短链接获取 UUID
                let uuid = shortId;
                if (!/^[a-f0-9-]{36}$/i.test(shortId)) {
                    uuid = await resolveStoryId(shortId);
                    if (!uuid) {
                        throw new Error('无法解析该链接，请检查链接是否正确或作品是否存在');
                    }
                }
                
                checkBtn.innerHTML = '<span class="loading">获取作品信息中</span>';
                
                // 第二步：获取作品详情
                const response = await fetch(`https://api.talesofai.cn/v3/story/story-detail?uuid=${uuid}`, {
                    method: 'GET',
                    headers: {
                        'x-platform': 'nieta-app/web',
                        'x-token': token || ''
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        throw new Error('需要有效的 Token 才能查看此作品。请在捏 Ta App 中获取 Token 后重试。');
                    } else if (response.status === 404) {
                        throw new Error('作品不存在或已被删除。请检查链接是否正确。');
                    } else {
                        throw new Error(`API 请求失败：${response.status} ${response.statusText}`);
                    }
                }
                
                const data = await response.json();
                displayResult(data, uuid, input);
                
            } catch (error) {
                showError(error.message);
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = '检查垫图';
            }
        }
        
        function displayResult(data, uuid, originalLink) {
            const resultDiv = document.getElementById('result');
            const statusBadge = document.getElementById('statusBadge');
            const storyTitle = document.getElementById('storyTitle');
            const author = document.getElementById('author');
            const refCount = document.getElementById('refCount');
            const createdAt = document.getElementById('createdAt');
            const shareLink = document.getElementById('shareLink');
            const refImagesDiv = document.getElementById('refImages');
            const refGrid = document.getElementById('refGrid');
            const storyLink = document.getElementById('storyLink');
            
            const story = data.story || data;
            const title = story.title || story.description || '无标题';
            const authorName = story.creator?.name || story.creator?.nickname || '未知作者';
            const createTime = story.created_at ? new Date(story.created_at).toLocaleString('zh-CN') : '未知';
            
            let refImages = [];
            
            if (story.mix_meta && Array.isArray(story.mix_meta)) {
                story.mix_meta.forEach((mix, index) => {
                    if (mix.image_url) refImages.push({ url: mix.image_url, caption: mix.image_caption || `垫图 ${index + 1}` });
                    if (mix.original_image_url) refImages.push({ url: mix.original_image_url, caption: `原始垫图 ${index + 1}` });
                });
            }
            
            if (story.ref_images && Array.isArray(story.ref_images)) {
                story.ref_images.forEach((ref, index) => {
                    const url = ref.url || ref.image_url || ref;
                    if (url && !refImages.find(img => img.url === url)) {
                        refImages.push({ url: url, caption: ref.caption || `参考图 ${index + 1}` });
                    }
                });
            }
            
            if (story.appearance_vtokens && Array.isArray(story.appearance_vtokens)) {
                story.appearance_vtokens.forEach((vtoken, index) => {
                    if (vtoken.ref_img_uuid) {
                        const url = vtoken.ref_img_uuid.startsWith('http') 
                            ? vtoken.ref_img_uuid 
                            : `https://oss.talesofai.cn/picture/${vtoken.ref_img_uuid}`;
                        if (!refImages.find(img => img.url === url)) {
                            refImages.push({ url: url, caption: vtoken.name || `参考图 ${index + 1}` });
                        }
                    }
                });
            }
            
            const uniqueUrls = new Set();
            refImages = refImages.filter(img => {
                if (uniqueUrls.has(img.url)) return false;
                uniqueUrls.add(img.url);
                return true;
            });
            
            storyTitle.textContent = title.length > 60 ? title.substring(0, 60) + '...' : title;
            author.textContent = authorName;
            refCount.textContent = refImages.length;
            createdAt.textContent = createTime;
            shareLink.textContent = originalLink.length > 35 ? originalLink.substring(0, 35) + '...' : originalLink;
            
            if (refImages.length > 0) {
                statusBadge.textContent = '✅ 有垫图';
                statusBadge.className = 'status-badge has-ref';
                refImagesDiv.style.display = 'block';
                refGrid.innerHTML = refImages.map((img, index) => `
                    <div class="ref-item" onclick="openModal('${img.url}')">
                        <img src="${img.url}" alt="${img.caption}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 160%22><rect fill=%22%23f0f0f0%22 width=%22160%22 height=%22160%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22>加载失败</text></svg>'">
                        <div class="ref-caption">${img.caption}</div>
                    </div>
                `).join('');
            } else {
                statusBadge.textContent = '❌ 无垫图';
                statusBadge.className = 'status-badge no-ref';
                refImagesDiv.style.display = 'none';
            }
            
            storyLink.href = `https://neta.ai/story/${uuid}`;
            resultDiv.classList.add('show');
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '❌ ' + message;
            errorBox.style.display = 'block';
        }
        
        function openModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = imageUrl;
            modal.classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('show');
        }
        
        document.getElementById('linkInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkStory();
        });
        
        document.getElementById('tokenInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkStory();
        });
        
        document.getElementById('linkInput').addEventListener('input', (e) => {
            e.target.setCustomValidity('');
            if (e.target.value && !e.target.validity.valid) {
                e.target.setCustomValidity('请输入有效的捏 Ta 链接格式');
            }
        });
    </script>
</body>
</html>
