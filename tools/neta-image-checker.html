<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捏 Ta 垫图检查器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        input[type="text"]::placeholder { color: #aaa; }
        .token-group { margin-bottom: 25px; }
        .token-help { font-size: 12px; color: #888; margin-top: 6px; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-badge.has-ref { background: #d4edda; color: #155724; }
        .status-badge.no-ref { background: #f8d7da; color: #721c24; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .info-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .info-value { font-size: 14px; color: #333; font-weight: 500; word-break: break-all; }
        .ref-images { margin-top: 20px; }
        .ref-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 15px; }
        .ref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .ref-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s;
        }
        .ref-item:hover { transform: scale(1.05); }
        .ref-item img { width: 100%; height: 150px; object-fit: cover; }
        .ref-item .ref-index {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
        }
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #f5c6cb;
        }
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .story-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .story-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 捏 Ta 垫图检查器</h1>
        <p class="subtitle">输入帖子链接或 UUID，快速检查是否使用了垫图</p>
        
        <div class="input-group">
            <label for="storyInput">帖子链接或 UUID</label>
            <input type="text" id="storyInput" placeholder="例如：https://neta.ai/story/xxx-xxx-xxx 或 xxx-xxx-xxx">
        </div>
        
        <div class="token-group">
            <label for="tokenInput">捏 Ta Token（可选，部分帖子需要）</label>
            <input type="text" id="tokenInput" placeholder="从捏 Ta App 获取的 x-token">
            <p class="token-help">💡 获取方式：捏 Ta App → 设置 → 关于 → 点击版本号 → 复制 Token</p>
        </div>
        
        <button id="checkBtn" onclick="checkStory()">检查垫图</button>
        
        <div id="result" class="result">
            <div class="result-header">
                <span id="statusBadge" class="status-badge"></span>
                <span id="storyTitle" style="font-weight: 600; color: #333;"></span>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">帖子 UUID</div>
                    <div class="info-value" id="storyUuid"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">作者</div>
                    <div class="info-value" id="author"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">垫图数量</div>
                    <div class="info-value" id="refCount"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">创建时间</div>
                    <div class="info-value" id="createdAt"></div>
                </div>
            </div>
            
            <div id="refImages" class="ref-images">
                <div class="ref-title">📸 垫图预览</div>
                <div id="refGrid" class="ref-grid"></div>
            </div>
            
            <a id="storyLink" class="story-link" target="_blank">在捏 Ta 中查看 →</a>
        </div>
        
        <div id="errorBox" class="error-box" style="display: none;"></div>
    </div>
    
    <script>
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('neta_token');
            if (savedToken) document.getElementById('tokenInput').value = savedToken;
        });
        
        function extractUuid(input) {
            const urlPattern = /(?:story|work|post)\/([a-f0-9-]{36})/i;
            const match = input.match(urlPattern);
            if (match) return match[1];
            const uuidPattern = /^[a-f0-9-]{36}$/i;
            if (uuidPattern.test(input.trim())) return input.trim();
            return null;
        }
        
        async function checkStory() {
            const input = document.getElementById('storyInput').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorBox = document.getElementById('errorBox');
            const checkBtn = document.getElementById('checkBtn');
            
            resultDiv.classList.remove('show');
            errorBox.style.display = 'none';
            
            const uuid = extractUuid(input);
            if (!uuid) {
                showError('请输入有效的帖子链接或 UUID（36 位，格式：xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx）');
                return;
            }
            
            if (token) localStorage.setItem('neta_token', token);
            
            checkBtn.disabled = true;
            checkBtn.textContent = '检查中...';
            
            try {
                const response = await fetch(`https://api.talesofai.cn/v3/story/story-detail?uuid=${uuid}`, {
                    method: 'GET',
                    headers: {
                        'x-platform': 'nieta-app/web',
                        'x-token': token || ''
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        throw new Error('需要有效的 Token 才能查看此帖子。请在捏 Ta App 中获取 Token 后重试。');
                    } else if (response.status === 404) {
                        throw new Error('帖子不存在或已被删除。请检查 UUID 是否正确。');
                    } else {
                        throw new Error(`API 请求失败：${response.status} ${response.statusText}`);
                    }
                }
                
                const data = await response.json();
                displayResult(data, uuid);
                
            } catch (error) {
                showError(error.message);
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = '检查垫图';
            }
        }
        
        function displayResult(data, uuid) {
            const resultDiv = document.getElementById('result');
            const statusBadge = document.getElementById('statusBadge');
            const storyTitle = document.getElementById('storyTitle');
            const storyUuid = document.getElementById('storyUuid');
            const author = document.getElementById('author');
            const refCount = document.getElementById('refCount');
            const createdAt = document.getElementById('createdAt');
            const refImagesDiv = document.getElementById('refImages');
            const refGrid = document.getElementById('refGrid');
            const storyLink = document.getElementById('storyLink');
            
            const story = data.story || data;
            const title = story.title || story.description || '无标题';
            const authorName = story.creator?.name || story.creator?.nickname || '未知作者';
            const createTime = story.created_at ? new Date(story.created_at).toLocaleString('zh-CN') : '未知';
            
            let refImages = [];
            
            if (story.mix_meta && Array.isArray(story.mix_meta)) {
                story.mix_meta.forEach((mix, index) => {
                    if (mix.image_url) refImages.push({ url: mix.image_url, caption: mix.image_caption || `垫图 ${index + 1}` });
                    if (mix.original_image_url) refImages.push({ url: mix.original_image_url, caption: `原始垫图 ${index + 1}` });
                });
            }
            
            if (story.ref_images && Array.isArray(story.ref_images)) {
                story.ref_images.forEach((ref, index) => {
                    const url = ref.url || ref.image_url || ref;
                    if (url && !refImages.find(img => img.url === url)) {
                        refImages.push({ url: url, caption: ref.caption || `参考图 ${index + 1}` });
                    }
                });
            }
            
            if (story.appearance_vtokens && Array.isArray(story.appearance_vtokens)) {
                story.appearance_vtokens.forEach((vtoken, index) => {
                    if (vtoken.ref_img_uuid) {
                        const url = vtoken.ref_img_uuid.startsWith('http') 
                            ? vtoken.ref_img_uuid 
                            : `https://oss.talesofai.cn/sts/${vtoken.ref_img_uuid}`;
                        if (!refImages.find(img => img.url === url)) {
                            refImages.push({ url: url, caption: vtoken.name || `VTOKEN 垫图 ${index + 1}` });
                        }
                    }
                });
            }
            
            const uniqueUrls = new Set();
            refImages = refImages.filter(img => {
                if (uniqueUrls.has(img.url)) return false;
                uniqueUrls.add(img.url);
                return true;
            });
            
            storyTitle.textContent = title.length > 50 ? title.substring(0, 50) + '...' : title;
            storyUuid.textContent = uuid;
            author.textContent = authorName;
            refCount.textContent = refImages.length;
            createdAt.textContent = createTime;
            
            if (refImages.length > 0) {
                statusBadge.textContent = '✅ 有垫图';
                statusBadge.className = 'status-badge has-ref';
                refImagesDiv.style.display = 'block';
                refGrid.innerHTML = refImages.map((img, index) => `
                    <div class="ref-item">
                        <img src="${img.url}" alt="${img.caption}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 150 150%22><rect fill=%22%23f0f0f0%22 width=%22150%22 height=%22150%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22>加载失败</text></svg>'">
                        <div class="ref-index">${img.caption}</div>
                    </div>
                `).join('');
            } else {
                statusBadge.textContent = '❌ 无垫图';
                statusBadge.className = 'status-badge no-ref';
                refImagesDiv.style.display = 'none';
            }
            
            storyLink.href = `https://neta.ai/story/${uuid}`;
            resultDiv.classList.add('show');
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '❌ ' + message;
            errorBox.style.display = 'block';
        }
        
        document.getElementById('storyInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkStory();
        });
        
        document.getElementById('tokenInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkStory();
        });
    </script>
</body>
</html>
