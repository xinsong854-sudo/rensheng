<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火柴人打斗表演</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}
h1 {
  color: #fff; font-size: 1.2rem;
  margin-bottom: 12px; opacity: .6;
  letter-spacing: 2px;
}
canvas {
  border: 1px solid #222;
  border-radius: 8px;
  background: #0d0d14;
  box-shadow: 0 0 40px rgba(100,120,255,.08);
}
#ui {
  position: fixed; bottom: 20px;
  display: flex; gap: 10px;
}
button {
  padding: 8px 18px;
  border: 1px solid #333;
  border-radius: 6px;
  background: #16161e;
  color: #ccc; font-size: .85rem;
  cursor: pointer; transition: .2s;
}
button:hover { background: #22223a; color: #fff; border-color: #556; }
</style>
</head>
<body>
<h1>🔥 火柴人 FIGHT 🔥</h1>
<canvas id="c"></canvas>
<div id="ui">
  <button onclick="restart()">🔄 重来</button>
  <button onclick="toggleSlow()">⏱ 慢放</button>
  <button onclick="toggleAuto()">▶ 自动重播</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const REF_W = 900; // 参考宽度，所有x坐标基于此设计
const W = canvas.width = Math.min(REF_W, window.innerWidth - 30);
const H = canvas.height = Math.min(500, window.innerHeight - 120);
const GROUND = H - 60;
const GRAVITY = 0.55;
const scaleX = (x) => x * (W / REF_W); // x坐标缩放

let slow = false, autoReplay = false, time = 0;

// ---- 火柴人骨架绘制 ----
function drawStickman(x, y, pose, color, hp, facing, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.scale(facing, 1);

  const { head, neck, shoulder, elbow, hand, hip, knee, foot } = pose;

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 发光效果
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  // 头
  ctx.beginPath();
  ctx.arc(head.x, head.y, 12, 0, Math.PI * 2);
  ctx.stroke();

  // 眼睛
  ctx.beginPath();
  ctx.arc(head.x + 4, head.y - 2, 2, 0, Math.PI * 2);
  ctx.fill();

  // 脖子
  line(neck.x, neck.y, shoulder.x, shoulder.y);

  // 躯干
  line(shoulder.x, shoulder.y, hip.x, hip.y);

  // 手臂
  line(shoulder.x, shoulder.y, elbow.x, elbow.y);
  line(elbow.x, elbow.y, hand.x, hand.y);

  // 另一只手臂
  line(shoulder.x - (elbow.x - shoulder.x) * 0.3, shoulder.y + 5,
       shoulder.x - (hand.x - shoulder.x) * 0.3, shoulder.y + 15);

  // 腿
  line(hip.x, hip.y, knee.x, knee.y);
  line(knee.x, knee.y, foot.x, foot.y);
  line(hip.x, hip.y, knee.x + 10, knee.y + 5);
  line(knee.x + 10, knee.y + 5, foot.x + 15, foot.y);

  ctx.shadowBlur = 0;

  // 血条
  if (hp !== undefined) {
    ctx.scale(facing, 1); // 恢复缩放
    const bw = 50, bh = 5;
    const bx = -bw / 2, by = head.y - 22;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = hp > 0.3 ? '#4f4' : '#f44';
    ctx.fillRect(bx, by, bw * hp, bh);
  }

  ctx.restore();
}

function line(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

// ---- 姿势系统 ----
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPose(a, b, t) {
  const r = {};
  for (const k in a) r[k] = { x: lerp(a[k].x, b[k].x, t), y: lerp(a[k].y, b[k].y, t) };
  return r;
}

// 基础站姿
function standPose() {
  return {
    head: { x: 0, y: -70 }, neck: { x: 0, y: -58 },
    shoulder: { x: 0, y: -52 }, elbow: { x: -12, y: -38 },
    hand: { x: -8, y: -22 }, hip: { x: 0, y: -28 },
    knee: { x: -8, y: -10 }, foot: { x: -10, y: 0 }
  };
}

// 战斗姿态
function fightPose() {
  return {
    head: { x: 5, y: -66 }, neck: { x: 3, y: -54 },
    shoulder: { x: 5, y: -48 }, elbow: { x: 18, y: -52 },
    hand: { x: 30, y: -48 }, hip: { x: 2, y: -26 },
    knee: { x: -5, y: -10 }, foot: { x: -8, y: 0 }
  };
}

// 出拳
function punchPose() {
  return {
    head: { x: 10, y: -64 }, neck: { x: 8, y: -52 },
    shoulder: { x: 8, y: -46 }, elbow: { x: 25, y: -50 },
    hand: { x: 50, y: -46 }, hip: { x: 4, y: -24 },
    knee: { x: -3, y: -8 }, foot: { x: -5, y: 0 }
  };
}

// 重拳
function heavyPunchPose() {
  return {
    head: { x: 15, y: -60 }, neck: { x: 12, y: -48 },
    shoulder: { x: 12, y: -42 }, elbow: { x: 30, y: -44 },
    hand: { x: 60, y: -38 }, hip: { x: 8, y: -20 },
    knee: { x: 0, y: -5 }, foot: { x: 2, y: 0 }
  };
}

// 踢腿
function kickPose() {
  return {
    head: { x: -5, y: -64 }, neck: { x: -3, y: -52 },
    shoulder: { x: -2, y: -46 }, elbow: { x: -15, y: -36 },
    hand: { x: -20, y: -24 }, hip: { x: -2, y: -26 },
    knee: { x: 30, y: -30 }, foot: { x: 55, y: -20 }
  };
}

// 上踢
function highKickPose() {
  return {
    head: { x: -3, y: -62 }, neck: { x: -1, y: -50 },
    shoulder: { x: 0, y: -44 }, elbow: { x: -12, y: -34 },
    hand: { x: -18, y: -22 }, hip: { x: 0, y: -24 },
    knee: { x: 28, y: -45 }, foot: { x: 45, y: -60 }
  };
}

// 防御
function blockPose() {
  return {
    head: { x: 0, y: -60 }, neck: { x: 0, y: -48 },
    shoulder: { x: 2, y: -44 }, elbow: { x: 12, y: -50 },
    hand: { x: 15, y: -58 }, hip: { x: 0, y: -24 },
    knee: { x: -6, y: -10 }, foot: { x: -8, y: 0 }
  };
}

// 被打
function hitPose() {
  return {
    head: { x: -12, y: -58 }, neck: { x: -8, y: -46 },
    shoulder: { x: -6, y: -40 }, elbow: { x: -20, y: -30 },
    hand: { x: -25, y: -18 }, hip: { x: -4, y: -22 },
    knee: { x: -12, y: -8 }, foot: { x: -14, y: 0 }
  };
}

// 后仰
function knockbackPose() {
  return {
    head: { x: -18, y: -52 }, neck: { x: -12, y: -42 },
    shoulder: { x: -8, y: -36 }, elbow: { x: -22, y: -22 },
    hand: { x: -28, y: -10 }, hip: { x: -5, y: -18 },
    knee: { x: -10, y: -5 }, foot: { x: -12, y: 0 }
  };
}

// 跳跃
function jumpPose() {
  return {
    head: { x: 0, y: -80 }, neck: { x: 0, y: -68 },
    shoulder: { x: 0, y: -62 }, elbow: { x: -18, y: -55 },
    hand: { x: -25, y: -65 }, hip: { x: 0, y: -38 },
    knee: { x: -12, y: -22 }, foot: { x: -8, y: -10 }
  };
}

// 下劈
function axeKickPose() {
  return {
    head: { x: 5, y: -58 }, neck: { x: 4, y: -46 },
    shoulder: { x: 5, y: -40 }, elbow: { x: -8, y: -30 },
    hand: { x: -12, y: -18 }, hip: { x: 3, y: -22 },
    knee: { x: 20, y: -50 }, foot: { x: 18, y: -10 }
  };
}

// 跪地
function kneelPose() {
  return {
    head: { x: -5, y: -38 }, neck: { x: -3, y: -28 },
    shoulder: { x: -2, y: -24 }, elbow: { x: -15, y: -14 },
    hand: { x: -18, y: -2 }, hip: { x: 0, y: -14 },
    knee: { x: 5, y: -4 }, foot: { x: 10, y: 0 }
  };
}

// 胜利
function victoryPose() {
  return {
    head: { x: 0, y: -72 }, neck: { x: 0, y: -60 },
    shoulder: { x: 0, y: -54 }, elbow: { x: -20, y: -70 },
    hand: { x: -22, y: -88 }, hip: { x: 0, y: -28 },
    knee: { x: -8, y: -10 }, foot: { x: -10, y: 0 }
  };
}

// ---- 粒子系统 ----
const particles = [];
function spawnParticles(x, y, color, count = 10, speed = 3) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + 1;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1,
      life: 1, color, size: Math.random() * 4 + 1
    });
  }
}

function spawnSparks(x, y, count = 15) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI - Math.PI / 2;
    const spd = Math.random() * 6 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd * (Math.random() > 0.5 ? 1 : -1),
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      color: ['#fff', '#ff4', '#f84', '#4af'][Math.floor(Math.random() * 4)],
      size: Math.random() * 3 + 1,
      spark: true
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.spark) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));
      ctx.fillRect(-p.size * 2, -0.5, p.size * 4, 1);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ---- 镜头震动 ----
let shakeX = 0, shakeY = 0, shakeDecay = 0;
function doShake(intensity) { shakeDecay = intensity; }
function updateShake() {
  if (shakeDecay > 0) {
    shakeX = (Math.random() - 0.5) * shakeDecay * 2;
    shakeY = (Math.random() - 0.5) * shakeDecay * 2;
    shakeDecay *= 0.85;
    if (shakeDecay < 0.3) shakeDecay = 0;
  } else { shakeX = 0; shakeY = 0; }
}

// ---- 战斗编排 ----
const CHOREO = [
  // { frames, action: [p1Pose, p1X, p2Pose, p2X, hit?, particles?] }
  // Phase 1: 对峙
  { f: 40, p1: { pose: 'fight', x: 250 }, p2: { pose: 'fight', x: 650 } },
  // Phase 2: 接近
  { f: 20, p1: { pose: 'fight', x: 320 }, p2: { pose: 'fight', x: 580 } },
  // Phase 3: 第一次交锋 - P1出拳
  { f: 6, p1: { pose: 'punch', x: 370 }, p2: { pose: 'block', x: 530 } },
  { f: 4, p1: { pose: 'punch', x: 380 }, p2: { pose: 'hit', x: 520 }, hit: true },
  { f: 8, p1: { pose: 'fight', x: 370 }, p2: { pose: 'knockback', x: 490 } },
  // Phase 4: P2反击 - 踢腿
  { f: 8, p1: { pose: 'block', x: 380 }, p2: { pose: 'kick', x: 500 } },
  { f: 4, p1: { pose: 'hit', x: 360 }, p2: { pose: 'kick', x: 510 }, hit: true },
  { f: 8, p1: { pose: 'knockback', x: 310 }, p2: { pose: 'fight', x: 510 } },
  // Phase 5: P1跳踢
  { f: 10, p1: { pose: 'jump', x: 350, vy: -8 }, p2: { pose: 'fight', x: 480 } },
  { f: 6, p1: { pose: 'highKick', x: 460 }, p2: { pose: 'block', x: 480 } },
  { f: 4, p1: { pose: 'highKick', x: 470 }, p2: { pose: 'hit', x: 490 }, hit: true },
  { f: 8, p1: { pose: 'fight', x: 420 }, p2: { pose: 'knockback', x: 520 } },
  // Phase 6: 连击
  { f: 5, p1: { pose: 'punch', x: 430 }, p2: { pose: 'hit', x: 510 }, hit: true },
  { f: 5, p1: { pose: 'punch', x: 440 }, p2: { pose: 'hit', x: 500 }, hit: true },
  { f: 5, p1: { pose: 'heavyPunch', x: 450 }, p2: { pose: 'hit', x: 480 }, hit: true },
  { f: 10, p1: { pose: 'fight', x: 430 }, p2: { pose: 'knockback', x: 430 } },
  // Phase 7: P2暴走 - 下劈
  { f: 12, p1: { pose: 'fight', x: 420 }, p2: { pose: 'jump', x: 460, vy: -10 } },
  { f: 6, p1: { pose: 'hit', x: 410 }, p2: { pose: 'axeKick', x: 470 }, hit: true },
  { f: 10, p1: { pose: 'knockback', x: 370 }, p2: { pose: 'fight', x: 470 } },
  // Phase 8: P2连踢
  { f: 5, p1: { pose: 'hit', x: 370 }, p2: { pose: 'kick', x: 450 }, hit: true },
  { f: 5, p1: { pose: 'hit', x: 360 }, p2: { pose: 'highKick', x: 440 }, hit: true },
  { f: 5, p1: { pose: 'hit', x: 350 }, p2: { pose: 'kick', x: 430 }, hit: true },
  { f: 10, p1: { pose: 'knockback', x: 300 }, p2: { pose: 'fight', x: 430 } },
  // Phase 9: 最终对决
  { f: 15, p1: { pose: 'fight', x: 350 }, p2: { pose: 'fight', x: 480 } },
  { f: 8, p1: { pose: 'heavyPunch', x: 400 }, p2: { pose: 'heavyPunch', x: 430 } },
  { f: 4, p1: { pose: 'heavyPunch', x: 415 }, p2: { pose: 'hit', x: 440 }, hit: true, bigHit: true },
  { f: 4, p1: { pose: 'hit', x: 410 }, p2: { pose: 'heavyPunch', x: 435 }, hit: true, bigHit: true },
  // Phase 10: P1终结
  { f: 10, p1: { pose: 'jump', x: 400, vy: -12 }, p2: { pose: 'hit', x: 440 } },
  { f: 6, p1: { pose: 'axeKick', x: 445 }, p2: { pose: 'hit', x: 445 }, hit: true, bigHit: true },
  { f: 10, p1: { pose: 'fight', x: 420 }, p2: { pose: 'knockback', x: 470 } },
  // Phase 11: P2倒下
  { f: 20, p1: { pose: 'fight', x: 420 }, p2: { pose: 'kneel', x: 500 } },
  { f: 30, p1: { pose: 'victory', x: 420 }, p2: { pose: 'kneel', x: 520 } },
];

const poseMap = {
  stand: standPose, fight: fightPose, punch: punchPose,
  heavyPunch: heavyPunchPose, kick: kickPose, highKick: highKickPose,
  block: blockPose, hit: hitPose, knockback: knockbackPose,
  jump: jumpPose, axeKick: axeKickPose, kneel: kneelPose, victory: victoryPose
};

// ---- 战斗状态 ----
let state = {
  p1: { x: scaleX(250), y: GROUND, pose: standPose(), vy: 0, hp: 1, color: '#4af', facing: 1 },
  p2: { x: scaleX(650), y: GROUND, pose: standPose(), vy: 0, hp: 1, color: '#f55', facing: -1 },
  phase: 0, frameInPhase: 0,
  p1TargetPose: null, p2TargetPose: null,
  p1StartPose: null, p2StartPose: null,
  p1TargetX: scaleX(250), p2TargetX: scaleX(650),
  p1StartX: scaleX(250), p2StartX: scaleX(650),
  hitFlash: 0, combo: 0,
  text: '', textTimer: 0, textX: W / 2, textY: H / 2 - 40,
  finished: false
};

function loadPhase(idx) {
  if (idx >= CHOREO.length) { state.finished = true; return; }
  const ph = CHOREO[idx];
  state.p1StartPose = { ...state.p1.pose };
  state.p2StartPose = { ...state.p2.pose };
  state.p1TargetPose = poseMap[ph.p1.pose]();
  state.p2TargetPose = poseMap[ph.p2.pose]();
  state.p1StartX = state.p1.x;
  state.p2StartX = state.p2.x;
  state.p1TargetX = scaleX(ph.p1.x);
  state.p2TargetX = scaleX(ph.p2.x);
  state.p1.vy = ph.p1.vy || 0;
  state.p2.vy = ph.p2.vy || 0;
  state.phaseFrames = ph.f;
  state.hasHit = false;
  state.hitData = ph.hit ? { big: ph.bigHit || false, combo: ph.hit } : null;
}

function updateState() {
  if (state.finished) return;

  const ph = CHOREO[state.phase];
  if (!ph) { state.finished = true; return; }

  const t = Math.min(state.frameInPhase / state.phaseFrames, 1);
  const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad

  state.p1.pose = lerpPose(state.p1StartPose, state.p1TargetPose, ease);
  state.p2.pose = lerpPose(state.p2StartPose, state.p2TargetPose, ease);
  state.p1.x = lerp(state.p1StartX, state.p1TargetX, ease);
  state.p2.x = lerp(state.p2StartX, state.p2TargetX, ease);

  // 重力
  if (state.p1.vy !== 0) {
    state.p1.y += state.p1.vy;
    state.p1.vy += GRAVITY;
    if (state.p1.y >= GROUND) { state.p1.y = GROUND; state.p1.vy = 0; }
  }
  if (state.p2.vy !== 0) {
    state.p2.y += state.p2.vy;
    state.p2.vy += GRAVITY;
    if (state.p2.y >= GROUND) { state.p2.y = GROUND; state.p2.vy = 0; }
  }

  // 打击判定
  if (state.hitData && !state.hasHit && t > 0.4) {
    state.hasHit = true;
    const hx = (state.p1.x + state.p2.x) / 2;
    const hy = Math.min(state.p1.y, state.p2.y) - 50;

    if (state.hitData.big) {
      spawnSparks(hx, hy, 25);
      doShake(12);
      state.p2.hp = Math.max(0, state.p2.hp - 0.15);
      state.p1.hp = Math.max(0, state.p1.hp - 0.1);
      state.combo++;
    } else {
      spawnParticles(hx, hy, '#ff8', 8);
      doShake(5);
      state.p2.hp = Math.max(0, state.p2.hp - 0.08);
      state.combo++;
    }

    state.hitFlash = 6;
    if (state.combo >= 3) {
      state.text = state.combo + ' HIT!';
      state.textTimer = 30;
      state.textX = hx;
      state.textY = hy - 20;
    }
  }

  // 连击文字
  if (state.textTimer > 0) state.textTimer--;

  state.frameInPhase++;
  if (state.frameInPhase >= state.phaseFrames) {
    state.phase++;
    state.frameInPhase = 0;
    if (state.combo > 0 && !state.hitData) state.combo = 0;
    loadPhase(state.phase);
  }

  if (state.hitFlash > 0) state.hitFlash--;
}

// ---- 背景 ----
function drawBG() {
  // 地面
  ctx.fillStyle = '#111118';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();

  // 地面装饰线
  ctx.strokeStyle = '#222';
  const gridStep = scaleX(40);
  for (let i = 0; i < W; i += gridStep) {
    ctx.beginPath();
    ctx.moveTo(i, GROUND);
    ctx.lineTo(i, H);
    ctx.stroke();
  }

  // 远处建筑剪影
  ctx.fillStyle = '#0e0e14';
  const buildings = [
    [30, 120], [80, 80], [130, 150], [200, 90], [260, 130],
    [340, 100], [400, 160], [480, 70], [540, 140], [610, 110],
    [670, 130], [740, 90], [800, 150], [860, 80]
  ];
  for (const [bx, bh] of buildings) {
    const sx = scaleX(bx);
    ctx.fillRect(sx, GROUND - bh, scaleX(35), bh);
    // 窗户
    ctx.fillStyle = '#1a1a22';
    for (let wy = GROUND - bh + 10; wy < GROUND - 10; wy += 18) {
      for (let wx = sx + scaleX(5); wx < sx + scaleX(30); wx += scaleX(12)) {
        ctx.fillRect(wx, wy, scaleX(5), 8);
      }
    }
    ctx.fillStyle = '#0e0e14';
  }
}

// ---- 文字 ----
function drawText() {
  if (state.textTimer > 0) {
    const alpha = Math.min(state.textTimer / 10, 1);
    const scale = 1 + (1 - alpha) * 0.5;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(state.textX, state.textY);
    ctx.scale(scale, scale);
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#f84';
    ctx.shadowBlur = 15;
    ctx.fillText(state.text, 0, 0);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#f84';
    ctx.lineWidth = 1;
    ctx.strokeText(state.text, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // 开场文字
  if (time < 120) {
    const alpha = time < 80 ? Math.min(time / 20, 1) : Math.max(1 - (time - 80) / 40, 0);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 20;
    ctx.fillText('⚔ FIGHT ⚔', scaleX(450), H / 2);
    ctx.restore();
  }

  // 结束文字
  if (state.finished && state.p2.hp <= 0) {
    const alpha = Math.min((time - getTotalFrames() + 60) / 30, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#4af';
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 20;
    ctx.fillText('K.O.!', scaleX(450), H / 2 - 20);
    ctx.font = '18px sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('🏆 Winner: Blue', scaleX(450), H / 2 + 20);
    ctx.restore();
  }
}

function getTotalFrames() {
  let total = 120; // opening
  for (const ph of CHOREO) total += ph.f;
  return total;
}

// ---- 主循环 ----
function draw() {
  time += slow ? 0.5 : 1;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // 清屏
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  drawBG();

  if (!state.finished || time < getTotalFrames() + 60) {
    updateState();
  }
  updateShake();
  updateParticles();

  // 打击闪光
  if (state.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${state.hitFlash * 0.03})`;
    ctx.fillRect(0, 0, W, H);
  }

  // 绘制角色
  drawStickman(state.p1.x, state.p1.y, state.p1.pose, state.p1.color, state.p1.hp, 1);
  drawStickman(state.p2.x, state.p2.y, state.p2.pose, state.p2.color, state.p2.hp, -1);

  drawParticles();
  drawText();

  ctx.restore();

  requestAnimationFrame(draw);
}

// ---- 控制 ----
function restart() {
  state = {
    p1: { x: scaleX(250), y: GROUND, pose: standPose(), vy: 0, hp: 1, color: '#4af', facing: 1 },
    p2: { x: scaleX(650), y: GROUND, pose: standPose(), vy: 0, hp: 1, color: '#f55', facing: -1 },
    phase: 0, frameInPhase: 0,
    p1TargetPose: null, p2TargetPose: null,
    p1StartPose: null, p2StartPose: null,
    p1TargetX: scaleX(250), p2TargetX: scaleX(650),
    p1StartX: scaleX(250), p2StartX: scaleX(650),
    hitFlash: 0, combo: 0,
    text: '', textTimer: 0, textX: W / 2, textY: H / 2 - 40,
    finished: false
  };
  particles.length = 0;
  time = 0;
  loadPhase(0);
}

function toggleSlow() { slow = !slow; }
function toggleAuto() {
  autoReplay = !autoReplay;
  if (autoReplay) autoCheck();
}
function autoCheck() {
  if (!autoReplay) return;
  if (state.finished) restart();
  setTimeout(autoCheck, 500);
}

// ---- 启动 ----
loadPhase(0);
draw();
</script>
