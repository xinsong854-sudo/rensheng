<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火柴人战斗模拟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f; color: #c8c8d8;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh; overflow-x: hidden;
  display: flex; flex-direction: column; align-items: center;
}
h1 { color: #fff; font-size: 1.3rem; margin: 20px 0 8px; opacity: .7; letter-spacing: 2px; }
.panel {
  background: rgba(14,14,20,.85); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.06); border-radius: 8px;
  padding: 16px; max-width: 920px; width: calc(100% - 24px); margin: 8px 0;
}
.input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.input-row input {
  flex: 1; min-width: 180px; padding: 8px 12px;
  border: 1px solid rgba(255,255,255,.1); border-radius: 6px;
  background: rgba(10,10,16,.8); color: #c8c8d8; font-size: .85rem; outline: none;
}
.input-row input:focus { border-color: rgba(138,127,199,.4); }
.input-row button, .panel button {
  padding: 8px 16px; border: 1px solid rgba(138,127,199,.25); border-radius: 6px;
  background: rgba(138,127,199,.12); color: #c8c8d8; font-size: .8rem;
  cursor: pointer; transition: .2s; white-space: nowrap;
}
.input-row button:hover, .panel button:hover { background: rgba(138,127,199,.25); border-color: rgba(138,127,199,.4); }
.char-section { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
.char-card {
  flex: 1; min-width: 260px; background: rgba(20,20,30,.6);
  border: 1px solid rgba(255,255,255,.04); border-radius: 8px; padding: 12px;
}
.char-card.p1 { border-left: 3px solid #4af; }
.char-card.p2 { border-left: 3px solid #f55; }
.char-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.char-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.1); object-fit: cover;
  background: rgba(10,10,16,.8); display: block;
}
.char-avatar.placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; background: rgba(30,30,40,.8); border-radius: 50%;
  width: 48px; height: 48px;
}
.char-name { font-weight: 600; font-size: .95rem; }
.char-origin { font-size: .65rem; color: #7a7a8a; margin-top: 2px; }
.char-desc { font-size: .75rem; color: #999; line-height: 1.5; margin-bottom: 8px; max-height: 80px; overflow: hidden; }
.moves { display: flex; flex-direction: column; gap: 4px; }
.move-item {
  padding: 6px 8px; background: rgba(10,10,16,.5); border-radius: 4px;
  border: 1px solid rgba(255,255,255,.03); font-size: .75rem;
}
.move-item .move-type {
  display: inline-block; padding: 1px 4px; border-radius: 2px;
  font-size: .6rem; margin-right: 4px; vertical-align: middle;
}
.move-item .move-type.normal { background: rgba(122,184,122,.15); color: #7ab87a; }
.move-item .move-type.skill { background: rgba(138,127,199,.15); color: #8a7fc7; }
.move-item .move-type.ultimate { background: rgba(212,160,224,.15); color: #d4a0e0; }
.move-item .move-name { font-weight: 600; color: #ddd; }
.move-item .move-desc { color: #888; margin-top: 2px; }
canvas {
  border: 1px solid #222; border-radius: 8px; background: #0d0d14;
  box-shadow: 0 0 40px rgba(100,120,255,.08); margin: 8px 0;
  max-width: calc(100% - 24px);
}
#ui { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 8px 0 20px; }
#ui button {
  padding: 8px 18px; border: 1px solid #333; border-radius: 6px;
  background: #16161e; color: #ccc; font-size: .85rem;
  cursor: pointer; transition: .2s;
}
#ui button:hover { background: #22223a; color: #fff; border-color: #556; }
.loading-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,15,.92); z-index: 100;
  align-items: center; justify-content: center; flex-direction: column;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 50px; height: 50px; border: 3px solid rgba(138,127,199,.2);
  border-top-color: #8a7fc7; border-radius: 50%; animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 16px; font-size: .85rem; color: #8a7fc7; letter-spacing: .1em; }
.loading-sub { margin-top: 6px; font-size: .7rem; color: #555; }
.vs-bar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 8px; font-size: .85rem; color: #aaa; }
.vs-bar .vs-name { font-weight: 600; }
.vs-bar .vs-name.p1 { color: #4af; }
.vs-bar .vs-name.p2 { color: #f55; }
.vs-bar .vs-label { color: #555; }
.vs-bar .vs-world { font-size: .7rem; color: #d4a0e0; margin-left: 8px; }
.commentary {
  text-align: center; font-size: .8rem; color: #d4a0e0; opacity: .8;
  margin-bottom: 4px; min-height: 1.2em; letter-spacing: .05em;
}
.buff-bar {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 6px;
}
.buff-tag {
  padding: 2px 8px; border-radius: 3px; font-size: .65rem;
  letter-spacing: .05em;
}
.buff-tag.buff { background: rgba(122,184,122,.12); color: #7ab87a; border: 1px solid rgba(122,184,122,.2); }
.buff-tag.debuff { background: rgba(196,122,122,.12); color: #c47a7a; border: 1px solid rgba(196,122,122,.2); }
.world-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px; font-size: .7rem;
  background: rgba(212,160,224,.08); color: #d4a0e0;
  border: 1px solid rgba(212,160,224,.15); margin: 0 auto;
}
@media (max-width: 640px) {
  .char-section { flex-direction: column; }
  .char-card { min-width: auto; }
  h1 { font-size: 1.1rem; }
}
</style>
</head>
<body>
<h1>🔥 火柴人战斗模拟 🔥</h1>

<!-- 角色输入 -->
<div class="panel">

<div class="char-section" id="charSection">

<div class="panel" style="text-align:center;margin-top:10px;">
  <button onclick="startFight()" style="font-size:1rem;padding:10px 30px;border-color:rgba(212,160,224,.3);color:#d4a0e0;">⚔️ 开始战斗</button>
</div>

<!-- 对战栏 -->
<div class="panel" style="padding:6px 12px;">
  <div class="vs-bar">
    <span class="vs-name p1" id="vsP1">蓝方战士</span>
    <span class="vs-label">VS</span>
    <span class="vs-name p2" id="vsP2">红方战士</span>
    <span class="vs-world" id="vsWorld"></span>
  </div>
  <div class="buff-bar" id="buffBar"></div>
</div>

<div class="commentary" id="commentary"></div>
<canvas id="c"></canvas>
<div id="ui">
  <button onclick="restart()">🔄 重新战斗</button>
  <button onclick="toggleSlow()">⏱ 慢放</button>
  <button onclick="toggleAuto()">▶ 自动重播</button>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadText">分析中...</div>
  <div class="loading-sub" id="loadSub"></div>
</div>

<script src="data.js"></script>
<script>
// ===== 常量 & 状态 =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const REF_W = 900, REF_H = 500;
let W, H, GROUND, scaleX, scaleY;

function resizeCanvas() {
  W = canvas.width = Math.min(REF_W, window.innerWidth - 30);
  H = canvas.height = Math.min(REF_H, window.innerHeight - 180);
  GROUND = H - 60;
  scaleX = W / REF_W;
  scaleY = H / REF_H;
}
resizeCanvas();

const GRAVITY = 0.55 * scaleY;
let slow = false, autoReplay = false, time = 0;
let rafId = null;
let headImg1 = null, headImg2 = null;

// LLM
const LLM_URL = 'https://litellm.talesofai.cn/v1/chat/completions';
const LLM_KEY = 'sk-fZrLXE0IEs6EDYJCOsLLaQ';
const LLM_MODEL = 'qwen3.5-plus-no-think';

// 里界 buff/debuff 定义
const WORLD_EFFECTS = {
  '人监': { buffs: [{name:'器官暴走',icon:'🫀',stat:'sp',val:-5,desc:'器官的注视让理智持续流失'}], debuffs:[{name:'感官压迫',icon:'👁️',stat:'hp',val:-2,desc:'器官环境持续压迫身体'}], bgTint:'#1a0a0a' },
  '错位花园': { buffs:[{name:'植物庇护',icon:'🌿',stat:'hp',val:3,desc:'植物散发治愈气息'}], debuffs:[], bgTint:'#0a1a0a' },
  '疫病区': { buffs:[], debuffs:[{name:'瘟疫侵蚀',icon:'☠️',stat:'hp',val:-8,desc:'空气中弥漫病原体'}, {name:'精神污染',icon:'🧪',stat:'sp',val:-5,desc:'死寂荒野侵蚀理智'}], bgTint:'#1a1a0a' },
  '风暴海': { buffs:[{name:'暴雨洗礼',icon:'🌧️',stat:'sp',val:2,desc:'暴雨冲刷心灵'}], debuffs:[{name:'狂风肆虐',icon:'🌊',stat:'hp',val:-3,desc:'暴风削减体力'}], bgTint:'#0a0a1a' },
  '童话国': { buffs:[{name:'童话祝福',icon:'🏰',stat:'lk',val:10,desc:'童话世界带来好运'}], debuffs:[{name:'暗黑童话',icon:'📖',stat:'sp',val:-3,desc:'美丽外表下的暗流'}], bgTint:'#1a0a1a' },
  '「心湖」——"时之海"': { buffs:[{name:'心湖治愈',icon:'💫',stat:'hp',val:5,desc:'童年回忆治愈伤口'}, {name:'宁静',icon:'🌙',stat:'sp',val:5,desc:'湖水般的平静'}], debuffs:[], bgTint:'#0a0a1a' },
  '天风阁': { buffs:[{name:'古阁灵气',icon:'🏯',stat:'cb',val:5,desc:'古风阁楼赋予战意'}], debuffs:[], bgTint:'#0a0a0a' },
  '随心': { buffs:[{name:'自由变形',icon:'🟢',stat:'cb',val:3,desc:'史莱姆的流动性'}], debuffs:[{name:'形态不稳',icon:'💧',stat:'hp',val:-2,desc:'身体偶尔失控'}], bgTint:'#0a1a0a' },
  '永远的家': { buffs:[{name:'奇迹治愈',icon:'✨',stat:'hp',val:8,desc:'奇迹修复一切伤口'}, {name:'麦田温暖',icon:'🌾',stat:'sp',val:5,desc:'金黄麦田的安宁'}], debuffs:[], bgTint:'#1a1a0a' },
  '白墟之地': { buffs:[], debuffs:[{name:'规则污染',icon:'⬜',stat:'hp',val:-6,desc:'规则在侵蚀身体'}, {name:'文明残响',icon:'🏚️',stat:'sp',val:-6,desc:'远古废墟的压抑'}], bgTint:'#1a1a1a' },
  '【黑海】': { buffs:[{name:'暗影加护',icon:'🌑',stat:'cb',val:5,desc:'黑暗赋予力量'}], debuffs:[{name:'深寒',icon:'❄️',stat:'hp',val:-4,desc:'北极的极寒'}], bgTint:'#050508' },
  '【第x号医院】': { buffs:[{name:'医疗支援',icon:'🏥',stat:'hp',val:4,desc:'医院的急救设施'}], debuffs:[{name:'诡异氛围',icon:'💉',stat:'sp',val:-4,desc:'医院中的不安感'}], bgTint:'#0a0a0a' },
  '【骰子回廊】': { buffs:[], debuffs:[], bgTint:'#0a0a0a', random:true, desc:'骰子决定一切！每回合随机效果' }
};

// 角色数据
let P1 = { name:'蓝方战士', desc:'', origin:'默认角色', avatar:'', moves:defaultMoves(), charType:'', tauntOk:true };
let P2 = { name:'红方战士', desc:'', origin:'默认角色', avatar:'', moves:defaultMoves(), charType:'', tauntOk:true };

// 当前场地
let currentWorld = null;

function defaultMoves() {
  return [
    { type:'normal', name:'普通拳击', desc:'基础的直拳攻击', phases:[{f:6,pose:'punch',hit:false},{f:4,pose:'punch',hit:true},{f:8,pose:'fight',hit:false}] },
    { type:'skill', name:'旋风踢', desc:'旋转一周后踢出', phases:[{f:8,pose:'highKick',hit:false},{f:4,pose:'highKick',hit:true},{f:6,pose:'fight',hit:false}] },
    { type:'ultimate', name:'终结飞踢', desc:'从空中劈下的致命一击', phases:[{f:8,pose:'jump',hit:false},{f:6,pose:'axeKick',hit:true,big:true},{f:8,pose:'fight',hit:false}] }
  ];
}

// ===== 捏Ta API =====
function extractUUID(url) {
  if (!url) return '';
  const m = url.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
  return m ? m[0] : '';
}

async function fetchCharacter(uuid) {
  const resp = await fetch(`https://api.nieta.com.cn/v1/character/${uuid}`);
  if (!resp.ok) throw new Error('查询失败: ' + resp.status);
  const data = await resp.json();
  return { name: data.name||data.nick_name||'未知角色', desc: data.description||data.desc||data.info||'', avatar: data.cover_image_url||data.avatar_url||data.image_url||data.avatar||'' };
}

async function searchCharacter(keyword) {
  const resp = await fetch(`https://api.nieta.com.cn/v1/character/search?keywords=${encodeURIComponent(keyword)}&parent_type=character&sort_scheme=exact`);
  if (!resp.ok) return null;
  const data = await resp.json();
  if (data?.items?.length > 0) {
    const c = data.items[0];
    return { name: c.name||c.nick_name||'未知', desc: c.description||c.desc||'', avatar: c.cover_image_url||c.avatar_url||'' };
  }
  return null;
}

// ===== 图片处理 =====
function loadImage(url) {
  if (!url) return null;
  return new Promise((resolve) => {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img); img.onerror = () => resolve(null); img.src = url;
  });
}

function drawCircleAvatar(img, x, y, radius) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.closePath(); ctx.clip();
  if (img) { const s = radius*2; ctx.drawImage(img, x-radius, y-radius, s, s); }
  ctx.restore();
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2*scaleX; ctx.stroke();
}

// ===== LLM =====
async function llmCall(system, user, maxT=2048, temp=0.85) {
  const ctrl = new AbortController();
  const tmo = setTimeout(() => ctrl.abort(), 30000);
  const resp = await fetch(LLM_URL, {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+LLM_KEY},
    body: JSON.stringify({ model:LLM_MODEL, messages:[{role:'system',content:system},{role:'user',content:user}], max_tokens:maxT, temperature:temp }),
    signal: ctrl.signal
  });
  clearTimeout(tmo);
  if (!resp.ok) throw new Error('LLM 请求失败: ' + resp.status);
  const data = await resp.json();
  return data.choices?.[0]?.message?.content || '';
}

function parseJSON(t) {
  t = t.replace(/```(?:json)?/g,'').replace(/```/g,'').trim();
  for (const open of ['[','{']) {
    const start = t.indexOf(open); if (start < 0) continue;
    const close = open==='['?']':'}'; let depth=0, inStr=false, esc=false;
    for (let i=start; i<t.length; i++) {
      const c=t[i]; if(esc){esc=false;continue} if(c==='\\'){esc=true;continue}
      if(c==='"')inStr=!inStr; if(inStr)continue;
      if(c===open)depth++; if(c===close){depth--;if(depth===0){try{return JSON.parse(t.substring(start,i+1))}catch(e){}break}}
    }
  }
  try{return JSON.parse(t)}catch(e){} return null;
}

// ===== 角色加载 =====
function showLoading(t, s) {
  document.getElementById('loadText').textContent = t;
  document.getElementById('loadSub').textContent = s || '';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

async function loadP1() { const v = document.getElementById('p1Link').value.trim(); if(!v) return; await loadChar(1, v); }
async function loadP2() { const v = document.getElementById('p2Link').value.trim(); if(!v) return; await loadChar(2, v); }

async function loadChar(player, input) {
  showLoading('正在查找角色...', input);
  try {
    let d = null;
    const uuid = extractUUID(input);
    if (uuid) { try { d = await fetchCharacter(uuid); d.origin = '捏Ta'; } catch(e) {} }
    if (!d) { try { d = await searchCharacter(input); if(d) d.origin = '捏Ta搜索'; } catch(e) {} }
    if (!d) d = { name: input, desc: '', avatar: '', origin: '自定义' };

    const p = player === 1 ? P1 : P2;
    p.name = d.name; p.desc = d.desc; p.origin = d.origin; p.avatar = d.avatar || '';

    if (d.avatar) {
      const img = await loadImage(d.avatar);
      if (player === 1) headImg1 = img; else headImg2 = img;
    }

    showLoading('正在分析战斗风格...', d.name);
    p.moves = await genMoves(d);
    updateUI(player, d);
    hideLoading();
  } catch(e) { hideLoading(); alert('加载失败: ' + e.message); }
}

function updateUI(player, d) {
  const n = '' + player;
  document.getElementById('name'+n).textContent = d.name;
  document.getElementById('origin'+n).textContent = d.origin;
  document.getElementById('desc'+n).textContent = d.desc || '暂无简介';
  document.getElementById('vsP'+n).textContent = d.name;

  const avEl = document.getElementById('avatar'+n);
  if (d.avatar) {
    const img = document.createElement('img');
    img.className = 'char-avatar'; img.id = 'avatar'+n; img.src = d.avatar;
    img.onerror = function() {
      this.outerHTML = '<div class="char-avatar placeholder" id="avatar'+n+'">'+(player===1?'🔵':'🔴')+'</div>';
    };
    avEl.replaceWith(img);
  }

  const p = player === 1 ? P1 : P2;
  document.getElementById('moves'+n).innerHTML = p.moves.map(m =>
    `<div class="move-item"><span class="move-type ${m.type}">${m.type==='normal'?'普攻':m.type==='skill'?'技能':'大招'}</span><span class="move-name">${m.name}</span><div class="move-desc">${m.desc}</div></div>`
  ).join('');
}

async function genMoves(cd) {
  try {
    const r = await llmCall(
      '只返回JSON数组，不返回其他内容。',
      `你是火柴人战斗招式设计师。根据角色信息设计3种招式（普攻/技能/大招）：

角色：${cd.name}
简介：${cd.desc || '暂无'}
可用pose：stand fight punch heavyPunch kick highKick block hit knockback jump axeKick kneel victory

返回JSON数组：
[{"type":"normal","name":"招式名","desc":"带吐槽的简短描述","phases":[{"f":8,"pose":"fight","hit":false},{"f":4,"pose":"punch","hit":true},{"f":8,"pose":"fight","hit":false}]},
{"type":"skill","name":"...","desc":"...","phases":[...]},
{"type":"ultimate","name":"...","desc":"...","phases":[...,{"f":6,"pose":"axeKick","hit":true,"big":true},...]}]
每个招式3-5个phase，大招最后一个打击设"big":true。`,
      1024, 0.85
    );
    const m = parseJSON(r);
    if (m && Array.isArray(m) && m.length >= 3) return m.slice(0,3);
  } catch(e) {}
  return defaultMoves();
}

// ===== 随机对手（从Excel数据） =====
function randomChar() {
  if (typeof CHAR_DB === 'undefined' || !CHAR_DB.length) return null;
  return CHAR_DB[Math.floor(Math.random() * CHAR_DB.length)];
}

async function autoEnemy() {
  if (!P1.name || P1.name === '蓝方战士') { alert('请先导入P1角色'); return; }
  showLoading('正在匹配对手...', '从档案中随机选取');

  // 等概率随机选一个（不能和P1同名）
  let enemy = randomChar();
  let tries = 0;
  while (enemy && enemy.name === P1.name && tries < 20) { enemy = randomChar(); tries++; }
  if (!enemy) { hideLoading(); return; }

  P2.name = enemy.name;
  P2.desc = enemy.desc || '';
  P2.origin = enemy.type + '档案 · 随机匹配';
  P2.avatar = '';
  headImg2 = null;

  // LLM 生成招式
  showLoading('正在分析战斗风格...', enemy.name);
  P2.moves = await genMoves(enemy);
  updateUI(2, { name: enemy.name, desc: enemy.desc || '', origin: P2.origin, avatar: '' });
  hideLoading();
}

// ===== 随机里界场地 =====
function randomWorld() {
  if (typeof WORLD_DB === 'undefined' || !WORLD_DB.length) return null;
  return WORLD_DB[Math.floor(Math.random() * WORLD_DB.length)];
}

function applyWorldEffects() {
  currentWorld = randomWorld();
  const wb = document.getElementById('buffBar');
  const ww = document.getElementById('vsWorld');

  if (!currentWorld) {
    ww.innerHTML = ''; wb.innerHTML = '';
    return;
  }

  ww.innerHTML = `<span class="world-badge">🌐 ${currentWorld.name}</span>`;

  const ef = WORLD_EFFECTS[currentWorld.name];
  if (!ef) { wb.innerHTML = ''; return; }

  let html = '';
  (ef.buffs || []).forEach(b => {
    html += `<span class="buff-tag buff" title="${b.desc}">${b.icon} ${b.name}</span>`;
  });
  (ef.debuffs || []).forEach(d => {
    html += `<span class="buff-tag debuff" title="${d.desc}">${d.icon} ${d.name}</span>`;
  });

  // 骰子回廊特殊：每回合随机
  if (ef.random) {
    html += `<span class="buff-tag buff" title="每回合随机buff/debuff">🎲 骰子回廊</span>`;
  }

  wb.innerHTML = html;
}

// ===== 战斗编排 LLM =====
async function genChoreo() {
  showLoading('正在编排战斗...', `${P1.name} vs ${P2.name}`);

  const m1 = P1.moves.map((m,i) => `${i+1}.【${m.type}】${m.name}：${m.desc}`).join('\n');
  const m2 = P2.moves.map((m,i) => `${i+1}.【${m.type}】${m.name}：${m.desc}`).join('\n');

  const tauntHint = `关于垃圾话/嘲讽：请分析两个角色的性格和说话风格。只有外向、话痨、傲慢、恶劣的角色才会说垃圾话。内敛、沉默、温和、三无、书卷气的角色（如C.、冷寂、墨水夜等）不要强求他们说话。如果角色不适合说垃圾话，taunts数组留空[]。`;

  try {
    const r = await llmCall(
      '只返回JSON对象，不返回其他内容。',
      `你是火柴人战斗编排导演。为以下两位角色编排精彩战斗：

P1: ${P1.name} (${P1.desc ? P1.desc.substring(0,100) : '默认角色'})
P1招式:
${m1}

P2: ${P2.name} (${P2.desc ? P2.desc.substring(0,100) : '默认角色'})
P2招式:
${m2}

${currentWorld ? '战斗场地：' + currentWorld.name + '（' + (currentWorld.content||'').substring(0,80) + '）' : ''}

${tauntHint}

战斗流程：开场对峙→双方接近→交替出招→使用大招→最终对决→一方胜利。
可用pose：stand fight punch heavyPunch kick highKick block hit knockback jump axeKick kneel victory
x坐标范围：100-800

严格返回JSON：
{"commentary":"战斗总结/解说","taunts":["垃圾话1","垃圾话2",...],"choreo":[{"f":帧数,"p1":{"pose":"姿势","x":坐标,"vy":可选},"p2":{"pose":"姿势","x":坐标,"vy":可选},"hit":true/false,"big":true/false,"tauntIndex":可选},...]}

choreo至少15个阶段，双方都有高光。`,
      2048, 0.85
    );
    const d = parseJSON(r);
    hideLoading();
    return d;
  } catch(e) {
    hideLoading();
    return null;
  }
}

function lerp(a,b,t) { return a+(b-a)*t; }
function lerpPose(a,b,t) {
  const r={}; for(const k in a) r[k]={x:lerp(a[k].x,b[k].x,t),y:lerp(a[k].y,b[k].y,t)}; return r;
}

// ===== 火柴人绘制 =====
function drawStickman(x, y, pose, color, hp, facing, headImg) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(facing, 1);
  const {head,neck,shoulder,elbow,hand,hip,knee,foot} = pose;
  const lw = Math.max(2, 3*scaleX);
  const hr = 12 * scaleX;

  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  function line(x1,y1,x2,y2) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

  ctx.shadowColor = color; ctx.shadowBlur = 8;
  line(neck.x,neck.y,shoulder.x,shoulder.y);
  line(shoulder.x,shoulder.y,hip.x,hip.y);
  line(shoulder.x,shoulder.y,elbow.x,elbow.y);
  line(elbow.x,elbow.y,hand.x,hand.y);
  const ox=shoulder.x-(elbow.x-shoulder.x)*0.3;
  line(ox,shoulder.y+5*scaleY,shoulder.x-(hand.x-shoulder.x)*0.3,shoulder.y+15*scaleY);
  line(hip.x,hip.y,knee.x,knee.y); line(knee.x,knee.y,foot.x,foot.y);
  line(hip.x,hip.y,knee.x+10*scaleX,knee.y+5*scaleY);
  line(knee.x+10*scaleX,knee.y+5*scaleY,foot.x+15*scaleX,foot.y);
  ctx.shadowBlur = 0;

  // 头部底色
  ctx.beginPath(); ctx.arc(head.x,head.y,hr,0,Math.PI*2);
  ctx.fillStyle = color; ctx.fill();

  // 角色封面圆形头像
  if (headImg) drawCircleAvatar(headImg, head.x, head.y, hr);

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(head.x+4*scaleX,head.y-2*scaleY,2*scaleX,0,Math.PI*2); ctx.fill();

  // 血条
  if (hp !== undefined) {
    const bw=50*scaleX, bh=5*scaleY, bx=-bw/2, by=head.y-hr-10*scaleY;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=hp>0.3?'#4f4':'#f44'; ctx.fillRect(bx,by,bw*hp,bh);
  }
  ctx.restore();
}

// ===== 粒子 & 震动 =====
const particles = [];
function spawnParticles(x,y,color,count=10,speed=3) {
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=Math.random()*speed+1;
    particles.push({x,y,vx:Math.cos(a)*s*scaleX,vy:Math.sin(a)*s*scaleY-scaleY,life:1,color,size:(Math.random()*4+1)*scaleX});}
}
function spawnSparks(x,y,count=15) {
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI-Math.PI/2,s=Math.random()*6+2;
    particles.push({x,y,vx:Math.cos(a)*s*scaleX*(Math.random()>.5?1:-1),vy:Math.sin(a)*s*scaleY-2*scaleY,life:1,color:['#fff','#ff4','#f84','#4af'][Math.floor(Math.random()*4)],size:(Math.random()*3+1)*scaleX,spark:true});}
}
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1*scaleY;p.life-=0.025;if(p.life<=0)particles.splice(i,1);}
}
function drawParticles() {
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    if(p.spark){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));ctx.fillRect(-p.size*2,-0.5,p.size*4,1);ctx.restore();}
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();}}
  ctx.globalAlpha=1;
}

let shakeX=0,shakeY=0,shakeDecay=0;
function doShake(intensity){shakeDecay=intensity*scaleX;}
function updateShake(){
  if(shakeDecay>0){shakeX=(Math.random()-.5)*shakeDecay*2;shakeY=(Math.random()-.5)*shakeDecay*2;shakeDecay*=.85;if(shakeDecay<.3){shakeDecay=0;shakeX=0;shakeY=0;}}
}

}

function initState() {
  state={p1:{x:sx(250),y:GROUND,pose:POSES.stand,vy:0,hp:1,color:'#4af',facing:1},
    p2:{x:sx(650),y:GROUND,pose:POSES.stand,vy:0,hp:1,color:'#f55',facing:-1},
    phase:0,frameInPhase:0,p1StartPose:null,p2StartPose:null,p1TargetPose:null,p2TargetPose:null,
    p1StartX:sx(250),p2StartX:sx(650),p1TargetX:sx(250),p2TargetX:sx(650),
    phaseFrames:40,hitFlash:0,combo:0,text:'',textTimer:0,textX:W/2,textY:H/2-40*scaleY,
    finished:false,hasHit:false,hitData:null,opening:true};
}

function loadPhase(idx) {
  const choreo = choreoData?.choreo || buildFallbackChoreo();
  if(idx>=choreo.length){state.finished=true;return;}
  const ph=choreo[idx];
  state.p1StartPose={...state.p1.pose};state.p2StartPose={...state.p2.pose};
  state.p1TargetPose=POSES[ph.p1.pose]||POSES.fight;
  state.p2TargetPose=POSES[ph.p2.pose]||POSES.fight;
  state.p1StartX=state.p1.x;state.p2StartX=state.p2.x;
  state.p1TargetX=sx(ph.p1.x);state.p2TargetX=sx(ph.p2.x);
  state.p1.vy=(ph.p1.vy||0)*scaleY;state.p2.vy=(ph.p2.vy||0)*scaleY;
  state.phaseFrames=ph.f;state.hasHit=false;
  state.hitData=ph.hit?{big:ph.big||false}:null;
  if(ph.tauntIndex!==undefined&&choreoData?.taunts) currentTaunt=choreoData.taunts[ph.tauntIndex]||'';
}

function updateState() {
  if(state.finished)return;
  const choreo=choreoData?.choreo||buildFallbackChoreo();
  const ph=choreo[state.phase];if(!ph){state.finished=true;return;}
  if(state.opening&&time>80)state.opening=false;
  const t=Math.min(state.frameInPhase/state.phaseFrames,1);
  const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  state.p1.pose=lerpPose(state.p1StartPose,state.p1TargetPose,ease);
  state.p2.pose=lerpPose(state.p2StartPose,state.p2TargetPose,ease);
  state.p1.x=lerp(state.p1StartX,state.p1TargetX,ease);
  state.p2.x=lerp(state.p2StartX,state.p2TargetX,ease);
  if(state.p1.vy!==0){state.p1.y+=state.p1.vy;state.p1.vy+=GRAVITY;if(state.p1.y>=GROUND){state.p1.y=GROUND;state.p1.vy=0;}}
  if(state.p2.vy!==0){state.p2.y+=state.p2.vy;state.p2.vy+=GRAVITY;if(state.p2.y>=GROUND){state.p2.y=GROUND;state.p2.vy=0;}}

  // 打击
  if(state.hitData&&!state.hasHit&&t>.4){
    state.hasHit=true;
    const hx=(state.p1.x+state.p2.x)/2, hy=Math.min(state.p1.y,state.p2.y)-50*scaleY;
    if(state.hitData.big){spawnSparks(hx,hy,25);doShake(12);state.p2.hp=Math.max(0,state.p2.hp-.15);state.p1.hp=Math.max(0,state.p1.hp-.1);}
    else{spawnParticles(hx,hy,'#ff8',8);doShake(5);state.p2.hp=Math.max(0,state.p2.hp-.08);}
    state.hitFlash=6;state.combo++;
    if(state.combo>=2){state.text=state.combo+' HIT!';state.textTimer=30;state.textX=hx;state.textY=hy-20*scaleY;}
  }
  if(state.textTimer>0)state.textTimer--;
  state.frameInPhase++;
  if(state.frameInPhase>=state.phaseFrames){state.phase++;state.frameInPhase=0;if(state.combo>0&&!state.hitData)state.combo=0;loadPhase(state.phase);}
  if(state.hitFlash>0)state.hitFlash--;

  // 场地效果
  applyFieldEffects();
}

function applyFieldEffects() {
  if (!currentWorld) return;
  const ef = WORLD_EFFECTS[currentWorld.name];
  if (!ef) return;

  // 骰子回廊随机效果
  if (ef.random && state.frameInPhase === 0) {
    const effects = [
      {stat:'hp',val:-3},{stat:'hp',val:3},{stat:'sp',val:-5},{stat:'sp',val:5},
      {stat:'cb',val:5},{stat:'lk',val:10},{}
    ];
    const e = effects[Math.floor(Math.random()*effects.length)];
    if (e.stat) {
      if (e.stat==='hp') state.p1.hp=Math.max(0,state.p1.hp+e.val/100);
    }
  }
}

// ===== 文字 =====
function drawText() {
  if(state.textTimer>0){
    const a=Math.min(state.textTimer/10,1),s=1+(1-a)*.5;
    ctx.save();ctx.globalAlpha=a;ctx.translate(state.textX,state.textY);ctx.scale(s,s);
    ctx.font=`bold ${36*scaleX}px sans-serif`;ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.shadowColor='#f84';ctx.shadowBlur=15;ctx.fillText(state.text,0,0);
    ctx.shadowBlur=0;ctx.strokeStyle='#f84';ctx.lineWidth=1;ctx.strokeText(state.text,0,0);
    ctx.restore();ctx.globalAlpha=1;
  }
  if(state.opening){
    const a=time<40?time/40:Math.max(1-(time-40)/40,0);
    ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${24*scaleX}px sans-serif`;ctx.textAlign='center';
    ctx.fillStyle='#fff';ctx.shadowColor='#4af';ctx.shadowBlur=20;
    ctx.fillText(`⚔ ${P1.name} VS ${P2.name} ⚔`,sx(450),H/2);
    ctx.restore();
  }
  if(state.finished){
    const tf=getTotalFrames(),a=Math.min((time-tf+60)/30,1);
    const winner=state.p2.hp<=0?P1.name:(state.p1.hp<=0?P2.name:'平局');
    ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${32*scaleX}px sans-serif`;ctx.textAlign='center';
    ctx.fillStyle='#4af';ctx.shadowColor='#4af';ctx.shadowBlur=20;
    ctx.fillText('K.O.!',sx(450),H/2-20*scaleY);
    ctx.font=`${18*scaleX}px sans-serif`;ctx.fillStyle='#aaa';
    ctx.fillText('🏆 Winner: '+winner,sx(450),H/2+20*scaleY);
    ctx.restore();
  }
}

function getTotalFrames(){const c=choreoData?.choreo||buildFallbackChoreo();let t=80;for(const p of c)t+=p.f;return t;}

// ===== 主循环 =====
function draw() {
  time+=slow?.5:1;
  ctx.save();ctx.translate(shakeX,shakeY);
  ctx.fillStyle='#0d0d14';ctx.fillRect(-10,-10,W+20,H+20);
  drawBG();
  if(!state.finished||time<getTotalFrames()+60)updateState();
  updateShake();updateParticles();
  if(state.hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${state.hitFlash*.03})`;ctx.fillRect(0,0,W,H);}
  drawStickman(state.p1.x,state.p1.y,state.p1.pose,state.p1.color,state.p1.hp,1,headImg1);
  drawStickman(state.p2.x,state.p2.y,state.p2.pose,state.p2.color,state.p2.hp,-1,headImg2);
  drawParticles();drawText();
  ctx.restore();

  // 解说
  const el=document.getElementById('commentary');
  if(state.opening) el.textContent='⚔ 战斗开始！';
  else if(currentTaunt&&state.textTimer<=0) el.textContent=currentTaunt;
  else if(state.finished) el.textContent=choreoData?.commentary||'精彩的战斗！';
  else el.textContent='';

  rafId=requestAnimationFrame(draw);
}

// ===== 控制 =====
function restart(){
  if(rafId)cancelAnimationFrame(rafId);
  particles.length=0;time=0;currentTaunt='';
  resizeCanvas();initState();loadPhase(0);draw();
}
function toggleSlow(){slow=!slow;}
function toggleAuto(){autoReplay=!autoReplay;if(autoReplay)autoCheck();}
function autoCheck(){if(!autoReplay)return;if(state.finished)restart();setTimeout(autoCheck,500);}

window.addEventListener('resize',()=>{if(rafId)cancelAnimationFrame(rafId);particles.length=0;resizeCanvas();restart();});

// ===== 开始战斗 =====
async function startFight(){
  applyWorldEffects();
  try { choreoData = await genChoreo(); } catch(e) { choreoData = null; }
  restart();
}

// 初始化默认招式UI
function initDefaultMovesUI() {
  ['moves1','moves2'].forEach(id => {
    document.getElementById(id).innerHTML = defaultMoves().map(m =>
      `<div class="move-item"><span class="move-type ${m.type}">${m.type==='normal'?'普攻':m.type==='skill'?'技能':'大招'}</span><span class="move-name">${m.name}</span><div class="move-desc">${m.desc}</div></div>`
    ).join('');
  });
}

initDefaultMovesUI();
initState();loadPhase(0);draw();
