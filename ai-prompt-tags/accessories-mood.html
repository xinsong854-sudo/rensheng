        // 渲染显示
        function renderTags() {
            const displayArea = document.getElementById('display-area');
            let html = '';
            
            tagData.forEach(category => {
                html += `<div class="category">
                    <h2 class="category-name">${category.name}</h2>`;
                
                category.subcategories.forEach(sub => {
                    html += `<div class="subcategory">
                        <div class="subcategory-name">${sub.name} (${sub.tags.length} 个标签)</div>
                        <div class="tags">`;
                    
                    sub.tags.slice(0, 20).forEach(tag => {
                        html += `<span class="tag"><code>${tag[0]}</code>${tag[1]}</span>`;
                    });
                    
                    if (sub.tags.length > 20) {
                        html += `<span class="tag">... 还有 ${sub.tags.length - 20} 个</span>`;
                    }
                    
                    html += `</div></div>`;
                });
                
                html += `</div>`;
            });
            
            displayArea.innerHTML = html;
            
            // 显示 JSON 数据
            document.getElementById('json-display').textContent = JSON.stringify(tagData, null, 2);
        }
        
        // 统计标签数量
        function countTags() {
            let totalTags = 0;
            let totalSubcategories = 0;
            
            tagData.forEach(category => {
                category.subcategories.forEach(sub => {
                    totalTags += sub.tags.length;
                    totalSubcategories++;
                });
            });
            
            console.log(`总分类数：${tagData.length}`);
            console.log(`总子分类数：${totalSubcategories}`);
            console.log(`总标签数：${totalTags}`);
            
            return { categories: tagData.length, subcategories: totalSubcategories, tags: totalTags };
        }
        
        // 初始化
        renderTags();
        const stats = countTags();
        
        console.log('✅ 标签数据加载完成');
        console.log('📊 统计信息:', stats);
    </script>
