        tagData.forEach(cat => {

            cat.subcategories.forEach(sub => {
                totalTags += sub.tags.length;
            });
            statsHtml += `<li><strong>${cat.name}</strong>: ${cat.subcategories.length} 个子分类，共 ${totalTags} 个标签</li>`;

                statsHtml += `<li style="margin-left: 20px; color: #666;">├─ ${sub.name}: ${sub.tags.length} 个标签</li>`;

        });
        statsHtml += '</ul>';
