name: list_my_elementum
title: List My Elementa
description: |
  List all elementa created by the current user.

  Returns a paginated list of the user's own elementa including both PUBLIC and PRIVATE ones.
  Useful for finding elements created in previous sessions for updates or reference.

  Usage Notes:
    - Requires NETA_TOKEN to be set
    - Returns only the current user's elementa
    - Use keyword parameter to filter results
    - Returns element UUID (tcp_uuid), name, avatar image, accessibility, and status

parameters:
  keyword: Search keyword to filter elements by name (optional)
  page_index: Page index for pagination, defaults to 0
  page_size: Number of results per page (1-50), defaults to 20
