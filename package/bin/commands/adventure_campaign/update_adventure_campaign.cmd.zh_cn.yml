name: update_adventure_campaign
title: 更新奇遇剧本
description: |
  更新已有的奇遇剧本。只需指定要修改的字段——未提供的字段保持不变。

  使用说明：
    - 只有剧本创建者才能更新
    - 文本字段的修改需经过内容审核
    - 图片字段的修改需经过图片审核
    - NSFW 内容被禁止——即使用户要求也不得添加露骨性描写或血腥暴力内容

parameters:
  campaign_uuid: 要更新的剧本 UUID（必填）
  name: 剧本标题，最多 128 字符（可选）
  mission_plot: |
    核心故事和场景描述——叙事基础。前 2-3 句话是开场场景：
    从「已经出了问题」开始，而非介绍。（可选）
  subtitle: |
    显示在剧本卡片上的一行钩子——立即制造好奇心，而非解释一切。（可选）
  status: "PUBLISHED（公开）或 DRAFT（私密）（可选）"
  header_img: 剧本卡片缩略图 URL（可选）
  background_img: 故事氛围背景图 URL（可选）
  mission_task: |
    玩家可见的目标和互动规则。保持足够开放以允许多种方法；
    避免预设具体结果。（可选）
  mission_plot_attention: |
    统治性约束层——AI 叙事者无条件执行的规则，凌驾于所有其他上下文之上。
    用于：锁定基调、定义 NPC 行为契约、门控信息、设置后果规则、建立内容护栏。
    更新此字段将立即改变所有未来游玩会话的行为。（可选）
