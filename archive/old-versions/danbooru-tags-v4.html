        }

        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            color: #888;
        }

        .disclaimer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .disclaimer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .disclaimer-content {
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            max-width: 90%;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .disclaimer-content h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        .disclaimer-content p {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .category {
            margin-bottom: 12px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .category-header:active {
            background: #e9ecef;
        }

        .category-header.active {
            background: #e9ecef;
        }

        .category-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .category-icon {
            font-size: 18px;
            margin-right: 10px;
        }

        .chevron {
            font-size: 18px;
            color: #999;
            transition: transform 0.3s ease;
        }

        .chevron.active {
            transform: rotate(90deg);
        }

        .subcategory {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 8px;
        }

        .subcategory.show {
            max-height: 2000px;
        }

        .subcategory-item {
            padding: 12px 16px;
            margin: 6px 0;
            background: #fafbfc;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .subcategory-title {
            font-size: 13px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            background: #f0f2f5;
            border-radius: 6px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e4e6e9;
        }

        .tag:active {
            background: #e4e6e9;
            transform: scale(0.98);
        }

        .tag.copied {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .tag.negative {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }

        /* 敏感词检测器样式 */
        .sensitive-checker {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .sensitive-checker h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .sensitive-checker textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .sensitive-checker button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .sensitive-checker button:hover {
            background: #0056b3;
        }

        .sensitive-result {
            margin-top: 15px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .sensitive-result .warning {
            color: #dc3545;
            font-weight: 500;
        }

        .sensitive-result .safe {
            color: #28a745;
            font-weight: 500;
        }

        .sensitive-disclaimer {
            font-size: 11px;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        .highlighted-text {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.8;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 10px;
        }

        .highlighted-text .sensitive-high {
            background: #ffcccc;
            color: #cc0000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            border: 1px solid #ff9999;
        }

        .highlighted-text .sensitive-low {
            background: #fff3cd;
            color: #856404;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            border: 1px solid #ffc107;
        }

        .sensitive-legend {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .sensitive-legend span {
            margin-right: 15px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .toast.copied {
            background: rgba(40, 167, 69, 0.9);
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #f0f0f0;

            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }

        }

        // 渲染内容

            const content = document.getElementById('content');

            tagData.forEach((category, catIndex) => {
                html += `

                        <div class="category-header" onclick="toggleCategory(${catIndex})">

                            <span class="chevron" id="chevron-${catIndex}">›</span>
                        </div>
                        <div class="subcategory" id="cat-${catIndex}">
                `;

                category.items.forEach((subcat, subIndex) => {
                    html += `
                        <div class="subcategory-item">
                            <div class="subcategory-title">${subcat.title}</div>
                            <div class="tags">
                    `;

                    subcat.tags.forEach(tag => {
                        const isNegative = tag.negative;
                        const className = isNegative ? 'tag negative' : 'tag';
                        html += `<span class="${className}" onclick="copyTag('${tag.en}', this)">${tag.cn}</span>`;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        // 切换大分类
        function toggleCategory(index) {
            const subcategory = document.getElementById(`cat-${index}`);
            const header = subcategory.previousElementSibling;
            const chevron = document.getElementById(`chevron-${index}`);

            const wasActive = header.classList.contains('active');

            document.querySelectorAll('.category-header').forEach(h => {
                h.classList.remove('active');
                h.nextElementSibling.classList.remove('show');
            });

            document.querySelectorAll('.chevron').forEach(c => {
                c.classList.remove('active');
            });

            if (!wasActive) {
                header.classList.add('active');
                subcategory.classList.add('show');
                chevron.classList.add('active');
            }
        }

        // 复制标签
        function copyTag(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制：' + text);
                element.classList.add('copied');
                setTimeout(() => {
                    element.classList.remove('copied');
                }, 500);
            });
        }

        // 显示提示

            const toast = document.getElementById('toast');

            toast.classList.add('show');
            setTimeout(() => {

            }, 1500);
        }

        // 检查是否是误报组合
        function isFalsePositive(text, match) {
            const lowerText = text.toLowerCase();
            for (const pattern of falsePositivePatterns) {
                if (lowerText.includes(pattern.toLowerCase()) && pattern.toLowerCase().includes(match.toLowerCase())) {
                    return true;
                }
            }
            return false;
        }

        // 敏感词检测
        function checkSensitive() {
            const input = document.getElementById('sensitiveInput').value;
            const resultDiv = document.getElementById('sensitiveResult');
            
            if (!input.trim()) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<span class="warning">请输入要检测的文字</span>';
                return;
            }

            const foundHigh = [];
            const foundLow = [];
            let highlightedText = input;

            // 检测高置信度敏感词
            sensitiveWordsHigh.forEach(word => {
                const regex = new RegExp(`\\b(${word})\\b`, 'gi');
                const cnRegex = new RegExp(`(${word})`, 'gi');
                if (regex.test(input) || cnRegex.test(input)) {
                    if (!isFalsePositive(input, word)) {
                        foundHigh.push(word);
                    }
                }
            });

            // 检测低置信度敏感词
            sensitiveWordsLow.forEach(word => {
                const regex = new RegExp(`\\b(${word})\\b`, 'gi');
                const cnRegex = new RegExp(`(${word})`, 'gi');
                if (regex.test(input) || cnRegex.test(input)) {
                    if (!isFalsePositive(input, word)) {
                        foundLow.push(word);
                    }
                }
            });

            // 去重
            const uniqueHigh = [...new Set(foundHigh)];
            const uniqueLow = [...new Set(foundLow)];

            // 高亮显示（先高亮低置信度，再高亮高置信度，避免覆盖）
            uniqueLow.forEach(word => {
                const regex = new RegExp(`(${word})`, 'gi');
                highlightedText = highlightedText.replace(regex, '<span class="sensitive-low">$1</span>');
            });

            uniqueHigh.forEach(word => {
                const regex = new RegExp(`(${word})`, 'gi');
                highlightedText = highlightedText.replace(regex, '<span class="sensitive-high">$1</span>');
            });

            resultDiv.style.display = 'block';
            
            if (uniqueHigh.length > 0 || uniqueLow.length > 0) {
                let html = '<span class="warning">⚠️ 检测到敏感词：</span><br><br>';
                html += '<div class="highlighted-text">' + highlightedText + '</div>';
                html += '<br><strong>🔴 高置信度：</strong> ' + (uniqueHigh.length > 0 ? uniqueHigh.join(', ') : '无');
                html += '<br><strong>🟡 可能误报：</strong> ' + (uniqueLow.length > 0 ? uniqueLow.join(', ') : '无');
                html += '<br><br><small>💡 提示：黄色标记的词可能是正常内容，请结合上下文判断</small>';
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = '<span class="safe">✅ 未检测到常见敏感词</span><br><br><div class="highlighted-text">' + input + '</div>';
            }
        }
